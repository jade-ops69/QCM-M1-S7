.sc-item { display: flex; align-items: center; gap: 0.3rem; }
.sc-num { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; }
.sc-total { color: #d4a843; } .sc-ok-num { color: #5cb878; } .sc-ko-num { color: #e07070; } .sc-div { color: #444; }
.progress-wrap { background: #2a2520; height: 4px; }
.progress-fill { height: 4px; background: #b8860b; transition: width 0.4s ease; }
main { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem 2rem; }
.session-bar { background: #fff; border: 1px solid #d8cfc2; border-left: 4px solid #b8860b; padding: 0.8rem 1.1rem; margin-bottom: 1.3rem; font-size: 0.81rem; color: #7a6e62; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
.session-bar strong { color: #1a1612; }
.btn-top { padding: 0.38rem 0.9rem; background: #1a1612; color: #d4a843; border: 1.5px solid #b8860b; font-family: 'Source Serif 4', serif; font-size: 0.76rem; cursor: pointer; letter-spacing: 0.04em; -webkit-appearance: none; border-radius: 0; }

.chap-btn.active { background: #1a1612; color: #f5f0e8; border-color: #1a1612; }
.chap-hdr { margin: 1.8rem 0 0.9rem; padding-bottom: 0.45rem; border-bottom: 2px solid #b8860b; display: flex; align-items: baseline; gap: 0.8rem; }

.q-card { background: #fff; border: 1px solid #d8cfc2; border-left: 4px solid #b8860b; margin-bottom: 1.3rem; padding: 1.2rem 1.3rem; }
.q-meta { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
.t-chap { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; background: #1a1612; color: #d4a843; padding: 0.1rem 0.48rem; font-weight: 600; }
.t-theme { font-size: 0.62rem; letter-spacing: 0.09em; text-transform: uppercase; background: #f5f0e8; border: 1px solid #d8cfc2; color: #7a6e62; padding: 0.1rem 0.45rem; }
.t-diff { font-size: 0.62rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.1rem 0.48rem; border: 1.5px solid; font-weight: 600; }
.df { color: #1a5c2e; border-color: #2d8a4e; background: #e8f5ee; }
.dm { color: #b45309; border-color: #d97706; background: #fef3e2; }
.dd { color: #9e1b1b; border-color: #c0392b; background: #fdf0ef; }
.t-alert { font-size: 0.62rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.1rem 0.45rem; border: 1.5px solid #c0392b; color: #9e1b1b; background: #fdf0ef; font-weight: 700; }
.q-num { font-size: 0.66rem; color: #7a6e62; letter-spacing: 0.07em; text-transform: uppercase; margin-left: auto; }
.q-text { font-size: 0.93rem; line-height: 1.68; margin-bottom: 0.28rem; }
.q-instr { font-size: 0.74rem; color: #7a6e62; font-style: italic; margin-bottom: 0.85rem; }
.opts { display: flex; flex-direction: column; gap: 0.38rem; margin-bottom: 0.75rem; }
.opt-btn { display: flex; align-items: flex-start; gap: 0.55rem; padding: 0.6rem 0.85rem; border: 1.5px solid #d8cfc2; background: #f5f0e8; font-family: 'Source Serif 4', serif; font-size: 0.87rem; line-height: 1.5; text-align: left; width: 100%; cursor: pointer; -webkit-appearance: none; border-radius: 0; }
.opt-btn:disabled { cursor: default; }
.opt-btn.opt-sel { border-color: #1a1612; background: #ece7dc; }
.opt-btn.opt-sel .ind { background: #1a1612; border-color: #1a1612; color: #f5f0e8; }
.ind { min-width: 21px; height: 21px; border: 1.5px solid #7a6e62; display: flex; align-items: center; justify-content: center; font-size: 0.67rem; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.val-wrap { display: flex; justify-content: flex-end; margin-bottom: 0.45rem; }
.btn-val { padding: 0.48rem 1.3rem; background: #1a1612; color: #f5f0e8; border: none; font-family: 'Source Serif 4', serif; font-size: 0.81rem; font-weight: 600; cursor: pointer; letter-spacing: 0.05em; -webkit-appearance: none; border-radius: 0; }
.btn-val:disabled { background: #d8cfc2; color: #7a6e62; cursor: default; }
.fb { margin-top: 0.65rem; padding: 0.8rem 0.95rem; font-size: 0.84rem; line-height: 1.62; border-left: 3px solid; display: none; }
.fb.visible { display: block; }
.fb-ok { border-color: #1a5c2e; background: #eef7f1; color: #1a3d26; }
.fb-ko { border-color: #9e1b1b; background: #fdf0ef; color: #7a1414; }
.fb-partial { border-color: #b8860b; background: #fdf6e3; color: #6b3d00; }
.fb strong { font-weight: 700; }
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1612; border-top: 3px solid #b8860b; display: flex; justify-content: center; gap: 0.8rem; padding: 0.75rem 1rem; z-index: 200; }
.bottom-bar button { padding: 0.6rem 1.2rem; font-family: 'Source Serif 4', serif; font-weight: 600; font-size: 0.82rem; cursor: pointer; letter-spacing: 0.04em; -webkit-appearance: none; border-radius: 0; }
.btn-recommencer { background: #b8860b; color: #1a1612; border: none; }

.bottom-space { height: 70px; }
#recap { display: none; background: #1a1612; color: #f5f0e8; padding: 2rem 1.5rem; text-align: center; margin: 1.5rem 0 0; border: 3px solid #b8860b; }
#recap h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #d4a843; margin-bottom: 0.4rem; }
#recap .big { font-size: 2.8rem; font-family: 'Playfair Display', serif; color: #fff; margin: 0.4rem 0; }
.cs-grid { margin: 1rem 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.7rem; }
.cs-item { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13); padding: 0.55rem 0.9rem; }
.cs-name { color: #d4a843; font-size: 0.62rem; letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 0.15rem; }
.cs-num { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
#recap p { font-size: 0.86rem; color: #c8bfb0; line-height: 1.72; max-width: 480px; margin: 0.8rem auto 0; }
</style>

<body>
<header>
  <div class="label">M1 Droit Civil · S7 · Mme David Balestriero</div>
  <h1>Régimes Matrimoniaux</h1>
  <div class="sub">QCM interactif — Révisions complètes</div>
</header>
<div id="scorebar">
  <div class="sc-item">Répondues&nbsp;:&nbsp;<span class="sc-num sc-total" id="sc-done">0</span><span style="color:#555">&thinsp;/&thinsp;</span><span class="sc-num sc-total" id="sc-total">—</span></div>
  <span class="sc-div">|</span>
  <div class="sc-item">✓&nbsp;<span class="sc-num sc-ok-num" id="sc-ok">0</span></div>
  <span class="sc-div">|</span>
  <div class="sc-item">✗&nbsp;<span class="sc-num sc-ko-num" id="sc-ko">0</span></div>
</div>
<div class="progress-wrap"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
<main>
  <div class="session-bar" id="sessbar"><span>Chargement…</span><button class="btn-top" onclick="newSession()">⟳ Nouvelle session</button></div>
  <div class="chap-nav" id="chapnav"></div>
  <div id="qlist"></div>
  <div id="recap"><h2>Session terminée !</h2><div class="big" id="recap-score"></div><div class="cs-grid" id="recap-chaps"></div><p id="recap-msg"></p></div>
  <div class="bottom-space"></div>
</main>
<div class="bottom-bar">
  <button class="btn-recommencer" onclick="restartSession()">↺ Recommencer</button>
  <button class="btn-nouvelle" onclick="newSession()">⟳ Nouvelle session</button>
</div>
<script>
const POOL = [

{ chap:"Régime primaire", theme:"Architecture", diff:"f", multi:false,
  q:"Quelle est la différence entre le régime primaire et le régime secondaire ?",
  opts:["Le régime primaire (arts. 212-226) est le statut fondamental d'OP s'appliquant à tous les époux résidant en France quel que soit leur RM ou nationalité / le régime secondaire est le RM proprement dit, légal ou conventionnel", "Régime primaire = règles applicables uniquement pendant le mariage / régime secondaire = règles s'appliquant après la dissolution du mariage, notamment pour les successions", "Régime primaire = régime légal supplétif (communauté réduite aux acquêts) / régime secondaire = tout régime conventionnel choisi par les époux dans un contrat de mariage", "Régime primaire = régime obligatoire pour les époux de même nationalité / régime secondaire = régime applicable aux époux de nationalités différentes selon le droit international privé"],
  correct:0,
  ok:"Architecture en 2 étages : primaire (arts. 212-226) = statut fondamental d'OP, s'applique à tous les époux résidant en fr quel que soit leur RM, nationalité ou lieu de mariage. secondaire = RM proprement dit, peut être légal (supplétif) ou conventionnel.",
  ko:"Régime primaire = règles d'OP pour tous (art. 226). Régime secondaire = RM choisi ou légal supplétif. Le primaire s'applique en plus du secondaire." },

{ chap:"Régime primaire", theme:"Charges du mariage", diff:"m", multi:false,
  q:"L'impôt fait-il partie des charges du mariage (art. 214 C.cv) ?",
  opts:["Oui, l'impôt constitue une charge du mariage au sens de l'art. 214 dès lors qu'il est dû solidairement par les époux, et chacun doit y contribuer à proportion de ses facultés respectives", "Oui, mais uniquement l'impôt sur le revenu calculé sur les revenus communs du foyer fiscal, à l'exclusion de la taxe foncière qui pèse sur le propriétaire à titre personnel", "Non — l'impôt pèse sur le contribuable en sa qualité de contribuable. La solidarité fiscale des époux est distincte de l'art. 214. Les dépenses d'investissement sont aussi exclues des charges du mariage", "Oui, l'impôt et les dépenses d'investissement constituent tous deux des charges du mariage car ils concourent au maintien du niveau de vie du foyer et sont financés par les revenus communs"],
  correct:2,
  ok:"Exclusions des charges du mariage : l'impôt (pèse sur le contribuable, solidarité fiscale distincte de l'art. 214) et les dépenses d'investissement. Les charges du mariage pèsent sur les époux même s'ils sont séparés de fait.",
  ko:"Impôt et investissement sont exclus des charges du mariage. Les charges = dépenses habituelles du couple (vie quotidienne, vacances, loisirs…)." },

{ chap:"Régime primaire", theme:"Dettes ménagères solidarité", diff:"m", multi:false, alert:true,
  q:"⚠ La solidarité de l'art. 220 al. 1 joue-t-elle pour les emprunts souscrits par un seul époux ?",
  opts:["Oui, la solidarité de l'art. 220 al. 1 s'applique à tous les actes conclus par un époux seul pour les besoins du ménage, y compris les emprunts, car ceux-ci entrent dans la catégorie des dettes ménagères", "Oui, mais uniquement si l'emprunt est inférieur à un plafond raisonnable fixé par la jurisprudence, et à condition que les sommes soient effectivement consacrées à la vie courante du foyer", "Non, jamais — aucun emprunt souscrit par un seul époux ne peut engager l'autre, car l'art. 220 ne s'applique qu'aux dépenses effectuées au comptant pour les besoins ménagers courants", "Non — art. 220 al. 3 : si emprunt ou achat à tempérament consenti par 1 seul époux, la solidarité ne joue pas, sauf si sommes modestes nécessaires à la vie courante. La preuve du caractère modeste pèse sur le créancier"],
  correct:3,
  ok:"⚠ Art. 220 al. 3 : emprunt ou achat à tempérament par 1 seul époux → solidarité ne joue pas. Exception : sommes modestes nécessaires à la vie courante. Preuve du caractère modeste et nécessaire : charge du créancier (arrêt 5 oct. 2016). Dépenses manifestement excessives (al. 2) : solidarité ne joue pas non plus.",
  ko:"⚠ Pour les emprunts : solidarité de l'art. 220 ne joue pas (exception : sommes modestes nécessaires à la vie courante). C'est l'inverse de la règle générale de l'al. 1." },

{ chap:"Régime primaire", theme:"Cogestion logement", diff:"m", multi:false, alert:true,
  q:"⚠ L'art. 215 al. 3 (cogestion du logement familial) s'applique-t-il aux résidences secondaires ?",
  opts:["Oui, à toutes les résidences effectivement occupées par la famille, y compris les résidences secondaires, dès lors qu'elles servent de cadre de vie habituel au moins une partie de l'année", "Non — il ne s'applique qu'à la résidence principale de la famille. Sanction : nullité relative à l'initiative du conjoint qui n'a pas consenti, dans un délai d'1 an à compter de la connaissance de l'acte", "Oui, mais uniquement si la résidence secondaire est le seul bien immobilier du couple, auquel cas elle devient par défaut la résidence principale pour l'application de l'art. 215 al. 3", "Non, seulement si la résidence est en location — si le logement familial appartient en propre à l'un des époux, l'art. 215 al. 3 ne s'applique pas car il n'y a pas de bien commun à protéger"],
  correct:1,
  ok:"⚠ Art. 215 al. 3 : résidence principale de la famille uniquement (pas les résidences secondaires). Peu importe qu'elle soit louée, qu'elle appartienne à l'un ou aux deux, ou à une sci. Sanction : nullité relative. Délai : 1 an à compter de la connaissance, max 1 an après dissolution du RM.",
  ko:"⚠ Cogestion art. 215 al. 3 = résidence principale uniquement. Pas les résidences secondaires. Nullité relative dans l'année de la connaissance de l'acte." },

{ chap:"Régime primaire", theme:"Art. 223 vs art. 1401", diff:"m", multi:false, alert:true,
  q:"⚠ Les salaires d'un époux sont-ils des biens propres puisqu'il a seul le pouvoir de les gérer (art. 223) ?",
  opts:["Oui, les salaires sont des biens propres en raison du pouvoir de gestion exclusive reconnu à chaque époux par l'art. 223, ce qui leur confère le même statut que les biens reçus par donation ou succession", "Oui, mais ils deviennent des biens communs dès lors qu'ils sont économisés et déposés sur un compte-joint, perdant ainsi leur caractère propre au moment de leur intégration dans le patrimoine commun", "Non — confusion à éviter : art. 223 = règle de pouvoir (seul l'époux gère ses revenus). Art. 1401 = règle de qualification (les salaires sont des biens communs dès l'origine). Ces deux règles ne sont pas contradictoires", "Non, mais uniquement parce que le régime légal est applicable — sous un régime de séparation de biens, les salaires de chaque époux sont bien des biens propres gérés exclusivement par leur titulaire"],
  correct:2,
  ok:"⚠ confusion À éviter. Art. 223 = règle de pouvoir uniquement. Art. 1401 = règle de qualification. Les salaires sont communs dès l'origine (avant même leur perception). Ce sont des biens communs à gestion exclusive (temporaire). Une fois économisés : biens communs ordinaires.",
  ko:"⚠ Art. 223 (pouvoir) ≠ art. 1401 (qualification). Salaires = communs dès l'origine (art. 1401). Mais l'époux a seul le pouvoir de les gérer (art. 223). Les deux règles coexistent sans contradiction." },

{ chap:"Régime primaire", theme:"Art. 217 vs art. 219", diff:"m", multi:false,
  q:"Quelle est la différence entre l'autorisation judiciaire (art. 217) et l'habilitation judiciaire (art. 219) ?",
  opts:["Art. 217 et art. 219 sont des synonymes désignant tous deux la possibilité pour un époux de passer un acte avec l'autorisation du juge lorsque son conjoint est dans l'impossibilité d'exprimer sa volonté", "Art. 217 : s'applique uniquement pour les actes portant sur les biens communs / art. 219 : s'applique uniquement pour les actes portant sur les biens propres du conjoint empêché, permettant à l'autre de gérer ces biens", "Art. 217 : 2 cas d'ouverture (conjoint incapable ou refus d'un acte non contraire à l'intérêt de la famille) / l'époux passe l'acte en son nom → pas d'obligations personnelles du conjoint. Art. 219 : 1 seul cas (incapacité) / l'époux passe l'acte au nom du conjoint → effets plus lourds, le conjoint représenté est lié", "Art. 217 : réservé aux situations d'urgence nécessitant une réponse immédiate du juge / art. 219 : réservé aux situations chroniques d'incapacité durable, avec nomination d'un mandataire pour une longue période"],
  correct:2,
  ok:"Art. 217 (autorisation) : 2 cas (incapacité ou refus du conjoint). L'époux passe l'acte en son nom. Opposable au conjoint mais ne crée pas d'obligations personnelles à sa charge. Art. 219 (habilitation) : 1 seul cas (incapacité). L'époux agit au nom du conjoint → le conjoint représenté est lié (effets plus lourds).",
  ko:"Art. 217 : 2 cas / acte en son nom / pas d'obligations personnelles du conjoint. Art. 219 : 1 cas seulement / acte au nom du conjoint / le conjoint est lié." },

{ chap:"Régime primaire", theme:"Autonomie mobilière", diff:"m", multi:false,
  q:"L'art. 222 C.cv (autonomie mobilière) s'applique-t-il aux meubles meublants du logement familial ?",
  opts:["Oui, à tous les meubles sans exception dès lors qu'un époux en a la détention apparente, car l'art. 222 confère une présomption irréfragable de pouvoir au profit des tiers de bonne foi", "Non — 2 limites : l'art. 222 ne s'applique pas aux meubles meublants du logement familial (art. 215 al. 3) ni aux biens propres par nature (art. 1404 al. 2 : vêtements, bijoux). Il s'applique en revanche aux meubles corporels et incorporels", "Oui, sauf si la valeur du meuble dépasse un seuil fixé par la jurisprudence, au-delà duquel le tiers ne peut plus se prévaloir de la présomption de pouvoir de l'art. 222", "Non, l'art. 222 ne s'applique jamais aux immeubles ni aux meubles meublants, et exige toujours le consentement des deux époux pour tout acte portant sur des biens garnissant le logement familial"],
  correct:1,
  ok:"Art. 222 (autonomie mobilière) : ne s'applique pas aux meubles meublants du logement familial (art. 215 al. 3) ni aux biens propres par nature (vêtements, bijoux). S'applique aux meubles corporels et incorporels (y compris sommes d'argent). La bonne foi du tiers s'apprécie au jour du contrat.",
  ko:"Art. 222 a deux limites importantes : meubles meublants du logement familial (cogestion) et biens propres par nature (vêtements, bijoux). Hors ces exceptions, s'applique aux meubles corporels et incorporels." },

{ chap:"Chap. 1 — Communauté d'acquêts", theme:"Acquêts", diff:"f", multi:false,
  q:"Quels sont les 2 critères cumulatifs d'un acquêt (bien commun) au sens de l'art. 1401 ?",
  opts:["Acquis pendant le mariage + par les deux époux conjointement, ce qui exclut les biens acquis par un seul époux avec des deniers qui lui appartiennent en propre", "Acquis à titre onéreux + acquis au cours du mariage (par l'un ou les deux époux)", "Acquis avec des deniers provenant des revenus communs + pendant la durée du mariage, à l'exclusion des acquisitions financées par des fonds propres même pendant le mariage", "Acquis après la célébration du mariage + sans qu'aucune clause de remploi n'ait été insérée dans l'acte d'acquisition pour en conserver le caractère propre"],
  correct:1,
  ok:"Acquêt (art. 1401) : 2 critères cumulatifs. (1) Acquisition à titre onéreux. (2) Acquisition au cours du mariage. L'acquisition peut être faite par un seul époux ou les deux. ⚠ L'acquêt au sens du régime légal ≠ acquêt au sens du régime de participation aux acquêts.",
  ko:"Acquêt : titre onéreux + pendant le mariage. Par l'un ou les deux époux. Les donations et successions reçues pendant le mariage sont propres (pas des acquêts)." },

{ chap:"Chap. 1 — Communauté d'acquêts", theme:"Fruits des propres", diff:"m", multi:false, alert:true,
  q:"⚠ Les loyers d'un bien propre d'un époux sont-ils communs ou propres ?",
  opts:["Propres car ils appartiennent au propriétaire du bien générateur : les fruits suivent le régime du bien dont ils proviennent, et un bien propre ne peut produire que des fruits propres selon le principe d'accessoire", "Communs uniquement s'ils ont été déposés sur un compte joint ou réinvestis dans un bien commun, car c'est le moment de la perception effective qui détermine leur qualification définitive", "Propres si le bien propre a été acquis avant le mariage, communs s'il a été acquis pendant le mariage à titre gratuit, car la donation pendant le mariage fait entrer les fruits dans la communauté", "communs dès leur perception (art. 1403). Mais la plus-value sur la revente d'un bien propre ne tombe pas dans la communauté — ce n'est pas un fruit ni un revenu, c'est un élément comptable"],
  correct:3,
  ok:"⚠ Art. 1403 : les fruits et revenus de tous les biens propres (loyers, dividendes, intérêts…) sont communs dès leur perception. pas besoin de prouver qu'ils ont été consommés. mais : fruits ≠ plus-value. La plus-value sur revente d'un bien propre ne tombe pas dans la communauté.",
  ko:"⚠ Loyers d'un bien propre = communs dès perception. Mais plus-value sur revente d'un bien propre = pas dans la communauté (ce n'est pas un fruit, c'est un élément comptable)." },

{ chap:"Chap. 1 — Communauté d'acquêts", theme:"Biens propres par origine", diff:"m", multi:false,
  q:"Un bien acquis pendant le mariage par donation est-il propre ou commun ?",
  opts:["Toujours commun, quelle que soit son origine, car il est acquis pendant le mariage à titre gratuit et l'art. 1401 pose une présomption de communauté pour tous les biens acquis pendant le mariage", "propre en principe (art. 1405). Exceptions : bien donné aux 2 époux conjointement → commun (sauf clause contraire) / bien donné avec clause tombant en communauté → commun (avec récompense)", "Propre uniquement si la donation émane des parents ou grands-parents de l'époux, car les libéralités de la famille directe conservent leur caractère propre quel que soit le moment de leur réception", "Commun si la donation porte sur une somme d'argent qui a ensuite été investie dans un bien immobilier, propre si elle porte directement sur un bien identifié dans l'acte de donation"],
  correct:1,
  ok:"Art. 1405 : biens acquis par succession, donation ou legs = propres en principe. Exceptions : (1) bien donné ou légué aux 2 époux conjointement → commun sauf clause contraire dans la donation / (2) bien donné avec clause tombant en communauté → commun mais récompense à la liquidation.",
  ko:"Donation = propre en principe (art. 1405). Exceptions : donation aux deux époux conjointement (→ commun) ou donation avec clause tombant en communauté (→ commun + récompense)." },

{ chap:"Chap. 1 — Communauté d'acquêts", theme:"Biens propres par nature", diff:"m", multi:false,
  q:"L'indemnité reçue par un époux pour un dommage corporel est-elle un bien propre ou commun ?",

  ko:"Indemnité pour dommage corporel = propre par nature (art. 1404) sans récompense. L'action et l'indemnité sont attachées à la personne." },

{ chap:"Chap. 1 — Communauté d'acquêts", theme:"Présomption de communauté", diff:"m", multi:false, alert:true,

  ko:"⚠ Présomption de communauté (art. 1402) : tout bien est présumé commun. Celui qui veut établir le caractère propre d'un bien doit le prouver. Présomption simple → preuve contraire admise." },

  ko:"⚠ Art. 1469 : principe = la plus faible. Exception 1 (nécessaire) → au moins la dépense. Exception 2 (acquisition/conservation/amélioration) → au moins le profit subsistant. Cumul des deux → la plus forte." },

const CHAPTER_ORDER = [
  "Régime primaire",
  "Chap. 1 — Communauté d'acquêts",
  "Chap. 1 — Liquidation"
];
const N = 30;
let sessionQ=[], state=[], currentFilter='all';

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pickSession(){
  const byChap={};CHAPTER_ORDER.forEach(ch=>{byChap[ch]=[];});
  POOL.forEach(q=>{if(byChap[q.chap])byChap[q.chap].push(q);});
  let picked=[];
  CHAPTER_ORDER.forEach(ch=>{
    const pool=shuffle(byChap[ch]||[]);
    const quota=Math.round((pool.length/POOL.length)*N);
    picked=picked.concat(pool.slice(0,quota));
  });
  const remaining=shuffle(POOL.filter(q=>!picked.includes(q)));
  while(picked.length<N&&remaining.length>0)picked.push(remaining.shift());
  picked.sort((a,b)=>CHAPTER_ORDER.indexOf(a.chap)-CHAPTER_ORDER.indexOf(b.chap));
  return picked;
}
document.addEventListener('DOMContentLoaded',newSession);
function newSession(){
  sessionQ=pickSession();state=sessionQ.map(()=>({answered:false,selected:[],isCorrect:false}));
  currentFilter='all';document.getElementById('recap').style.display='none';
  document.getElementById('sessbar').innerHTML=`<span>Session en cours · <strong>${sessionQ.length} questions</strong> tirées sur ${POOL.length} disponibles</span><button class="btn-top" onclick="newSession()">⟳ Nouvelle session</button>`;
  buildNav();renderAll();updateScore();window.scrollTo({top:0,behavior:'smooth'});
}
function restartSession(){
  state=sessionQ.map(()=>({answered:false,selected:[],isCorrect:false}));
  document.getElementById('recap').style.display='none';currentFilter='all';buildNav();renderAll();updateScore();window.scrollTo({top:0,behavior:'smooth'});
}
function buildNav(){
  const nav=document.getElementById('chapnav');nav.innerHTML='';
  ['all',...CHAPTER_ORDER.filter(ch=>sessionQ.some(q=>q.chap===ch))].forEach(ch=>{
    const btn=document.createElement('button');btn.className='chap-btn'+(ch===currentFilter?' active':'');
    btn.textContent=ch==='all'?'📋 Toutes':ch;btn.onclick=()=>{currentFilter=ch;buildNav();renderAll();};nav.appendChild(btn);
  });
}
function renderAll(){
  const container=document.getElementById('qlist');container.innerHTML='';document.getElementById('sc-total').textContent=sessionQ.length;
  const filtered=sessionQ.map((q,i)=>({...q,idx:i})).filter(q=>currentFilter==='all'||q.chap===currentFilter);
  const byChap={};CHAPTER_ORDER.forEach(ch=>{byChap[ch]=[];});filtered.forEach(q=>{byChap[q.chap].push(q);});
  let num=0;
  CHAPTER_ORDER.forEach(ch=>{
    const qs=byChap[ch];if(!qs||!qs.length)return;
    if(currentFilter==='all'){const hdr=document.createElement('div');hdr.className='chap-hdr';hdr.innerHTML=`<h2>${ch}</h2><span class="chap-cnt">${qs.length} question${qs.length>1?'s':''}</span>`;container.appendChild(hdr);}
    qs.forEach(q=>{num++;container.appendChild(buildCard(q,num));});
  });updateProgress();
}
function buildCard(q,num){
  const s=state[q.idx];const card=document.createElement('div');card.className='q-card';card.id='c'+q.idx;
  const dc={f:'df',m:'dm',d:'dd'}[q.diff]||'';const dl={f:'● Facile',m:'● Moyen',d:'● Difficile'}[q.diff]||'';
  card.innerHTML=`<div class="q-meta"><span class="t-chap">${q.chap}</span><span class="t-theme">${q.theme}</span><span class="t-diff ${dc}">${dl}</span>${q.alert?'<span class="t-alert">⚠ À retenir</span>':''}<span class="q-num">Q${num}</span></div><div class="q-text">${q.q}</div><div class="q-instr">${q.multi?'📝 Plusieurs bonnes réponses — cochez tout ce qui est juste, puis validez.':'📝 Une seule bonne réponse — choisissez, puis validez.'}</div><div class="opts" id="opts${q.idx}">${q.opts.map((o,oi)=>`<button class="opt-btn" id="o${q.idx}_${oi}" onclick="toggle(${q.idx},${oi},${q.multi})" ${s.answered?'disabled':''}><span class="ind">${String.fromCharCode(65+oi)}</span><span>${o}</span></button>`).join('')}</div><div class="val-wrap"><button class="btn-val" id="v${q.idx}" onclick="validate(${q.idx})" ${s.answered||s.selected.length===0?'disabled':''}>Valider ma réponse</button></div><div class="fb" id="fb${q.idx}"></div>`;
  if(s.answered)applyCard(q.idx,q,s);return card;
}
function toggle(qi,oi,multi){
  const s=state[qi];if(s.answered)return;
  s.selected=multi?(s.selected.includes(oi)?s.selected.filter(x=>x!==oi):[...s.selected,oi]):[oi];
  sessionQ[qi].opts.forEach((_,i)=>{const b=document.getElementById(`o${qi}_${i}`);if(!b)return;const sel=s.selected.includes(i);b.className='opt-btn'+(sel?' opt-sel':'');const ind=b.querySelector('.ind');ind.style.cssText=sel?'background:#1a1612;border-color:#1a1612;color:#f5f0e8':'';});
  const v=document.getElementById('v'+qi);if(v)v.disabled=s.selected.length===0;
}
function validate(qi){
  const s=state[qi];if(s.answered||s.selected.length===0)return;s.answered=true;
  const q=sessionQ[qi];const corrects=Array.isArray(q.correct)?q.correct:[q.correct];
  const selSet=new Set(s.selected),corSet=new Set(corrects);
  s.isCorrect=[...selSet].every(i=>corSet.has(i))&&[...corSet].every(i=>selSet.has(i));
  q.opts.forEach((_,oi)=>{const b=document.getElementById(`o${qi}_${oi}`);if(b)b.disabled=true;});
  const v=document.getElementById('v'+qi);if(v)v.disabled=true;
  applyCard(qi,q,s);updateScore();updateProgress();checkComplete();
}
function isPartial(q,s){if(!q.multi)return false;const c=Array.isArray(q.correct)?q.correct:[q.correct];return s.selected.filter(i=>c.includes(i)).length>0&&s.selected.filter(i=>c.includes(i)).length<c.length;}
function applyCard(qi,q,s){
  const corrects=Array.isArray(q.correct)?q.correct:[q.correct];
  q.opts.forEach((_,oi)=>{
    const b=document.getElementById(`o${qi}_${oi}`);if(!b)return;const ind=b.querySelector('.ind');b.removeAttribute('style');if(ind)ind.removeAttribute('style');
    if(corrects.includes(oi)&&s.selected.includes(oi)){b.style.setProperty('border-color','#1a5c2e');b.style.setProperty('background-color','#eef7f1');b.style.setProperty('color','#1a5c2e');if(ind){ind.style.setProperty('background','#1a5c2e');ind.style.setProperty('border-color','#1a5c2e');ind.style.setProperty('color','#fff');}}
    else if(!corrects.includes(oi)&&s.selected.includes(oi)){b.style.setProperty('border-color','#9e1b1b');b.style.setProperty('background-color','#fdf0ef');b.style.setProperty('color','#9e1b1b');if(ind){ind.style.setProperty('background','#9e1b1b');ind.style.setProperty('border-color','#9e1b1b');ind.style.setProperty('color','#fff');}}
    else if(corrects.includes(oi)&&!s.selected.includes(oi)){b.style.setProperty('border-color','#b8860b');b.style.setProperty('background-color','#fffbf0');b.style.setProperty('color','#7a4800');if(ind){ind.style.setProperty('background','#b8860b');ind.style.setProperty('border-color','#b8860b');ind.style.setProperty('color','#fff');}}
  });
  const fb=document.getElementById(`fb${qi}`);
  if(fb){const partial=isPartial(q,s);let cls,txt;if(s.isCorrect){cls='fb-ok';txt=`<strong>✓ Bonne réponse !</strong> ${q.ok}`;}else if(partial){cls='fb-partial';txt=`<strong>⚠ Réponse incomplète.</strong> ${q.ko}`;}else{cls='fb-ko';txt=`<strong>✗ Mauvaise réponse.</strong> ${q.ko}`;}fb.className='fb visible '+cls;fb.innerHTML=txt;}
}
function updateScore(){const done=state.filter(s=>s.answered).length,ok=state.filter(s=>s.answered&&s.isCorrect).length;document.getElementById('sc-done').textContent=done;document.getElementById('sc-ok').textContent=ok;document.getElementById('sc-ko').textContent=done-ok;}
function updateProgress(){document.getElementById('pbar').style.width=(state.filter(s=>s.answered).length/sessionQ.length*100)+'%';}
function checkComplete(){
  if(state.filter(s=>s.answered).length<sessionQ.length)return;
  const ok=state.filter(s=>s.isCorrect).length,pct=Math.round(ok/sessionQ.length*100);
  let chapHTML='';CHAPTER_ORDER.forEach(ch=>{const cqs=sessionQ.map((q,i)=>({...q,idx:i})).filter(q=>q.chap===ch);if(!cqs.length)return;const cok=cqs.filter(q=>state[q.idx].isCorrect).length;chapHTML+=`<div class="cs-item"><div class="cs-name">${ch}</div><div class="cs-num">${cok} / ${cqs.length}</div></div>`;});
  document.getElementById('recap-chaps').innerHTML=chapHTML;document.getElementById('recap-score').textContent=`${ok} / ${sessionQ.length} (${pct}%)`;
  const msgs=['Reprends la fiche depuis le début. Commence par les 2 étages (primaire/secondaire), les critères de l\'acquêt, puis la distinction propres/communs.','Résultat moyen. Revois les confusions à éviter (art. 223 vs art. 1401, récompenses vs créances entre propres), la présomption de communauté et l\'art. 1415.','Bon travail ! Consolide les points délicats : emploi/remploi (double déclaration, condition ≥ moitié), art. 1469 (cumul des exceptions), et la règle de l\'accessoire.','Excellent ! Tu maîtrises très bien ce cours. Revois les quelques points manqués avant le cas pratique.'];
  document.getElementById('recap-msg').textContent=msgs[pct>=85?3:pct>=70?2:pct>=50?1:0];document.getElementById('recap').style.display='block';setTimeout(()=>document.getElementById('recap').scrollIntoView({behavior:'smooth',block:'start'}),200);
}
</script>
