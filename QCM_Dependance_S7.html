    opts:["Toute personne nommée par le juge, y compris un mandataire professionnel si aucun proche n'est disponible", "Toute personne de confiance choisie librement par le majeur, y compris des amis ou voisins proches", "Uniquement les enfants et le conjoint, à l'exclusion des autres membres de la famille", "Nécessairement : ascendants, descendants, frères et sœurs, conjoint/partenaire/concubin (sauf vie commune cessée) — plusieurs personnes possibles"],
    correct:3,
    ok:"Art. 494-4 al. 2 : la personne habilitée est nécessairement choisie parmi : ascendants, descendants, frères et sœurs, conjoint/partenaire/concubin (sauf vie commune cessée). Plusieurs personnes peuvent être désignées. Pas de subrogé habilité. Empêchements minimaux.",

    q:"Quelle est la durée maximale d'une habilitation générale, et dans quel cas peut-elle être renouvelée 20 ans ?",
    opts:["Max 10 ans / renouvelable 10 ans (ou 20 ans si aucune amélioration possible)", "Max 5 ans / renouvelable 20 ans si amélioration médicalement impossible", "Max 10 ans / non renouvelable au-delà quelle que soit l'évolution de l'état de la personne", "Max 20 ans directement si le médecin atteste que l'amélioration de l'état est impossible"],

    ok:"Habilitation générale : max 10 ans. Renouvelable 10 ans. Si aucune amélioration possible : renouvelable 20 ans. L'habilitation spéciale prend fin quand les actes autorisés ont été accomplis.",
    ko:"Habilitation générale : max 10 ans, renouvelable 10 ans (ou 20 ans si aucune amélioration possible). Habilitation spéciale : prend fin à l'accomplissement des actes autorisés." },

  { chap:"Chap. 5 — Habilitation familiale", theme:"Rôle du juge", diff:"m", multi:false, alert:true,
    q:"⚠ Quelle est la particularité du rôle du juge dans l'habilitation familiale par rapport aux autres régimes ?",
    opts:["Le juge n'intervient en principe qu'au moment du prononcé — les proches ou le procureur peuvent le saisir en cas de difficultés", "Le juge intervient beaucoup plus que dans la tutelle, avec des comptes rendus annuels et des autorisations pour chaque acte important", "Le juge est remplacé par le conseil de famille qui assure l'ensemble du contrôle de la mesure", "Le juge nomme toujours un subrogé habilité pour contrôler l'action de la personne habilitée"],
    correct:0,
    ok:"Dans l'habilitation familiale, le juge n'intervient en principe qu'au moment du prononcé (≠ tutelle où le juge intervient à l'ouverture, pendant le fonctionnement et à la main levée). Les proches ou le procureur peuvent le saisir en cas de difficultés. Pas de subrogé habilité.",
    ko:"Le juge n'intervient qu'au moment du prononcé dans l'habilitation familiale (contrairement à la tutelle où il est présent tout au long). Pas de subrogé habilité." },

  { chap:"Chap. 5 — Habilitation familiale", theme:"Fin mesure", diff:"m", multi:false,
    q:"Comment prend fin l'habilitation familiale ?",
    opts:["Elle est irrévocable une fois prononcée — seule une nouvelle mesure de protection peut la modifier", "Uniquement par le décès du majeur ou de la personne habilitée, la mesure étant irrévocable une fois prononcée", "Uniquement par décision du juge sur demande de la famille ou du procureur de la République", "Décès / expiration du délai / main levée / placement sous SDJ-curatelle-tutelle / accomplissement des actes prévus (habilitation spéciale)"],
    correct:3,
    ok:"Fin de l'habilitation familiale : décès / expiration du délai / main levée / placement sous SDJ-curatelle-tutelle / accomplissement des actes prévus (pour l'habilitation spéciale).",
    ko:"Fin de l'habilitation familiale : plusieurs causes possibles dont le placement sous une autre mesure de protection (tutelle, curatelle, SDJ)." }
];

const CHAPTER_ORDER = [
  "Introduction",
  "Chap. 1 — Diversité des protections",
  "Chap. 2 — Règles communes",
  "Chap. 3 — Protection de la personne",
  "Chap. 4 — Protection du patrimoine",
  "Chap. 5 — Habilitation familiale"
];
const N = 30;

let sessionQ = [], state = [], currentFilter = 'all';

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [b[i],b[j]] = [b[j],b[i]];
  }
  return b;
}

function pickSession() {
  const byChap = {};
  CHAPTER_ORDER.forEach(ch => { byChap[ch] = []; });
  POOL.forEach(q => { if (byChap[q.chap]) byChap[q.chap].push(q); });
  let picked = [];
  CHAPTER_ORDER.forEach(ch => {
    const pool = shuffle(byChap[ch]||[]);
    const quota = Math.round((pool.length/POOL.length)*N);
    picked = picked.concat(pool.slice(0, quota));
  });
  const remaining = shuffle(POOL.filter(q=>!picked.includes(q)));
  while (picked.length<N && remaining.length>0) picked.push(remaining.shift());
  picked.sort((a,b)=>CHAPTER_ORDER.indexOf(a.chap)-CHAPTER_ORDER.indexOf(b.chap));
  return picked;
}

document.addEventListener('DOMContentLoaded', newSession);

function newSession() {
  sessionQ = pickSession();
  state = sessionQ.map(()=>({answered:false,selected:[],isCorrect:false}));
  currentFilter = 'all';
  document.getElementById('recap').style.display = 'none';
  document.getElementById('sessbar').innerHTML =
    `<span>Session en cours · <strong>${sessionQ.length} questions</strong> tirées sur ${POOL.length} disponibles</span>
     <button class="btn-top" onclick="newSession()">⟳ Nouvelle session</button>`;
  buildNav(); renderAll(); updateScore();
  window.scrollTo({top:0,behavior:'smooth'});
}

function restartSession() {
  state = sessionQ.map(()=>({answered:false,selected:[],isCorrect:false}));
  document.getElementById('recap').style.display = 'none';
  currentFilter = 'all';
  buildNav(); renderAll(); updateScore();
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildNav() {
  const nav = document.getElementById('chapnav');
  nav.innerHTML = '';
  ['all',...CHAPTER_ORDER.filter(ch=>sessionQ.some(q=>q.chap===ch))].forEach(ch=>{
    const btn = document.createElement('button');
    btn.className = 'chap-btn'+(ch===currentFilter?' active':'');
    btn.textContent = ch==='all'?'📋 Toutes':ch;
    btn.onclick = ()=>{currentFilter=ch;buildNav();renderAll();};
    nav.appendChild(btn);
  });
}

function renderAll() {
  const container = document.getElementById('qlist');
  container.innerHTML = '';
  document.getElementById('sc-total').textContent = sessionQ.length;
  const filtered = sessionQ.map((q,i)=>({...q,idx:i})).filter(q=>currentFilter==='all'||q.chap===currentFilter);
  const byChap = {};
  CHAPTER_ORDER.forEach(ch=>{byChap[ch]=[];});
  filtered.forEach(q=>{byChap[q.chap].push(q);});
  let num = 0;
  CHAPTER_ORDER.forEach(ch=>{
    const qs = byChap[ch];
    if (!qs||!qs.length) return;
    if (currentFilter==='all') {
      const hdr = document.createElement('div');
      hdr.className = 'chap-hdr';
      hdr.innerHTML = `<h2>${ch}</h2><span class="chap-cnt">${qs.length} question${qs.length>1?'s':''}</span>`;
      container.appendChild(hdr);
    }
    qs.forEach(q=>{num++;container.appendChild(buildCard(q,num));});
  });
  updateProgress();
}

function buildCard(q,num) {
  const s = state[q.idx];
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = 'c'+q.idx;
  const dc={f:'df',m:'dm',d:'dd'}[q.diff]||'';
  const dl={f:'● Facile',m:'● Moyen',d:'● Difficile'}[q.diff]||'';
  card.innerHTML = `
    <div class="q-meta">
      <span class="t-chap">${q.chap}</span>
      <span class="t-theme">${q.theme}</span>
      <span class="t-diff ${dc}">${dl}</span>
      ${q.alert?'<span class="t-alert">⚠ À retenir</span>':''}
      <span class="q-num">Q${num}</span>
    </div>
    <div class="q-text">${q.q}</div>
    <div class="q-instr">${q.multi?'📝 Plusieurs bonnes réponses — cochez tout ce qui est juste, puis validez.':'📝 Une seule bonne réponse — choisissez, puis validez.'}</div>
    <div class="opts" id="opts${q.idx}">
      ${q.opts.map((o,oi)=>`
        <button class="opt-btn" id="o${q.idx}_${oi}" onclick="toggle(${q.idx},${oi},${q.multi})" ${s.answered?'disabled':''}>
          <span class="ind">${String.fromCharCode(65+oi)}</span>
          <span>${o}</span>
        </button>`).join('')}
    </div>
    <div class="val-wrap">
      <button class="btn-val" id="v${q.idx}" onclick="validate(${q.idx})" ${s.answered||s.selected.length===0?'disabled':''}>Valider ma réponse</button>
    </div>
    <div class="fb" id="fb${q.idx}"></div>`;
  if (s.answered) applyCard(q.idx, q, s);
  return card;
}

function toggle(qi,oi,multi) {
  const s = state[qi];
  if (s.answered) return;
  s.selected = multi
    ? (s.selected.includes(oi)?s.selected.filter(x=>x!==oi):[...s.selected,oi])
    : [oi];
  sessionQ[qi].opts.forEach((_,i)=>{
    const b = document.getElementById(`o${qi}_${i}`);
    if (!b) return;
    const sel = s.selected.includes(i);
    b.className = 'opt-btn'+(sel?' opt-sel':'');
    const ind = b.querySelector('.ind');
    ind.style.cssText = sel?'background:#1a1612;border-color:#1a1612;color:#f5f0e8':'';
  });
  const v = document.getElementById('v'+qi);
  if (v) v.disabled = s.selected.length===0;
}

function validate(qi) {
  const s = state[qi];
  if (s.answered||s.selected.length===0) return;
  s.answered = true;
  const q = sessionQ[qi];
  const corrects = Array.isArray(q.correct)?q.correct:[q.correct];
  const selSet = new Set(s.selected);
  const corSet = new Set(corrects);
  s.isCorrect = [...selSet].every(i=>corSet.has(i))&&[...corSet].every(i=>selSet.has(i));
  q.opts.forEach((_,oi)=>{
    const b = document.getElementById(`o${qi}_${oi}`);
    if (b) b.disabled = true;
  });
  const v = document.getElementById('v'+qi);
  if (v) v.disabled = true;
  applyCard(qi, q, s);
  updateScore(); updateProgress(); checkComplete();
}

function isPartial(q,s) {
  if (!q.multi) return false;
  const c = Array.isArray(q.correct)?q.correct:[q.correct];
  return s.selected.filter(i=>c.includes(i)).length>0 && s.selected.filter(i=>c.includes(i)).length<c.length;
}

function applyCard(qi,q,s) {
  const corrects = Array.isArray(q.correct)?q.correct:[q.correct];
  q.opts.forEach((_,oi)=>{
    const b = document.getElementById(`o${qi}_${oi}`);
    if (!b) return;
    const ind = b.querySelector('.ind');
    b.removeAttribute('style');
    if (ind) ind.removeAttribute('style');
    if (corrects.includes(oi)&&s.selected.includes(oi)) {
      b.style.setProperty('border-color','#1a5c2e');
      b.style.setProperty('background-color','#eef7f1');
      b.style.setProperty('color','#1a5c2e');
      if (ind){ind.style.setProperty('background','#1a5c2e');ind.style.setProperty('border-color','#1a5c2e');ind.style.setProperty('color','#fff');}
    } else if (!corrects.includes(oi)&&s.selected.includes(oi)) {
      b.style.setProperty('border-color','#9e1b1b');
      b.style.setProperty('background-color','#fdf0ef');
      b.style.setProperty('color','#9e1b1b');
      if (ind){ind.style.setProperty('background','#9e1b1b');ind.style.setProperty('border-color','#9e1b1b');ind.style.setProperty('color','#fff');}
    } else if (corrects.includes(oi)&&!s.selected.includes(oi)) {
      b.style.setProperty('border-color','#b8860b');
      b.style.setProperty('background-color','#fffbf0');
      b.style.setProperty('color','#7a4800');
      if (ind){ind.style.setProperty('background','#b8860b');ind.style.setProperty('border-color','#b8860b');ind.style.setProperty('color','#fff');}
    }
  });
  const fb = document.getElementById(`fb${qi}`);
  if (fb) {
    const partial = isPartial(q,s);
    let cls,txt;
    if (s.isCorrect){cls='fb-ok';txt=`<strong>✓ Bonne réponse !</strong> ${q.ok}`;}
    else if (partial){cls='fb-partial';txt=`<strong>⚠ Réponse incomplète.</strong> ${q.ko}`;}
    else{cls='fb-ko';txt=`<strong>✗ Mauvaise réponse.</strong> ${q.ko}`;}
    fb.className='fb visible '+cls;
    fb.innerHTML=txt;
  }
}

function updateScore() {
  const done = state.filter(s=>s.answered).length;
  const ok = state.filter(s=>s.answered&&s.isCorrect).length;
  document.getElementById('sc-done').textContent=done;
  document.getElementById('sc-ok').textContent=ok;
  document.getElementById('sc-ko').textContent=done-ok;
}

function updateProgress() {
  const done = state.filter(s=>s.answered).length;
  document.getElementById('pbar').style.width=(done/sessionQ.length*100)+'%';
}

function checkComplete() {
  if (state.filter(s=>s.answered).length<sessionQ.length) return;
  const ok = state.filter(s=>s.isCorrect).length;
  const pct = Math.round(ok/sessionQ.length*100);
  let chapHTML = '';
  CHAPTER_ORDER.forEach(ch=>{
    const cqs = sessionQ.map((q,i)=>({...q,idx:i})).filter(q=>q.chap===ch);
    if (!cqs.length) return;
    const cok = cqs.filter(q=>state[q.idx].isCorrect).length;
    chapHTML+=`<div class="cs-item"><div class="cs-name">${ch}</div><div class="cs-num">${cok} / ${cqs.length}</div></div>`;
  });
  document.getElementById('recap-chaps').innerHTML=chapHTML;
  document.getElementById('recap-score').textContent=`${ok} / ${sessionQ.length} (${pct}%)`;
  const msgs=['Il faut retravailler la fiche en profondeur. Commence par les définitions de base (SDJ, curatelle, tutelle) et les 3 principes.','Résultat moyen. Revois les distinctions entre régimes, les actes pouvant être faits seul/avec assistance/avec représentation, et les ⚠ À retenir.','Bon résultat ! Concentre-toi sur les points délicats : sanctions des actes irréguliers, habilitation familiale, droits relatifs à la santé.','Excellent ! Tu maîtrises très bien ce cours. Revois les quelques points manqués avant l\'exam.'];
  document.getElementById('recap-msg').textContent=msgs[pct>=85?3:pct>=70?2:pct>=50?1:0];
  document.getElementById('recap').style.display='block';
  setTimeout(()=>document.getElementById('recap').scrollIntoView({behavior:'smooth',block:'start'}),200);
}
</script>
