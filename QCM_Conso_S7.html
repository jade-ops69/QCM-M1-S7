<title>QCM — Droit de la Consommation S7</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { font-family: 'Source Serif 4', Georgia, serif; background: #f5f0e8; color: #1a1612; min-height: 100vh; }

header { background: #1a1612; color: #f5f0e8; padding: 1.8rem 1.2rem 1.4rem; text-align: center; border-bottom: 4px solid #b8860b; }
header .label { font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: #d4a843; margin-bottom: 0.35rem; }
header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.3rem, 5vw, 2.1rem); font-weight: 900; }
header .sub { margin-top: 0.35rem; font-size: 0.8rem; color: #b0a898; font-style: italic; }

#scorebar {
  background: #111; color: #f5f0e8;
  padding: 0.55rem 1rem;
  display: flex; justify-content: center; align-items: center;
  gap: 1rem; font-size: 0.78rem;
  border-bottom: 2px solid #b8860b;
  position: sticky; top: 0; z-index: 100; flex-wrap: wrap;
}
.sc-item { display: flex; align-items: center; gap: 0.3rem; }
.sc-num { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; }
.sc-total { color: #d4a843; }
.sc-ok-num { color: #5cb878; }
.sc-ko-num { color: #e07070; }
.sc-div { color: #444; }

.progress-wrap { background: #2a2520; height: 4px; }
.progress-fill { height: 4px; background: #b8860b; transition: width 0.4s ease; }

main { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem 2rem; }

.session-bar {
  background: #fff; border: 1px solid #d8cfc2; border-left: 4px solid #b8860b;
  padding: 0.8rem 1.1rem; margin-bottom: 1.3rem;
  font-size: 0.81rem; color: #7a6e62;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem;
}
.session-bar strong { color: #1a1612; }
.btn-top {
  padding: 0.38rem 0.9rem; background: #1a1612; color: #d4a843;
  border: 1.5px solid #b8860b; font-family: 'Source Serif 4', serif;
  font-size: 0.76rem; cursor: pointer; letter-spacing: 0.04em;
  -webkit-appearance: none; border-radius: 0;
}

.chap-nav { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.4rem; padding-bottom: 1rem; border-bottom: 1px solid #d8cfc2; }
.chap-btn {
  background: transparent; border: 1.5px solid #d8cfc2; color: #7a6e62;
  padding: 0.38rem 0.8rem; font-family: 'Source Serif 4', serif; font-size: 0.74rem;
  cursor: pointer; letter-spacing: 0.03em; -webkit-appearance: none; border-radius: 0;
}
.chap-btn.active { background: #1a1612; color: #f5f0e8; border-color: #1a1612; }

.chap-hdr { margin: 1.8rem 0 0.9rem; padding-bottom: 0.45rem; border-bottom: 2px solid #b8860b; display: flex; align-items: baseline; gap: 0.8rem; }
.chap-hdr h2 { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; }
.chap-cnt { font-size: 0.7rem; color: #7a6e62; letter-spacing: 0.07em; text-transform: uppercase; }

/* CARD */
.q-card { background: #fff; border: 1px solid #d8cfc2; border-left: 4px solid #b8860b; margin-bottom: 1.3rem; padding: 1.2rem 1.3rem; }

.q-meta { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
.t-chap { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; background: #1a1612; color: #d4a843; padding: 0.1rem 0.48rem; font-weight: 600; }
.t-theme { font-size: 0.62rem; letter-spacing: 0.09em; text-transform: uppercase; background: #f5f0e8; border: 1px solid #d8cfc2; color: #7a6e62; padding: 0.1rem 0.45rem; }
.t-diff { font-size: 0.62rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.1rem 0.48rem; border: 1.5px solid; font-weight: 600; }
.df { color: #1a5c2e; border-color: #2d8a4e; background: #e8f5ee; }
.dm { color: #b45309; border-color: #d97706; background: #fef3e2; }
.dd { color: #9e1b1b; border-color: #c0392b; background: #fdf0ef; }
.t-alert { font-size: 0.62rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.1rem 0.45rem; border: 1.5px solid #c0392b; color: #9e1b1b; background: #fdf0ef; font-weight: 700; }
.q-num { font-size: 0.66rem; color: #7a6e62; letter-spacing: 0.07em; text-transform: uppercase; margin-left: auto; }

.q-text { font-size: 0.93rem; line-height: 1.68; margin-bottom: 0.28rem; }
.q-instr { font-size: 0.74rem; color: #7a6e62; font-style: italic; margin-bottom: 0.85rem; }

/* OPTIONS */
.opts { display: flex; flex-direction: column; gap: 0.38rem; margin-bottom: 0.75rem; }

.opt-btn {
  display: flex; align-items: flex-start; gap: 0.55rem;
  padding: 0.6rem 0.85rem;
  border: 1.5px solid #d8cfc2; background: #f5f0e8;
  font-family: 'Source Serif 4', serif; font-size: 0.87rem; line-height: 1.5;
  text-align: left; width: 100%; cursor: pointer;
  -webkit-appearance: none; border-radius: 0;
  transition: border-color 0.12s, background 0.12s;
}
.opt-btn:disabled { cursor: default; }
.opt-btn.opt-hover { border-color: #b8860b; background: #fdf8ee; }
.opt-btn.opt-sel { border-color: #1a1612; background: #ece7dc; }

.ind {
  min-width: 21px; height: 21px;
  border: 1.5px solid #7a6e62;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.67rem; font-weight: 700; flex-shrink: 0; margin-top: 1px;
}
.opt-btn.opt-sel .ind { background: #1a1612; border-color: #1a1612; color: #f5f0e8; }

/* Résultats — classes séparées sans !important pour Safari */
.opt-correct { border-color: #1a5c2e; background: #eef7f1; color: #1a5c2e; }
.opt-correct .ind { background: #1a5c2e; border-color: #1a5c2e; color: #fff; }
.opt-wrong   { border-color: #9e1b1b; background: #fdf0ef; color: #9e1b1b; }
.opt-wrong   .ind { background: #9e1b1b; border-color: #9e1b1b; color: #fff; }
.opt-missed  { border-color: #b8860b; background: #fffbf0; color: #7a4800; }
.opt-missed  .ind { background: #b8860b; border-color: #b8860b; color: #fff; }

.val-wrap { display: flex; justify-content: flex-end; margin-bottom: 0.45rem; }
.btn-val {
  padding: 0.48rem 1.3rem; background: #1a1612; color: #f5f0e8;
  border: none; font-family: 'Source Serif 4', serif; font-size: 0.81rem;
  font-weight: 600; cursor: pointer; letter-spacing: 0.05em;
  -webkit-appearance: none; border-radius: 0;
}
.btn-val:disabled { background: #d8cfc2; color: #7a6e62; cursor: default; }

/* FEEDBACK */
.fb {
  margin-top: 0.65rem; padding: 0.8rem 0.95rem;
  font-size: 0.84rem; line-height: 1.62; border-left: 3px solid;
}
.fb { display: none; }
.fb.visible { display: block; }
.fb-ok      { border-color: #1a5c2e; background: #eef7f1; color: #1a3d26; }
.fb-ko      { border-color: #9e1b1b; background: #fdf0ef; color: #7a1414; }
.fb-partial { border-color: #b8860b; background: #fdf6e3; color: #6b3d00; }
.fb strong  { font-weight: 700; }

/* BARRE DE BOUTONS PERMANENTE EN BAS */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #1a1612; border-top: 3px solid #b8860b;
  display: flex; justify-content: center; gap: 0.8rem;
  padding: 0.75rem 1rem;
  z-index: 200;
}
.bottom-bar button {
  padding: 0.6rem 1.2rem; font-family: 'Source Serif 4', serif;
  font-weight: 600; font-size: 0.82rem; cursor: pointer;
  letter-spacing: 0.04em; -webkit-appearance: none; border-radius: 0;
}
.btn-recommencer { background: #b8860b; color: #1a1612; border: none; }
.btn-nouvelle    { background: transparent; color: #d4a843; border: 1.5px solid #b8860b; }

/* espace pour la barre fixe */
.bottom-space { height: 70px; }

/* RECAP */
#recap { display: none; background: #1a1612; color: #f5f0e8; padding: 2rem 1.5rem; text-align: center; margin: 1.5rem 0 0; border: 3px solid #b8860b; }
#recap h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #d4a843; margin-bottom: 0.4rem; }
#recap .big { font-size: 2.8rem; font-family: 'Playfair Display', serif; color: #fff; margin: 0.4rem 0; }
.cs-grid { margin: 1rem 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.7rem; }
.cs-item { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13); padding: 0.55rem 0.9rem; }
.cs-name { color: #d4a843; font-size: 0.62rem; letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 0.15rem; }
.cs-num  { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
#recap p { font-size: 0.86rem; color: #c8bfb0; line-height: 1.72; max-width: 480px; margin: 0.8rem auto 0; }
</style>
</head>

<header>
  <div class="label">M1 Droit Civil · S7 · Mme Dardenne</div>
  <h1>Droit de la Consommation</h1>
  <div class="sub">QCM interactif — Révisions complètes</div>
</header>

<div id="scorebar">
  <div class="sc-item">Répondues&nbsp;:&nbsp;<span class="sc-num sc-total" id="sc-done">0</span><span style="color:#555">&thinsp;/&thinsp;</span><span class="sc-num sc-total" id="sc-total">—</span></div>
  <span class="sc-div">|</span>
  <div class="sc-item">✓&nbsp;<span class="sc-num sc-ok-num" id="sc-ok">0</span></div>

</div>
<div class="progress-wrap"><div class="progress-fill" id="pbar" style="width:0%"></div></div>

<main>
  <div class="session-bar" id="sessbar">
    <span>Chargement…</span>
    <button class="btn-top" onclick="newSession()">⟳ Nouvelle session</button>
  </div>
  <div class="chap-nav" id="chapnav"></div>
  <div id="qlist"></div>

  <div id="recap">
    <h2>Session terminée !</h2>
    <div class="big" id="recap-score"></div>
    <div class="cs-grid" id="recap-chaps"></div>
    <p id="recap-msg"></p>
  </div>

  <div class="bottom-space"></div>
</main>

<!-- Boutons permanents en bas -->
<div class="bottom-bar">
  <button class="btn-recommencer" onclick="restartSession()">↺ Recommencer</button>
  <button class="btn-nouvelle" onclick="newSession()">⟳ Nouvelle session</button>
</div>

<script>
const POOL = [

  { chap:"Introduction & Acteurs", theme:"Fondements", diff:"f", multi:false,

    opts:["L'asymétrie d'information entre le professionnel et le consommateur, et la faiblesse de ce dernier lors de la négociation (contrats d'adhésion)", "La fraude commerciale systématique et le dol commis par les professionnels dans les relations avec leurs clients", "La mauvaise foi structurelle des professionnels, qui impose une réglementation impérative pour protéger les consommateurs", "L'insuffisance du droit civil classique à régler les litiges nés de la société de consommation de masse"],
    correct:0,

    opts:["Toute personne physique agissant à des fins n'entrant pas dans le cadre de son activité commerciale, industrielle, artisanale, libérale ou agricole", "Toute personne contractant avec un professionnel, quelle que soit la nature de l'acte conclu", "Toute personne physique sans activité professionnelle, quel que soit l'objet du contrat conclu", "Toute personne physique ou morale agissant à des fins non professionnelles dans sa relation avec un professionnel"],
    correct:0,
    ok:"Personne physique uniquement + fins non professionnelles. Une personne morale ne peut jamais être consommateur.",
    ko:"Définition : personne physique (pas morale), agissant à des fins non professionnelles. Peu importe qu'elle ait ou non une activité professionnelle par ailleurs." },

  { chap:"Introduction & Acteurs", theme:"Consommateur JP", diff:"m", multi:false,

  { chap:"Introduction & Acteurs", theme:"Professionnel", diff:"m", multi:false,

    opts:["Autorisée uniquement pour les cigarettes électroniques et les produits de substitution au tabac", "Autorisée avec message sanitaire obligatoire affiché de manière visible sur le support publicitaire", "Autorisée uniquement à l'intérieur des débits de tabac agréés", "Strictement interdite, directe et indirecte (Loi Veil 1976, Loi Évin 1992, Directive 2003)"],

  { chap:"Chap. 1 — Information", theme:"5 obligations", diff:"m", multi:true,
    q:"Parmi les 5 obligations d'information du professionnel, lesquelles figurent dans la liste ? (cochez 3 réponses)",
    opts:["Les caractéristiques essentielles du bien ou du service", "Le nom du dirigeant de l'entreprise", "Le prix du bien ou du service", "Les conditions d'exécution du contrat"],
    correct:[0, 2, 3],
    ok:"Les 5 obligations : (1) caractéristiques essentielles, (2) prix, (3) conditions d'exécution, (4) traitement des réclamations/garanties, (5) identité du professionnel. Le nom du dirigeant n'en fait pas partie.",
    ko:"Les 5 obligations : caractéristiques essentielles, prix, conditions d'exécution, traitement des réclamations/médiation, identité du professionnel. Le nom du dirigeant n'est pas requis." }
];

// ════════════════════════════
const CHAPTER_ORDER = [
  "Introduction & Acteurs",
  "Chap. 1 — Information",
  "Chap. 2 — PCT",
  "Chap. 3 — Clauses abusives"
];
const CHAPTER_FULL = {
  "Introduction & Acteurs": "Introduction & Acteurs",
  "Chap. 1 — Information": "Chap. 1 — Information du consommateur",
  "Chap. 2 — PCT": "Chap. 2 — Pratiques commerciales trompeuses",
  "Chap. 3 — Clauses abusives": "Chap. 3 — Clauses abusives"
};
const N = 30;

let sessionQ = [], state = [], currentFilter = 'all';

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function pickSession() {
  // Group by chap key
  const byChap = {};
  POOL.forEach(q => {
    const key = CHAPTER_ORDER.find(k => q.chap.startsWith(k.split(' — ')[0]) || q.chap === k);
    if (key && !byChap[key]) byChap[key] = [];
    if (key) byChap[key].push({...q, chapKey: key});
  });

  let picked = [];
  CHAPTER_ORDER.forEach(ch => {
    const pool = shuffle(byChap[ch] || []);
    const quota = Math.round(((pool.length) / POOL.length) * N);
    picked = picked.concat(pool.slice(0, quota));
  });

  const remaining = shuffle(POOL.filter(q => !picked.includes(q)).map(q => {
    const key = CHAPTER_ORDER.find(k => q.chap.startsWith(k.split(' — ')[0]) || q.chap === k);
    return {...q, chapKey: key};
  }));
  while (picked.length < N && remaining.length > 0) picked.push(remaining.shift());

  picked.sort((a, b) => CHAPTER_ORDER.indexOf(a.chapKey) - CHAPTER_ORDER.indexOf(b.chapKey));
  return picked;
}

document.addEventListener('DOMContentLoaded', newSession);

function newSession() {
  sessionQ = pickSession();
  state = sessionQ.map(() => ({ answered: false, selected: [], isCorrect: false }));
  currentFilter = 'all';
  document.getElementById('recap').style.display = 'none';
  document.getElementById('sessbar').innerHTML =
    `<span>Session en cours · <strong>${sessionQ.length} questions</strong> tirées sur ${POOL.length} disponibles</span>
     <button class="btn-top" onclick="newSession()">⟳ Nouvelle session</button>`;
  buildNav(); renderAll(); updateScore();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartSession() {
  state = sessionQ.map(() => ({ answered: false, selected: [], isCorrect: false }));
  document.getElementById('recap').style.display = 'none';
  currentFilter = 'all';
  buildNav(); renderAll(); updateScore();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildNav() {
  const nav = document.getElementById('chapnav');
  nav.innerHTML = '';
  ['all', ...CHAPTER_ORDER.filter(ch => sessionQ.some(q => q.chapKey === ch))].forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'chap-btn' + (ch === currentFilter ? ' active' : '');
    btn.textContent = ch === 'all' ? '📋 Toutes' : ch;
    btn.onclick = () => { currentFilter = ch; buildNav(); renderAll(); };
    nav.appendChild(btn);
  });
}

function renderAll() {
  const container = document.getElementById('qlist');
  container.innerHTML = '';
  document.getElementById('sc-total').textContent = sessionQ.length;

  const filtered = sessionQ.map((q, i) => ({...q, idx: i}))
    .filter(q => currentFilter === 'all' || q.chapKey === currentFilter);

  const byChap = {};
  CHAPTER_ORDER.forEach(ch => { byChap[ch] = []; });
  filtered.forEach(q => { if (q.chapKey) byChap[q.chapKey].push(q); });

  let num = 0;
  CHAPTER_ORDER.forEach(ch => {
    const qs = byChap[ch];
    if (!qs || !qs.length) return;
    if (currentFilter === 'all') {
      const hdr = document.createElement('div');
      hdr.className = 'chap-hdr';
      hdr.innerHTML = `<h2>${CHAPTER_FULL[ch] || ch}</h2><span class="chap-cnt">${qs.length} question${qs.length > 1 ? 's' : ''}</span>`;
      container.appendChild(hdr);
    }
    qs.forEach(q => { num++; container.appendChild(buildCard(q, num)); });
  });
  updateProgress();
}

function buildCard(q, num) {
  const s = state[q.idx];
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = 'c' + q.idx;

  const dc = {f:'df',m:'dm',d:'dd'}[q.diff] || '';
  const dl = {f:'● Facile',m:'● Moyen',d:'● Difficile'}[q.diff] || '';

  card.innerHTML = `
    <div class="q-meta">
      <span class="t-chap">${q.chapKey || ''}</span>
      <span class="t-theme">${q.theme}</span>
      <span class="t-diff ${dc}">${dl}</span>
      ${q.alert ? '<span class="t-alert">⚠ À retenir</span>' : ''}
      <span class="q-num">Q${num}</span>
    </div>
    <div class="q-text">${q.q}</div>
    <div class="q-instr">${q.multi ? '📝 Plusieurs bonnes réponses — cochez tout ce qui est juste, puis validez.' : '📝 Une seule bonne réponse — choisissez, puis validez.'}</div>
    <div class="opts" id="opts${q.idx}">
      ${q.opts.map((o,oi) => `
        <button class="opt-btn" id="o${q.idx}_${oi}" onclick="toggle(${q.idx},${oi},${q.multi})" ${s.answered?'disabled':''}>
          <span class="ind">${String.fromCharCode(65+oi)}</span>
          <span>${o}</span>
        </button>`).join('')}
    </div>
    <div class="val-wrap">
      <button class="btn-val" id="v${q.idx}" onclick="validate(${q.idx})" ${s.answered||s.selected.length===0?'disabled':''}>Valider ma réponse</button>
    </div>
    <div class="fb" id="fb${q.idx}"></div>`;

  if (s.answered) applyCard(q.idx, q, s);
  return card;
}

function toggle(qi, oi, multi) {
  const s = state[qi];
  if (s.answered) return;
  s.selected = multi
    ? (s.selected.includes(oi) ? s.selected.filter(x=>x!==oi) : [...s.selected, oi])
    : [oi];
  sessionQ[qi].opts.forEach((_,i) => {
    const b = document.getElementById(`o${qi}_${i}`);
    if (!b) return;
    const sel = s.selected.includes(i);
    b.className = 'opt-btn' + (sel ? ' opt-sel' : '');
    const ind = b.querySelector('.ind');
    ind.style.cssText = sel ? 'background:#1a1612;border-color:#1a1612;color:#f5f0e8' : '';
  });
  const v = document.getElementById('v'+qi);
  if (v) v.disabled = s.selected.length === 0;
}

function validate(qi) {
  const s = state[qi];
  if (s.answered || s.selected.length === 0) return;
  s.answered = true;
  const q = sessionQ[qi];
  const corrects = Array.isArray(q.correct) ? q.correct : [q.correct];
  const selSet = new Set(s.selected);
  const corSet = new Set(corrects);
  s.isCorrect = [...selSet].every(i=>corSet.has(i)) && [...corSet].every(i=>selSet.has(i));

  // Désactiver les boutons
  q.opts.forEach((_,oi) => {
    const b = document.getElementById(`o${qi}_${oi}`);
    if (b) b.disabled = true;
  });
  const v = document.getElementById('v'+qi);
  if (v) v.disabled = true;

  // Appliquer couleurs et feedback en passant qi explicitement
  applyCard(qi, q, s);
  updateScore(); updateProgress(); checkComplete();
}

function isPartial(q, s) {
  if (!q.multi) return false;
  const c = Array.isArray(q.correct) ? q.correct : [q.correct];
  const hits = s.selected.filter(i=>c.includes(i)).length;
  return hits > 0 && hits < c.length;
}

// qi = index numérique fiable, q = objet question, s = état
function applyCard(qi, q, s) {
  const corrects = Array.isArray(q.correct) ? q.correct : [q.correct];

  q.opts.forEach((_,oi) => {
    const b = document.getElementById(`o${qi}_${oi}`);
    if (!b) return;
    const ind = b.querySelector('.ind');

    // Réinitialiser
    b.removeAttribute('style');
    if (ind) ind.removeAttribute('style');

    // Appliquer les couleurs en style inline
    if (corrects.includes(oi) && s.selected.includes(oi)) {
      // ✓ Bonne réponse cochée → vert
      b.style.setProperty('border-color', '#1a5c2e');
      b.style.setProperty('background-color', '#eef7f1');
      b.style.setProperty('color', '#1a5c2e');
      if (ind) { ind.style.setProperty('background', '#1a5c2e'); ind.style.setProperty('border-color', '#1a5c2e'); ind.style.setProperty('color', '#fff'); }
    } else if (!corrects.includes(oi) && s.selected.includes(oi)) {
      // ✗ Mauvaise réponse cochée → rouge
      b.style.setProperty('border-color', '#9e1b1b');
      b.style.setProperty('background-color', '#fdf0ef');
      b.style.setProperty('color', '#9e1b1b');
      if (ind) { ind.style.setProperty('background', '#9e1b1b'); ind.style.setProperty('border-color', '#9e1b1b'); ind.style.setProperty('color', '#fff'); }
    } else if (corrects.includes(oi) && !s.selected.includes(oi)) {
      // ○ Bonne réponse non cochée (manquée) → orange
      b.style.setProperty('border-color', '#b8860b');
      b.style.setProperty('background-color', '#fffbf0');
      b.style.setProperty('color', '#7a4800');
      if (ind) { ind.style.setProperty('background', '#b8860b'); ind.style.setProperty('border-color', '#b8860b'); ind.style.setProperty('color', '#fff'); }
    }
  });

  // Feedback texte
  const fb = document.getElementById(`fb${qi}`);
  if (fb) {
    const partial = isPartial(q, s);
    let cls, txt;
    if (s.isCorrect) {
      cls = 'fb-ok'; txt = `<strong>✓ Bonne réponse !</strong> ${q.ok}`;
    } else if (partial) {
      cls = 'fb-partial'; txt = `<strong>⚠ Réponse incomplète.</strong> ${q.ko}`;
    } else {
      cls = 'fb-ko'; txt = `<strong>✗ Mauvaise réponse.</strong> ${q.ko}`;
    }
    fb.className = 'fb visible ' + cls;
    fb.innerHTML = txt;
  }
}

function updateScore() {
  const done = state.filter(s=>s.answered).length;
  const ok = state.filter(s=>s.answered&&s.isCorrect).length;
  document.getElementById('sc-done').textContent = done;
  document.getElementById('sc-ok').textContent = ok;
  document.getElementById('sc-ko').textContent = done - ok;
}

function updateProgress() {
  const done = state.filter(s=>s.answered).length;
  document.getElementById('pbar').style.width = (done/sessionQ.length*100)+'%';
}

function checkComplete() {
  if (state.filter(s=>s.answered).length < sessionQ.length) return;
  const ok = state.filter(s=>s.isCorrect).length;
  const pct = Math.round(ok/sessionQ.length*100);

  let chapHTML = '';
  CHAPTER_ORDER.forEach(ch => {
    const cqs = sessionQ.map((q,i)=>({...q,idx:i})).filter(q=>q.chapKey===ch);
    if (!cqs.length) return;
    const cok = cqs.filter(q=>state[q.idx].isCorrect).length;
    chapHTML += `<div class="cs-item"><div class="cs-name">${ch}</div><div class="cs-num">${cok} / ${cqs.length}</div></div>`;
  });
  document.getElementById('recap-chaps').innerHTML = chapHTML;
  document.getElementById('recap-score').textContent = `${ok} / ${sessionQ.length} (${pct}%)`;

  const msgs = ['Il faut retravailler la fiche en profondeur. Commence par les définitions des acteurs, puis les chapitres dans l\'ordre.','Résultat moyen. Reprends la fiche chapitre par chapitre, en t\'attardant sur les définitions légales et les points "⚠ À retenir".','Bon résultat. Focus sur les distinctions délicates : listes noire/grise, conditions cumulatives, jurisprudences clés.','Excellent ! Tu maîtrises très bien ce cours. Revois les quelques points manqués avant l\'exam.'];
  document.getElementById('recap-msg').textContent = msgs[pct>=85?3:pct>=70?2:pct>=50?1:0];

  const recap = document.getElementById('recap');
  recap.style.display = 'block';
  setTimeout(() => recap.scrollIntoView({behavior:'smooth',block:'start'}), 200);
}
</script>
