    opts:["Loi applicable aux contrats / forme des actes juridiques / exécution forcée des obligations dans les relations privées internationales", "Nationalité des parties / capacité juridique des individus / représentation des personnes morales dans les litiges présentant un élément d'extranéité", "Compétence territoriale du tribunal / compétence d'attribution selon la matière / voies de recours disponibles contre les décisions rendues en matière internationale", "Conflit de juridiction (quel juge est compétent ?) / conflit de loi (quelle loi appliquer ?) / effets des jugements étrangers (reconnaissance et exécution)"],
    correct:3,
    ok:"Les 3 questions du DIP : (1) conflit de juridiction (quel juge est compétent ?), (2) conflit de loi (quelle loi appliquer ?), (3) effets des jugements étrangers (reconnaissance et exécution). Parfois aussi la nationalité des individus ou des sociétés.",
    ko:"Les 3 questions du DIP : conflit de juridiction / conflit de loi / effets des jugements étrangers. C'est le cadre de raisonnement à appliquer dès qu'il y a un élément d'extranéité dans un rapport de droit privé." },

  { chap:"Introduction", theme:"OP international vs loi de police", diff:"m", multi:false, alert:true,
    q:"⚠ Quelle est la distinction fondamentale entre l'ordre public international français et la loi de police ?",
    opts:["L'ordre public s'oppose au résultat de l'application de la loi étrangère et intervient en fin de raisonnement / la loi de police s'applique immédiatement quel que soit la loi normalement applicable et intervient au début du raisonnement", "Il n'y a pas de différence réelle entre les deux mécanismes — ce sont deux expressions désignant le même dispositif permettant au juge d'écarter une loi étrangère dont l'application serait indésirable", "L'ordre public international est d'origine européenne et s'applique à tous les États membres / la loi de police est d'origine nationale et ne s'applique que dans l'ordre interne", "L'ordre public s'applique au début du raisonnement avant même de déterminer la loi applicable / la loi de police intervient en fin de raisonnement après avoir constaté le résultat choquant de la loi étrangère désignée"],
    correct:0,
    ok:"Distinction fondamentale. Ordre public international FR : s'oppose au résultat de l'application de la loi étrangère → intervient en fin de raisonnement. Loi de police : s'applique immédiatement, court-circuite le conflit de loi → intervient au début du raisonnement, avant même de se demander quelle est la loi applicable.",
    ko:"Ordre public : fin du raisonnement, s'oppose au résultat choquant. Loi de police : début du raisonnement, s'applique directement quel que soit la loi normalement applicable. Ne pas confondre." },

  { chap:"Introduction", theme:"Principe d'équivalence", diff:"m", multi:false,
    q:"Quel est le principe fondateur du DIP depuis Savigny (19e s.) et quelle en est la conséquence pratique ?",
    opts:["La suprématie du droit français sur les droits étrangers — le juge français applique toujours le droit français aux litiges présentant un élément d'extranéité, sauf exceptions conventionnelles", "L'équivalence des systèmes juridiques : les droits étrangers ont une valeur égale au droit français, ce qui permet au juge français d'appliquer le droit étranger — exception : l'ordre public international", "La liberté totale pour les parties de choisir n'importe quelle loi applicable à leur rapport de droit, y compris des lois de pays avec lesquels elles n'ont aucun lien objectif", "La primauté du droit européen sur les droits nationaux — le juge français doit toujours vérifier la compatibilité de la loi étrangère avec les principes du droit de l'Union européenne"],
    correct:1,
    ok:"Principe d'équivalence des systèmes juridiques (Savigny, 19e s.) : les systèmes juridiques étrangers ont une valeur égale au droit français. Le DIP n'existe que parce qu'on accepte cette équivalence. Conséquence : le juge français peut appliquer le droit étranger. Exception : l'ordre public international français.",
    ko:"Principe d'équivalence (Savigny) : droits étrangers = valeur égale au droit français → le juge français peut appliquer un droit étranger. Exception : l'ordre public international français écarte le résultat choquant." },

  { chap:"Introduction", theme:"Arrêt Cornelissen", diff:"m", multi:false,
    q:"Quelles sont les 3 conditions posées par l'arrêt Cornelissen (6 fév. 2007) pour reconnaître une décision étrangère en France ?",
    opts:["La décision doit être définitive dans l'État d'origine / non contraire à l'ordre public international français / rendue par un juge dont la compétence est reconnue selon les règles françaises", "Décision exécutoire dans l'État d'origine / accompagnée d'une traduction officielle / non contraire aux conventions internationales auxquelles la France est partie", "Décision motivée et respectant les droits de la défense / rendue dans un État ayant conclu une convention bilatérale avec la France / traduite officiellement en français par un traducteur assermenté", "Compétence indirecte fondée sur le rattachement du litige au juge saisi / conformité à l'ordre public international de fond et de procédure / absence de fraude à la loi — plus de vérification de la loi appliquée"],
    correct:3,
    ok:"Arrêt Cornelissen (6 fév. 2007) — revirement majeur. 3 conditions : (1) compétence indirecte fondée sur le rattachement du litige au juge saisi, (2) conformité à l'ordre public international de fond et de procédure, (3) absence de fraude à la loi. Plus de vérification que le juge étranger a appliqué la loi qu'aurait appliquée le juge français.",
    ko:"Cornelissen : rattachement du litige au juge + conformité à l'ordre public + absence de fraude. Plus de vérification de la loi appliquée. Revirement majeur par rapport à la doctrine Mater." },

  { chap:"Introduction", theme:"Exequatur", diff:"f", multi:false,
    q:"Qu'est-ce que l'exequatur ?",
    opts:["La procédure permettant à un juge français d'appliquer le droit étranger dans un litige présentant un élément d'extranéité", "La procédure permettant de donner force exécutoire en France à une décision rendue par une juridiction étrangère", "Le mécanisme par lequel le juge écarte l'application d'une loi étrangère contraire à l'ordre public international français", "La procédure de reconnaissance en France des mariages célébrés à l'étranger selon les formes du droit local"],
    correct:1,
    ok:"L'exequatur = procédure permettant de donner force exécutoire à une décision étrangère en France. En droit commun : contrôle de Cornelissen. Dans les règlements européens : règles spécifiques souvent plus libérales.",
    ko:"Exequatur = donner force exécutoire à une décision étrangère en France. En DC : contrôle Cornelissen. En règlements européens : règles plus libérales." },

  { chap:"Chap. 1 — Régimes matrimoniaux", theme:"3 périodes", diff:"m", multi:false, alert:true,
    q:"⚠ Quels textes s'appliquent selon la date du mariage pour déterminer la loi applicable au régime matrimonial ?",
    opts:["Toujours le règlement européen de 2016 depuis son entrée en vigueur le 29 janvier 2019, y compris pour les mariages célébrés avant cette date", "Avant 1804 : DIP coutumier / après 1804 : Code civil / depuis 1992 : règlement européen applicable à tous les RM quelle que soit la date du mariage", "Avant le 1er sept. 1992 : DIP français (jurisprudence, règle de Dumoulin) / entre le 1er sept. 1992 et le 29 janv. 2019 : Convention de La Haye 1978 / depuis le 29 janv. 2019 : règlements UE 2016/1103 (mariage) et 2016/1104 (PACS)", "Toujours la Convention de La Haye du 14 mars 1978 car elle a un caractère universel s'appliquant à tous les États signataires sans distinction de date"],
    correct:2,
    ok:"3 périodes à bien mémoriser : avant le 1er sept. 1992 → DIP français (JP fondée sur la règle de Dumoulin) / entre le 1er sept. 1992 et le 29 janv. 2019 → Convention de La Haye du 14 mars 1978 / depuis le 29 janv. 2019 → Règlements UE 2016/1103 (mariage) et 2016/1104 (PACS).",
    ko:"3 périodes : avant 1er sept. 1992 = DIP français / 1er sept. 1992 au 29 janv. 2019 = Convention de La Haye / depuis 29 janv. 2019 = Règlements 2016. Dates à mémoriser absolument." },

  { chap:"Chap. 1 — Régimes matrimoniaux", theme:"Règle de Dumoulin", diff:"m", multi:false,
    q:"Quelle est la règle de Dumoulin (1525) et quel principe pose-t-elle en DIP ?",
    opts:["Le régime matrimonial est toujours soumis à la loi nationale commune des époux, et en cas de nationalités différentes, à la loi nationale du mari au moment de la célébration du mariage", "Le régime matrimonial est régi par la coutume du premier lieu d'installation des époux après le mariage (convention tacite) — pose le principe de l'autonomie de la volonté en DIP", "Le régime matrimonial est soumis à la loi du juge saisi (lex fori), qui est présumé être le mieux placé pour apprécier les intérêts patrimoniaux des époux et des tiers", "Le régime matrimonial est soumis à la loi du lieu de célébration du mariage, car c'est dans cet État que les époux ont exprimé solennellement leur consentement à l'union"],
    correct:1,
    ok:"Charles Dumoulin (1525, affaire Gamay) : le régime matrimonial est régi par la coutume du premier lieu où les époux se sont installés après le mariage. Justification : convention tacite → les époux sont censés avoir tacitement choisi le régime matrimonial du premier domicile conjugal. Pose le principe de l'autonomie de la volonté en DIP.",
    ko:"Règle de Dumoulin : loi du premier domicile matrimonial (convention tacite des époux). Fondement de l'autonomie de la volonté en DIP des RM." },

  { chap:"Chap. 1 — Régimes matrimoniaux", theme:"1er domicile matrimonial", diff:"m", multi:false, alert:true,
    q:"⚠ La présomption fondée sur le 1er domicile matrimonial (JP antérieure à 1992) est-elle irréfragable ?",
    opts:["Non, c'est une présomption simple pouvant être renversée par d'autres indices traduisant la volonté des époux — le domicile est le plus fort mais pas exclusif", "Oui, elle est absolue et ne peut jamais être renversée — c'est ce qu'a décidé la Cour de cassation dans l'arrêt Zelcer de 1935 en consacrant définitivement le 1er domicile comme facteur de rattachement exclusif", "Oui, depuis l'arrêt Zelcer de 1935 qui a rendu la présomption irréfragable — seul un contrat de mariage exprès peut écarter la présomption et désigner une autre loi applicable", "Non, elle est systématiquement écartée en présence d'un contrat de mariage désignant une loi étrangère, même si ce contrat n'a pas été rédigé dans les formes requises"],
    correct:0,
    ok:"Présomption simple (arrêt Zelcer, 4 juin 1935). Elle peut être renversée par d'autres indices traduisant la volonté des époux. Le domicile est le plus fort mais pas exclusif. Exemple : en droit musulman, la Cass. attache plus d'importance au lieu et à la forme du mariage.",
    ko:"Présomption simple (Zelcer, 1935) : le 1er domicile matrimonial est le critère principal mais pas exclusif. D'autres indices peuvent renverser la présomption." },

  { chap:"Chap. 1 — Régimes matrimoniaux", theme:"Renvoi et RM", diff:"d", multi:false,
    q:"Le renvoi est-il admis lorsque la règle de conflit en matière de régime matrimonial est fondée sur l'autonomie de la volonté ?",
    opts:["Oui, le renvoi est toujours admis en DIP quelle que soit la matière concernée et la nature de la règle de conflit ayant désigné la loi étrangère applicable", "Non, le renvoi est exclu quand la règle de conflit est fondée sur l'autonomie de la volonté — c'est la loi matérielle qui s'applique, pas ses règles de DIP (arrêt Gouthertz)", "Oui, mais uniquement pour les immeubles situés dans des États tiers à l'Union européenne, pour lesquels la scission entre loi des meubles et loi des immeubles reste applicable", "Non, sauf si la loi désignée par l'autonomie de la volonté est celle d'un État non membre de l'Union européenne n'ayant conclu aucune convention avec la France"],
    correct:1,
    ok:"Le renvoi est exclu quand la règle de conflit est fondée sur l'autonomie de la volonté (arrêt Gouthertz). Si les époux ont choisi ou si on présume leur choix via le premier domicile matrimonial, c'est la loi matérielle qui s'applique, pas ses règles de DIP.",
    ko:"Renvoi exclu en cas d'autonomie de la volonté (ex : 1er domicile matrimonial comme présomption de choix). Application de la loi matérielle uniquement (arrêt Gouthertz)." },

  { chap:"Chap. 1 — Régimes matrimoniaux", theme:"Convention de La Haye 1978", diff:"m", multi:false, alert:true,
    q:"⚠ La Convention de La Haye 1978 rompt-elle avec la liberté totale de choix de la loi applicable au régime matrimonial ?",
    opts:["Non, la liberté de choix reste totale comme avant 1992 — les époux peuvent désigner n'importe quelle loi au monde sans restriction, y compris celle d'un État avec lequel ils n'ont aucun lien", "Oui, mais uniquement pour les époux non européens — pour les ressortissants de l'Union européenne, la liberté de choix est maintenue selon les anciens principes jurisprudentiels", "Non, elle étend même la liberté de choix aux tiers contractants qui peuvent désormais choisir la loi applicable au régime matrimonial dans leurs relations avec les époux", "Oui, la Convention rompt avec l'ancienne liberté totale de choix — le choix est encadré (art. 3) et ne peut porter que sur certaines lois déterminées en fonction du lien des époux avec l'État"],
    correct:3,
    ok:"La Convention de La Haye 1978 rompt avec l'ancienne liberté totale de choix. Le choix est encadré (art. 3) : la loi désignée s'applique à l'ensemble des biens, mais les époux peuvent désigner pour les immeubles la loi de leur situation (scission possible). Avant 1992 : liberté totale (n'importe quelle loi).",
    ko:"Convention de La Haye 1978 : rupture avec la liberté totale. Le choix est encadré (art. 3). Avant 1992 : liberté totale de choisir n'importe quelle loi." },

  { chap:"Chap. 1 — Régimes matrimoniaux", theme:"Changement automatique de loi", diff:"d", multi:false, alert:true,
    q:"⚠ La Convention de La Haye 1978 prévoit-elle un mécanisme de changement automatique de loi applicable au régime matrimonial ? Quand se déclenche-t-il ?",
    opts:["Non, la loi applicable au régime matrimonial est toujours fixe une fois déterminée — seul un accord exprès des époux peut modifier la loi applicable à leur régime matrimonial", "Non, seul un accord exprès des époux formalisé dans un acte notarié peut entraîner un changement de loi applicable à leur régime matrimonial", "Oui, si les époux n'ont ni choisi de loi ni fait de contrat, la loi change automatiquement dans 3 cas et peut s'opérer à l'insu des époux — le règlement 2016 ne contient aucun mécanisme de changement automatique", "Oui, mais uniquement pour les immeubles situés dans un État différent de celui de la résidence habituelle des époux, la loi de situation prévalant alors automatiquement"],
    correct:2,
    ok:"Oui ! La Convention de La Haye prévoit un changement automatique de loi (art. 7 al. 2) dans 3 cas. Ce mécanisme peut s'opérer à l'insu des époux ! Solution pour l'éviter : désigner expressément la loi applicable (art. 22 du règlement 2016 pour bloquer cet effet). Le règlement 2016 ne contient aucun mécanisme de changement automatique.",
    ko:"Convention de La Haye : changement automatique possible à l'insu des époux (3 cas : nationalité commune, résidence +10 ans, installation dans l'État de nationalité commune). Le règlement 2016 n'a pas ce mécanisme automatique." },

  { chap:"Chap. 1 — Régimes matrimoniaux", theme:"Règlement 2016 changement de loi", diff:"m", multi:false, alert:true,
    q:"⚠ Concernant l'effet du changement de loi applicable au régime matrimonial, quelle est la différence entre la Convention de La Haye et le règlement 2016 ?",
    opts:["Aucune différence — les deux textes prévoient un effet rétroactif au jour du mariage, ce qui garantit la cohérence et l'unité du régime matrimonial depuis sa constitution", "Convention de La Haye : effet pour l'avenir uniquement / règlement 2016 : effet rétroactif au jour du mariage sauf convention contraire des époux", "Les deux textes prévoient un effet uniquement pour l'avenir à compter du changement de résidence habituelle ou de nationalité ayant déclenché la modification de loi applicable", "Convention de La Haye : effet rétroactif sauf convention contraire des époux / règlement 2016 : effet pour l'avenir seulement sauf convention contraire — le sens est inversé"],
    correct:3,
    ok:"C'est inversé ! Convention de La Haye (art. 6) : changement de loi → effet rétroactif sauf convention contraire des époux. Règlement 2016 (art. 22 §2) : changement de loi → effet pour l'avenir seulement sauf convention contraire des époux. Sens inverse.",
    ko:"Inversé ! Convention de La Haye : rétroactif sauf accord contraire. Règlement 2016 : avenir seulement sauf accord contraire. C'est un piège classique." },

  { chap:"Chap. 1 — Régimes matrimoniaux", theme:"Règlement 2016 autonomie encadrée", diff:"m", multi:false,
    q:"Selon le règlement 2016/1103 (art. 22), parmi quelles lois les époux peuvent-ils choisir la loi applicable à leur régime matrimonial ?",
    opts:["Loi de résidence habituelle de l'un des époux au moment du choix ou loi d'un État dont l'un des époux possède la nationalité au moment du choix", "N'importe quelle loi au monde, dès lors que le choix est formulé expressément dans une convention matrimoniale rédigée en la forme authentique devant notaire", "Uniquement la loi de la nationalité commune des époux, ou à défaut la loi de la première résidence habituellement commune après le mariage", "Uniquement la loi du lieu de célébration du mariage ou la loi de la nationalité commune des époux au moment de la célébration"],
    correct:0,
    ok:"Règlement 2016 : autonomie encadrée (art. 22). Choix limité à : loi de résidence habituelle de l'un des époux au moment du choix ou loi d'un État dont l'un des époux possède la nationalité au moment du choix. Pour les PACS : loi de l'État d'enregistrement.",
    ko:"Règlement 2016 : choix encadré entre résidence habituelle de l'un des époux ou nationalité de l'un des époux (au moment du choix). Pas de liberté totale." },

  { chap:"Chap. 1 — Régimes matrimoniaux", theme:"Règlement 2016 défaut de choix", diff:"m", multi:false,
    q:"À défaut de choix de loi applicable au régime matrimonial (règlement 2016, art. 26), quel est le critère de rattachement en cascade ?",
    opts:["Loi de la nationalité commune au moment du mariage → loi du domicile matrimonial → loi du for en dernier recours", "Loi du lieu de célébration du mariage → loi de la nationalité commune des époux → loi du for en l'absence de nationalité commune", "Loi de la première résidence habituelle commune → loi de la nationalité commune → loi ayant les liens les plus étroits", "Loi du for directement applicable sans cascade, le juge saisi appliquant toujours son propre droit à défaut de choix exprès des époux"],
    correct:2,
    ok:"Art. 26, règlement 2016 : à défaut de choix pour les RM → 1ère résidence habituelle commune → nationalité commune → loi ayant les liens les plus étroits. Pour les PACS → loi de l'État d'enregistrement.",
    ko:"Cascade art. 26 : 1ère résidence habituelle commune → nationalité commune → liens les plus étroits. Pour PACS : loi de l'État d'enregistrement." },

  { chap:"Chap. 1 — Régimes matrimoniaux", theme:"Questions exclues", diff:"d", multi:false,
    q:"Parmi ces matières, lesquelles sont exclues du champ d'application de la loi applicable au régime matrimonial (Convention de La Haye et règlement 2016) ?",
    opts:["La composition du patrimoine (propres/communs) et les pouvoirs de gestion des époux sur les biens communs pendant le mariage", "La capacité juridique des époux / la validité du mariage / les obligations alimentaires / la succession du conjoint décédé / les droits réels", "La gestion des biens communs par chaque époux et les actes de disposition nécessitant le consentement conjoint des deux époux", "La répartition des droits pendant le mariage et les causes de dissolution du régime matrimonial"],
    correct:1,
    ok:"Exclusions (Convention de La Haye et règlement 2016) : capacité juridique des époux / existence, validité, reconnaissance du mariage / obligations alimentaires / succession du conjoint décédé / SS / droits à la pension de retraite / nature des droits réels / inscriptions dans les registres.",
    ko:"Exclusions : capacité des époux, validité du mariage, obligations alimentaires, succession du conjoint, SS, retraite, droits réels, registres. Ces questions relèvent d'autres règles de conflit." },

  { chap:"Chap. 2 — Successions internationales", theme:"Règlement successions", diff:"f", multi:false,
    q:"Depuis quand le règlement UE n°650/2012 sur les successions est-il applicable, et quel est son principe directeur ?",
    opts:["Depuis le 4 juillet 2012 (date de publication), avec maintien du principe de scission entre meubles et immeubles qui existait antérieurement en droit commun", "Depuis le 1er janvier 2020, en même temps que d'autres textes européens de droit international privé, avec un principe de liberté totale de choix de la loi applicable", "Depuis le 17 août 2015 (personnes décédées après cette date) — principe d'unité : meubles et immeubles sous la même loi et le même juge, caractère universel (art. 20)", "Depuis le 29 janvier 2019, en même temps que les règlements sur les régimes matrimoniaux, avec un principe de scission maintenu pour respecter les traditions des États membres"],
    correct:2,
    ok:"Règlement successions (n°650/2012) : applicable depuis le 17 août 2015 aux personnes décédées après cette date. Principe d'unité : meubles + immeubles sous la même loi et le même juge (≠ ancien principe de scission). Caractère universel (art. 20).",
    ko:"Règlement successions : 17 août 2015. Principe d'unité (meubles + immeubles ensemble). Caractère universel. Ne s'applique pas aux matières fiscales, douanières ou administratives." },

  { chap:"Chap. 2 — Successions internationales", theme:"Professio juris", diff:"m", multi:false,
    q:"Qu'est-ce que la professio juris (art. 22 du Règlement successions) et à quelles lois est-elle limitée ?",
    opts:["Le choix par le défunt de la loi applicable à sa succession, limité à la loi de l'État dont il possède la nationalité au moment du choix ou au décès", "Le choix libre par le défunt de n'importe quelle loi applicable à l'ensemble de sa succession, sans restriction tenant à la nationalité ou à la résidence habituelle", "Le choix exercé par les héritiers après l'ouverture de la succession pour désigner la loi applicable aux opérations de partage et de liquidation", "Le choix automatique de la loi de résidence habituelle du défunt au moment du décès, désigné objectivement sans qu'aucune manifestation de volonté ne soit nécessaire"],
    correct:0,
    ok:"Professio juris = choix par le défunt de la loi applicable à l'ensemble de sa succession. Limité à la loi de l'État dont il possède la nationalité au moment du choix ou au décès. Avec plusieurs nationalités : choix parmi toutes. Choix formulé expressément dans une disposition à cause de mort.",
    ko:"Professio juris : choix du défunt de la loi applicable à sa succession. Limité à la loi de sa nationalité (au moment du choix ou du décès). Pas de liberté totale comme en matière contractuelle." },

  { chap:"Chap. 2 — Successions internationales", theme:"Renvoi et professio juris", diff:"d", multi:false, alert:true,
    q:"⚠ Le renvoi est-il admis lorsque le défunt a exercé une professio juris ?",
    opts:["Non, jamais de renvoi en cas de professio juris — le défunt ayant choisi une loi, c'est le droit matériel de cette loi qui s'applique", "Oui, le renvoi est toujours admis en matière de succession internationale, quelle que soit la technique utilisée pour désigner la loi applicable", "Oui, mais uniquement si la loi choisie par le défunt renvoie expressément à la loi de sa résidence habituelle au moment du décès", "Non, sauf accord exprès de tous les héritiers acceptant l'application de la loi désignée par le renvoi à la place de la loi choisie par le défunt"],
    correct:0,
    ok:"Jamais de renvoi en cas de professio juris. Le défunt ayant choisi une loi, on suppose que c'est le droit matériel de cette loi qu'il a voulu appliquer. Exception aux règles habituelles du renvoi. De même, pas de renvoi possible en cas de clause des liens plus étroits, validité formelle (art. 27), art. 28b, art. 30.",
    ko:"Renvoi exclu en cas de professio juris. Application du droit matériel uniquement. Le renvoi est admis uniquement quand la règle de conflit désigne la loi d'un État tiers (et hors cas d'exclusion)." },

  { chap:"Chap. 2 — Successions internationales", theme:"Rattachement objectif succession", diff:"f", multi:false,
    q:"À défaut de professio juris, quelle loi s'applique à la succession selon l'art. 21 §1 du Règlement successions ?",
    opts:["La loi de l'État dont les juridictions sont compétentes pour connaître de la succession en application du règlement", "La loi nationale du défunt au moment de son décès, déterminée selon les règles du droit international privé de chaque État membre", "La loi du lieu de situation des principaux biens composant le patrimoine successoral du défunt au moment de son décès", "La loi de l'État dans lequel le défunt avait sa résidence habituelle au moment de son décès"],

const CHAPTER_ORDER = [
  "Introduction",
  "Chap. 1 — Régimes matrimoniaux",
  "Chap. 2 — Successions internationales",
  "Chap. 3 — Divorce international"
];
const N = 30;
let sessionQ=[], state=[], currentFilter='all';

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pickSession(){
  const byChap={};CHAPTER_ORDER.forEach(ch=>{byChap[ch]=[];});
  POOL.forEach(q=>{if(byChap[q.chap])byChap[q.chap].push(q);});
  let picked=[];
  CHAPTER_ORDER.forEach(ch=>{
    const pool=shuffle(byChap[ch]||[]);
    const quota=Math.round((pool.length/POOL.length)*N);
    picked=picked.concat(pool.slice(0,quota));
  });
  const remaining=shuffle(POOL.filter(q=>!picked.includes(q)));
  while(picked.length<N&&remaining.length>0)picked.push(remaining.shift());
  picked.sort((a,b)=>CHAPTER_ORDER.indexOf(a.chap)-CHAPTER_ORDER.indexOf(b.chap));
  return picked;
}
document.addEventListener('DOMContentLoaded',newSession);
function newSession(){
  sessionQ=pickSession();state=sessionQ.map(()=>({answered:false,selected:[],isCorrect:false}));
  currentFilter='all';document.getElementById('recap').style.display='none';
  document.getElementById('sessbar').innerHTML=`<span>Session en cours · <strong>${sessionQ.length} questions</strong> tirées sur ${POOL.length} disponibles</span><button class="btn-top" onclick="newSession()">⟳ Nouvelle session</button>`;
  buildNav();renderAll();updateScore();window.scrollTo({top:0,behavior:'smooth'});
}
function restartSession(){
  state=sessionQ.map(()=>({answered:false,selected:[],isCorrect:false}));
  document.getElementById('recap').style.display='none';currentFilter='all';buildNav();renderAll();updateScore();window.scrollTo({top:0,behavior:'smooth'});
}
function buildNav(){
  const nav=document.getElementById('chapnav');nav.innerHTML='';
  ['all',...CHAPTER_ORDER.filter(ch=>sessionQ.some(q=>q.chap===ch))].forEach(ch=>{
    const btn=document.createElement('button');btn.className='chap-btn'+(ch===currentFilter?' active':'');
    btn.textContent=ch==='all'?'📋 Toutes':ch;btn.onclick=()=>{currentFilter=ch;buildNav();renderAll();};nav.appendChild(btn);
  });
}
function renderAll(){
  const container=document.getElementById('qlist');container.innerHTML='';document.getElementById('sc-total').textContent=sessionQ.length;
  const filtered=sessionQ.map((q,i)=>({...q,idx:i})).filter(q=>currentFilter==='all'||q.chap===currentFilter);
  const byChap={};CHAPTER_ORDER.forEach(ch=>{byChap[ch]=[];});filtered.forEach(q=>{byChap[q.chap].push(q);});
  let num=0;
  CHAPTER_ORDER.forEach(ch=>{
    const qs=byChap[ch];if(!qs||!qs.length)return;
    if(currentFilter==='all'){const hdr=document.createElement('div');hdr.className='chap-hdr';hdr.innerHTML=`<h2>${ch}</h2><span class="chap-cnt">${qs.length} question${qs.length>1?'s':''}</span>`;container.appendChild(hdr);}
    qs.forEach(q=>{num++;container.appendChild(buildCard(q,num));});
  });updateProgress();
}
function buildCard(q,num){
  const s=state[q.idx];const card=document.createElement('div');card.className='q-card';card.id='c'+q.idx;
  const dc={f:'df',m:'dm',d:'dd'}[q.diff]||'';const dl={f:'● Facile',m:'● Moyen',d:'● Difficile'}[q.diff]||'';
  card.innerHTML=`<div class="q-meta"><span class="t-chap">${q.chap}</span><span class="t-theme">${q.theme}</span><span class="t-diff ${dc}">${dl}</span>${q.alert?'<span class="t-alert">⚠ À retenir</span>':''}<span class="q-num">Q${num}</span></div><div class="q-text">${q.q}</div><div class="q-instr">${q.multi?'📝 Plusieurs bonnes réponses — cochez tout ce qui est juste, puis validez.':'📝 Une seule bonne réponse — choisissez, puis validez.'}</div><div class="opts" id="opts${q.idx}">${q.opts.map((o,oi)=>`<button class="opt-btn" id="o${q.idx}_${oi}" onclick="toggle(${q.idx},${oi},${q.multi})" ${s.answered?'disabled':''}><span class="ind">${String.fromCharCode(65+oi)}</span><span>${o}</span></button>`).join('')}</div><div class="val-wrap"><button class="btn-val" id="v${q.idx}" onclick="validate(${q.idx})" ${s.answered||s.selected.length===0?'disabled':''}>Valider ma réponse</button></div><div class="fb" id="fb${q.idx}"></div>`;
  if(s.answered)applyCard(q.idx,q,s);return card;
}
function toggle(qi,oi,multi){
  const s=state[qi];if(s.answered)return;
  s.selected=multi?(s.selected.includes(oi)?s.selected.filter(x=>x!==oi):[...s.selected,oi]):[oi];
  sessionQ[qi].opts.forEach((_,i)=>{const b=document.getElementById(`o${qi}_${i}`);if(!b)return;const sel=s.selected.includes(i);b.className='opt-btn'+(sel?' opt-sel':'');const ind=b.querySelector('.ind');ind.style.cssText=sel?'background:#1a1612;border-color:#1a1612;color:#f5f0e8':'';});
  const v=document.getElementById('v'+qi);if(v)v.disabled=s.selected.length===0;
}
function validate(qi){
  const s=state[qi];if(s.answered||s.selected.length===0)return;s.answered=true;
  const q=sessionQ[qi];const corrects=Array.isArray(q.correct)?q.correct:[q.correct];
  const selSet=new Set(s.selected),corSet=new Set(corrects);
  s.isCorrect=[...selSet].every(i=>corSet.has(i))&&[...corSet].every(i=>selSet.has(i));
  q.opts.forEach((_,oi)=>{const b=document.getElementById(`o${qi}_${oi}`);if(b)b.disabled=true;});
  const v=document.getElementById('v'+qi);if(v)v.disabled=true;
  applyCard(qi,q,s);updateScore();updateProgress();checkComplete();
}
function isPartial(q,s){if(!q.multi)return false;const c=Array.isArray(q.correct)?q.correct:[q.correct];return s.selected.filter(i=>c.includes(i)).length>0&&s.selected.filter(i=>c.includes(i)).length<c.length;}
function applyCard(qi,q,s){
  const corrects=Array.isArray(q.correct)?q.correct:[q.correct];
  q.opts.forEach((_,oi)=>{
    const b=document.getElementById(`o${qi}_${oi}`);if(!b)return;const ind=b.querySelector('.ind');b.removeAttribute('style');if(ind)ind.removeAttribute('style');
    if(corrects.includes(oi)&&s.selected.includes(oi)){b.style.setProperty('border-color','#1a5c2e');b.style.setProperty('background-color','#eef7f1');b.style.setProperty('color','#1a5c2e');if(ind){ind.style.setProperty('background','#1a5c2e');ind.style.setProperty('border-color','#1a5c2e');ind.style.setProperty('color','#fff');}}
    else if(!corrects.includes(oi)&&s.selected.includes(oi)){b.style.setProperty('border-color','#9e1b1b');b.style.setProperty('background-color','#fdf0ef');b.style.setProperty('color','#9e1b1b');if(ind){ind.style.setProperty('background','#9e1b1b');ind.style.setProperty('border-color','#9e1b1b');ind.style.setProperty('color','#fff');}}
    else if(corrects.includes(oi)&&!s.selected.includes(oi)){b.style.setProperty('border-color','#b8860b');b.style.setProperty('background-color','#fffbf0');b.style.setProperty('color','#7a4800');if(ind){ind.style.setProperty('background','#b8860b');ind.style.setProperty('border-color','#b8860b');ind.style.setProperty('color','#fff');}}
  });
  const fb=document.getElementById(`fb${qi}`);
  if(fb){const partial=isPartial(q,s);let cls,txt;if(s.isCorrect){cls='fb-ok';txt=`<strong>✓ Bonne réponse !</strong> ${q.ok}`;}else if(partial){cls='fb-partial';txt=`<strong>⚠ Réponse incomplète.</strong> ${q.ko}`;}else{cls='fb-ko';txt=`<strong>✗ Mauvaise réponse.</strong> ${q.ko}`;}fb.className='fb visible '+cls;fb.innerHTML=txt;}
}
function updateScore(){const done=state.filter(s=>s.answered).length,ok=state.filter(s=>s.answered&&s.isCorrect).length;document.getElementById('sc-done').textContent=done;document.getElementById('sc-ok').textContent=ok;document.getElementById('sc-ko').textContent=done-ok;}
function updateProgress(){document.getElementById('pbar').style.width=(state.filter(s=>s.answered).length/sessionQ.length*100)+'%';}
function checkComplete(){
  if(state.filter(s=>s.answered).length<sessionQ.length)return;
  const ok=state.filter(s=>s.isCorrect).length,pct=Math.round(ok/sessionQ.length*100);
  let chapHTML='';CHAPTER_ORDER.forEach(ch=>{const cqs=sessionQ.map((q,i)=>({...q,idx:i})).filter(q=>q.chap===ch);if(!cqs.length)return;const cok=cqs.filter(q=>state[q.idx].isCorrect).length;chapHTML+=`<div class="cs-item"><div class="cs-name">${ch}</div><div class="cs-num">${cok} / ${cqs.length}</div></div>`;});
  document.getElementById('recap-chaps').innerHTML=chapHTML;document.getElementById('recap-score').textContent=`${ok} / ${sessionQ.length} (${pct}%)`;
  const msgs=['Reprends la fiche depuis le début. Les 3 périodes des RM, les règlements européens et les distinctions OP/loi de police sont essentiels.','Résultat moyen. Revois les 3 périodes des RM, la professio juris, les cascades de rattachement et les distinctions Rome III / Bruxelles 2 TER.','Bon travail ! Consolide les points délicats : changement automatique de loi, sens de l\'effet rétroactif (Convention vs règlement 2016), OP et réserve héréditaire.','Excellent ! Tu maîtrises très bien ce cours de DIP. Revois les quelques points manqués avant l\'exam.'];
  document.getElementById('recap-msg').textContent=msgs[pct>=85?3:pct>=70?2:pct>=50?1:0];document.getElementById('recap').style.display='block';setTimeout(()=>document.getElementById('recap').scrollIntoView({behavior:'smooth',block:'start'}),200);
}
</script>
