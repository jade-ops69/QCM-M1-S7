<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { font-family: 'Source Serif 4', Georgia, serif; background: #f5f0e8; color: #1a1612; min-height: 100vh; }
header { background: #1a1612; color: #f5f0e8; padding: 1.8rem 1.2rem 1.4rem; text-align: center; border-bottom: 4px solid #b8860b; }
header .label { font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: #d4a843; margin-bottom: 0.35rem; }
header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.3rem, 5vw, 2.1rem); font-weight: 900; }
header .sub { margin-top: 0.35rem; font-size: 0.8rem; color: #b0a898; font-style: italic; }
#scorebar { background: #111; color: #f5f0e8; padding: 0.55rem 1rem; display: flex; justify-content: center; align-items: center; gap: 1rem; font-size: 0.78rem; border-bottom: 2px solid #b8860b; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
.sc-item { display: flex; align-items: center; gap: 0.3rem; }
.sc-num { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; }
.sc-total { color: #d4a843; } .sc-ok-num { color: #5cb878; } .sc-ko-num { color: #e07070; } .sc-div { color: #444; }
.progress-wrap { background: #2a2520; height: 4px; }
.progress-fill { height: 4px; background: #b8860b; transition: width 0.4s ease; }
main { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem 2rem; }
.session-bar { background: #fff; border: 1px solid #d8cfc2; border-left: 4px solid #b8860b; padding: 0.8rem 1.1rem; margin-bottom: 1.3rem; font-size: 0.81rem; color: #7a6e62; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
.session-bar strong { color: #1a1612; }
.btn-top { padding: 0.38rem 0.9rem; background: #1a1612; color: #d4a843; border: 1.5px solid #b8860b; font-family: 'Source Serif 4', serif; font-size: 0.76rem; cursor: pointer; letter-spacing: 0.04em; -webkit-appearance: none; border-radius: 0; }
.chap-nav { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.4rem; padding-bottom: 1rem; border-bottom: 1px solid #d8cfc2; }
.chap-btn { background: transparent; border: 1.5px solid #d8cfc2; color: #7a6e62; padding: 0.38rem 0.8rem; font-family: 'Source Serif 4', serif; font-size: 0.74rem; cursor: pointer; letter-spacing: 0.03em; -webkit-appearance: none; border-radius: 0; }
.chap-btn.active { background: #1a1612; color: #f5f0e8; border-color: #1a1612; }
.chap-hdr { margin: 1.8rem 0 0.9rem; padding-bottom: 0.45rem; border-bottom: 2px solid #b8860b; display: flex; align-items: baseline; gap: 0.8rem; }
.chap-hdr h2 { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; }
.chap-cnt { font-size: 0.7rem; color: #7a6e62; letter-spacing: 0.07em; text-transform: uppercase; }
.q-card { background: #fff; border: 1px solid #d8cfc2; border-left: 4px solid #b8860b; margin-bottom: 1.3rem; padding: 1.2rem 1.3rem; }
.q-meta { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
.t-chap { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; background: #1a1612; color: #d4a843; padding: 0.1rem 0.48rem; font-weight: 600; }
.t-theme { font-size: 0.62rem; letter-spacing: 0.09em; text-transform: uppercase; background: #f5f0e8; border: 1px solid #d8cfc2; color: #7a6e62; padding: 0.1rem 0.45rem; }
.t-diff { font-size: 0.62rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.1rem 0.48rem; border: 1.5px solid; font-weight: 600; }
.df { color: #1a5c2e; border-color: #2d8a4e; background: #e8f5ee; }
.dm { color: #b45309; border-color: #d97706; background: #fef3e2; }
.dd { color: #9e1b1b; border-color: #c0392b; background: #fdf0ef; }
.t-alert { font-size: 0.62rem; letter-spacing: 0.07em; text-transform: uppercase; padding: 0.1rem 0.45rem; border: 1.5px solid #c0392b; color: #9e1b1b; background: #fdf0ef; font-weight: 700; }
.q-num { font-size: 0.66rem; color: #7a6e62; letter-spacing: 0.07em; text-transform: uppercase; margin-left: auto; }
.q-text { font-size: 0.93rem; line-height: 1.68; margin-bottom: 0.28rem; }
.q-instr { font-size: 0.74rem; color: #7a6e62; font-style: italic; margin-bottom: 0.85rem; }
.opts { display: flex; flex-direction: column; gap: 0.38rem; margin-bottom: 0.75rem; }
.opt-btn { display: flex; align-items: flex-start; gap: 0.55rem; padding: 0.6rem 0.85rem; border: 1.5px solid #d8cfc2; background: #f5f0e8; font-family: 'Source Serif 4', serif; font-size: 0.87rem; line-height: 1.5; text-align: left; width: 100%; cursor: pointer; -webkit-appearance: none; border-radius: 0; }
.opt-btn:disabled { cursor: default; }
.opt-btn.opt-sel { border-color: #1a1612; background: #ece7dc; }
.opt-btn.opt-sel .ind { background: #1a1612; border-color: #1a1612; color: #f5f0e8; }
.ind { min-width: 21px; height: 21px; border: 1.5px solid #7a6e62; display: flex; align-items: center; justify-content: center; font-size: 0.67rem; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.val-wrap { display: flex; justify-content: flex-end; margin-bottom: 0.45rem; }
.btn-val { padding: 0.48rem 1.3rem; background: #1a1612; color: #f5f0e8; border: none; font-family: 'Source Serif 4', serif; font-size: 0.81rem; font-weight: 600; cursor: pointer; letter-spacing: 0.05em; -webkit-appearance: none; border-radius: 0; }
.btn-val:disabled { background: #d8cfc2; color: #7a6e62; cursor: default; }
.fb { margin-top: 0.65rem; padding: 0.8rem 0.95rem; font-size: 0.84rem; line-height: 1.62; border-left: 3px solid; display: none; }
.fb.visible { display: block; }
.fb-ok { border-color: #1a5c2e; background: #eef7f1; color: #1a3d26; }
.fb-ko { border-color: #9e1b1b; background: #fdf0ef; color: #7a1414; }
.fb-partial { border-color: #b8860b; background: #fdf6e3; color: #6b3d00; }
.fb strong { font-weight: 700; }
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1612; border-top: 3px solid #b8860b; display: flex; justify-content: center; gap: 0.8rem; padding: 0.75rem 1rem; z-index: 200; }
.bottom-bar button { padding: 0.6rem 1.2rem; font-family: 'Source Serif 4', serif; font-weight: 600; font-size: 0.82rem; cursor: pointer; letter-spacing: 0.04em; -webkit-appearance: none; border-radius: 0; }
.btn-recommencer { background: #b8860b; color: #1a1612; border: none; }
.btn-nouvelle { background: transparent; color: #d4a843; border: 1.5px solid #b8860b; }
.bottom-space { height: 70px; }
#recap { display: none; background: #1a1612; color: #f5f0e8; padding: 2rem 1.5rem; text-align: center; margin: 1.5rem 0 0; border: 3px solid #b8860b; }
#recap h2 { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: #d4a843; margin-bottom: 0.4rem; }
#recap .big { font-size: 2.8rem; font-family: 'Playfair Display', serif; color: #fff; margin: 0.4rem 0; }
.cs-grid { margin: 1rem 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.7rem; }
.cs-item { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13); padding: 0.55rem 0.9rem; }

.cs-num { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
#recap p { font-size: 0.86rem; color: #c8bfb0; line-height: 1.72; max-width: 480px; margin: 0.8rem auto 0; }

const POOL = [

{ chap:"Introduction", theme:"Définitions", diff:"f", multi:false,
  q:"Quelle est la différence entre 'successibles' et 'héritiers appelés' ?",
  opts:["Les successibles sont uniquement les héritiers désignés par testament, tandis que les héritiers appelés sont les parents en ligne directe qui héritent automatiquement par la loi sans qu'aucun acte ne soit nécessaire", "Ce sont des synonymes désignant la même réalité juridique — toute personne susceptible d'hériter est à la fois successible et héritier appelé dès l'instant de l'ouverture de la succession", "Les successibles sont les personnes susceptibles de venir à la succession selon la loi (catégorie large), tandis que les héritiers appelés sont les successibles effectivement désignés après application de toutes les règles de classement et de préférence", "Les successibles sont les héritiers en ligne directe (enfants, parents), tandis que les héritiers appelés sont les héritiers collatéraux (frères, cousins) désignés en l'absence de descendants"],
  correct:2,
  ok:"Successibles = catégorie large : tous les parents + conjoint marié susceptibles de venir à la succession. Un successible n'est pas certain d'être effectivement appelé. Héritiers appelés = successibles effectivement désignés après application de toutes les règles (ordres, degrés, représentation).",
  ko:"Successibles = catégorie large (tous ceux qui pourraient hériter). Héritiers appelés = ceux effectivement désignés après filtrage par les règles de dévolution légale." },

{ chap:"Introduction", theme:"Définitions légataires", diff:"f", multi:false,
  q:"Le légataire particulier est-il tenu des dettes du défunt ?",
  opts:["Oui, dans les mêmes conditions que les héritiers légaux — tout bénéficiaire d'une libéralité successorale est tenu des dettes à proportion de ce qu'il reçoit, qu'il soit légataire particulier ou universel", "Oui, mais uniquement à concurrence de la valeur du bien légué — il ne peut être poursuivi au-delà de ce seuil, ce qui le distingue du légataire universel qui est tenu sans limite", "Non, sauf clause expresse dans le testament prévoyant que le légataire particulier prend le bien avec les charges et dettes qui y sont attachées à titre de condition de la libéralité", "Non, le légataire particulier n'est pas tenu des dettes — seuls les légataires universels et à titre universel continuent la personne du défunt et sont tenus des dettes comme les héritiers légaux"],
  correct:3,
  ok:"Légataire particulier (bien déterminé) : pas tenu des dettes. Légataires universels et à titre universel : continuent la personne du défunt → tenus des dettes (comme les héritiers légaux).",
  ko:"Le légataire particulier reçoit un bien déterminé et n'est pas tenu des dettes du défunt. C'est une différence fondamentale avec les légataires universels et à titre universel." },

{ chap:"Introduction", theme:"Deux moments clés", diff:"m", multi:false, alert:true,
  q:"⚠ Pour évaluer et calculer les droits (réserve, rapport), à quelle date se place-t-on fictivement ? Pour attribuer les biens effectivement, à quelle date se place-t-on ?",
  opts:["Toujours au jour du décès pour les deux opérations — la cohérence du calcul et de l'attribution exige une date unique, qui est la date d'ouverture de la succession", "Calculer fictivement au jour du décès / attribuer effectivement au jour du partage (valeur la plus proche de la jouissance divise, art. 829 C.cv)", "Calculer au jour de la donation pour les libéralités, au jour du décès pour les biens existants / attribuer au jour du décès dans tous les cas pour simplifier les opérations de partage", "Calculer au jour du partage pour tenir compte de la fluctuation des valeurs / attribuer au jour du décès pour déterminer les droits selon la situation patrimoniale du défunt"],
  correct:1,
  ok:"Deux moments fondamentaux. Calculer (droits en quotité, réserve, rapport) → fictivement au jour du décès. Attribuer les biens effectivement → au jour du partage (valeur la plus proche de la jouissance divise, art. 829).",
  ko:"Calculer = jour du décès (fictivement). Attribuer = jour du partage. Ces deux moments sont fondamentaux et testés systématiquement en cas pratique." },

{ chap:"Introduction", theme:"Méthode impérative", diff:"m", multi:false,
  q:"Si le défunt a laissé un testament, faut-il quand même établir la dévolution légale ?",
  opts:["Oui — on établit toujours la dévolution légale, même s'il y a un testament, car la réserve héréditaire est toujours attribuée selon les règles de la dévolution légale", "Non — le testament remplace entièrement la dévolution légale et constitue la seule règle applicable pour déterminer qui hérite et dans quelle proportion", "Non, sauf si le testament ne couvre qu'une partie des biens (testament partiel), auquel cas la dévolution légale s'applique pour les biens non visés par les dispositions testamentaires", "Oui, uniquement si le testateur avait des enfants — en l'absence de descendants, le testament prévaut seul sans qu'il soit nécessaire d'établir préalablement la dévolution légale"],
  correct:0,
  ok:"Méthode impérative : on établit toujours la dévolution légale, même s'il y a un testament (car la réserve héréditaire est attribuée selon les règles de la dévolution légale). Même s'il n'y a pas de testament, on vérifie les libéralités (donations).",
  ko:"On établit toujours la dévolution légale, testament ou pas. La réserve héréditaire suit toujours la dévolution légale, et les biens non couverts par le testament suivent aussi la dévolution légale." },

{ chap:"Introduction", theme:"Délais", diff:"m", multi:false, alert:true,
  q:"⚠ Quels sont les délais essentiels en droit des successions ?",
  opts:["10 ans pour accepter la succession (loi 2006, successions ouvertes à compter du 1er janv. 2007) / 5 ans pour revendiquer la qualité de réservataire / pas de délai pour les opérations de liquidation", "30 ans pour accepter la succession / 10 ans pour revendiquer la qualité de réservataire / aucun délai spécifique pour les opérations de liquidation entre cohéritiers", "5 ans pour accepter la succession / 10 ans pour revendiquer la qualité de réservataire / 3 ans pour engager les opérations de liquidation et de partage entre les cohéritiers", "6 mois pour accepter obligatoirement sous peine de renonciation implicite / 30 ans pour revendiquer la qualité de réservataire / 10 ans pour les opérations de liquidation"],
  correct:0,
  ok:"Délais à mémoriser : pas de délai pour les opérations de liquidation / 10 ans pour accepter la succession (depuis loi 2006, successions ouvertes à compter du 1er janv. 2007) / 5 ans pour revendiquer la qualité de réservataire.",
  ko:"Trois délais clés : pas de délai pour la liquidation / 10 ans pour accepter / 5 ans pour la réserve. Avant la loi de 2006 : 30 ans pour accepter." },

{ chap:"Chap. préliminaire — Ouverture", theme:"Absence vs disparition", diff:"m", multi:false, alert:true,
  q:"⚠ Quelle est la différence fondamentale entre le jugement déclaratif d'absence et le jugement déclaratif de décès (disparition) ?",
  opts:["Les deux jugements produisent exactement les mêmes effets juridiques — dans les deux cas, le mariage est dissous et la succession est définitivement ouverte au profit des héritiers désignés par la loi", "Dans l'absence : le jugement déclare l'absence (effets du décès sans décès déclaré) — l'absent reste 'absent'. Dans la disparition : le jugement déclare le décès et fixe sa date. Si l'absent reparaît : recours en révision (il récupère ses biens mais pas son conjoint)", "La disparition nécessite un délai de 20 ans sans nouvelles avant que le juge puisse être saisi / l'absence ne nécessite que 10 ans, les deux produisant le même effet d'ouverture de la succession", "L'absence vise uniquement les personnes portées disparues en mer ou lors d'une catastrophe naturelle / la disparition vise les personnes dont on est sans nouvelles depuis plus de 10 ans sans cause accidentelle connue"],
  correct:1,
  ok:"Différence fondamentale. Absence : jugement déclare l'absence (pas le décès) → effets du décès sans décès déclaré. Employer le conditionnel. Si l'absent reparaît : recours en révision, il récupère ses biens mais pas son conjoint (mariage reste dissous même sans remariage). Disparition : jugement déclare le décès et fixe sa date.",
  ko:"Absence = déclaration d'absence (pas de décès déclaré). Disparition = décès déclaré + date fixée. Si l'absent reparaît : récupère ses biens mais pas son conjoint." },

{ chap:"Chap. préliminaire — Ouverture", theme:"Lieu ouverture", diff:"f", multi:false,
  q:"Où s'ouvre la succession selon l'art. 720 C.cv ?",
  opts:["Au dernier domicile du défunt (et non au lieu du décès), ce qui détermine la compétence des juridictions pour les litiges successoraux", "Au lieu du décès du défunt, car c'est le fait générateur de la succession et le point de rattachement le plus certain pour déterminer la compétence territoriale", "Au domicile du principal héritier désigné par testament ou, à défaut, de l'héritier légal le plus proche en degré de parenté avec le défunt", "Au lieu de situation du principal bien immobilier du défunt, conformément à la règle de compétence territoriale en matière de droits réels immobiliers"],
  correct:0,
  ok:"Art. 720 : les successions s'ouvrent par la mort, au dernier domicile du défunt (et non le lieu du décès, qui serait artificiel si le décès est accidentel). Détermine la compétence des juridictions pour les litiges successoraux (règle ratione loci).",
  ko:"Ouverture au dernier domicile du défunt (pas au lieu du décès). En cas de jugement déclaratif d'absence : dernier domicile connu." },

{ chap:"Chap. préliminaire — Ouverture", theme:"Pacte sur succession future", diff:"m", multi:false,
  q:"La donation-partage est-elle un pacte sur succession future prohibé ?",
  opts:["Oui, car elle porte sur une succession non encore ouverte et anticipe la dévolution successorale, ce qui constitue par nature un pacte sur succession future contraire à l'ordre public", "Oui, sauf si elle est réalisée devant notaire et homologuée par le juge des tutelles, conditions qui permettent de lever la prohibition exceptionnellement pour des raisons familiales légitimes", "Non, la donation-partage est une exception légale expressément autorisée — c'est un acte hybride combinant donation et partage anticipé de succession", "Non, mais uniquement si elle est réalisée exclusivement entre parents et enfants directs — étendue aux petits-enfants, elle redevient un pacte sur succession future prohibé"],
  correct:2,
  ok:"La donation-partage est une exception légale au principe de prohibition des pactes sur succession future. Acte hybride (donation + partage anticipé). Depuis 2006 : donation-partage transgénérationnelle possible (entre enfants et petits-enfants). Autres exceptions : institution contractuelle entre époux, RAAR.",
  ko:"La donation-partage est une exception légale expressément autorisée au principe de prohibition. Acte hybride (donation + partage anticipé). Exception = autorisée par la loi." },

{ chap:"Chap. préliminaire — Ouverture", theme:"Réserve héréditaire", diff:"m", multi:false, alert:true,
  q:"⚠ Quelles sont les quotités de la réserve héréditaire selon le nombre d'enfants ?",
  opts:["1 enfant = 1/2 de la succession / 2 enfants = 2/3 de la succession / 3 enfants ou plus = 3/4 de la succession", "1 enfant = 1/3 de la succession / 2 enfants = 1/2 de la succession / 3 enfants ou plus = 2/3 de la succession", "1 enfant = 1/4 de la succession / 2 enfants = 1/2 de la succession / 3 enfants ou plus = 3/4 de la succession", "Toujours 1/2 quelle que soit la situation, le nombre d'enfants n'influençant que la répartition de la réserve entre eux mais non son montant global"],
  correct:0,
  ok:"Quotités de la réserve : 1 enfant = 1/2 (quotité disponible = 1/2) / 2 enfants = 2/3 (quotité disponible = 1/3) / 3 enfants ou plus = 3/4 (quotité disponible = 1/4). Le conjoint n'est réservataire que si pas de descendants.",
  ko:"1 enfant = réserve 1/2 / 2 enfants = réserve 2/3 / 3+ enfants = réserve 3/4. Le conjoint est réservataire seulement en l'absence de descendants." },

{ chap:"Chap. préliminaire — Ouverture", theme:"RAAR", diff:"d", multi:false,
  q:"Qu'est-ce que la RAAR et depuis quand est-elle possible ?",
  opts:["La Renonciation Anticipée à l'Action en Réduction (art. 929 C.cv), introduite par la loi de 2006 — l'héritier réservataire peut renoncer par avance à son action en réduction dans des conditions strictes", "La Renonciation Automatique À la Réserve — en vigueur depuis 2001, elle permet à l'héritier réservataire de renoncer tacitement à la protection de la réserve en acceptant une libéralité qui la dépasse", "La Révocation Anticipée d'un Acte de Réserve — introduite par la loi de 2007, elle permet au donateur de révoquer unilatéralement une donation consentie à un héritier réservataire avant l'ouverture de la succession", "La Renonciation À l'Acceptation de la Réserve — instituée en 1965, elle permet à l'héritier de refuser le bénéfice de la réserve dans l'acte même par lequel il accepte la succession"],
  correct:0,
  ok:"RAAR = Renonciation Anticipée à l'Action en Réduction (art. 929 C.cv). Introduite par la loi de 2006. L'héritier réservataire peut renoncer par avance à son action en réduction dans des conditions strictes. Tempérament au caractère d'ordre public de la réserve.",
  ko:"RAAR = Renonciation Anticipée à l'Action en Réduction (loi 2006). Permet à un réservataire de renoncer par avance à contester les libéralités excessives du défunt." },

{ chap:"Chap. 1 — Dévolution légale", theme:"Règle fondamentale ordres/degrés", diff:"m", multi:false, alert:true,
  q:"⚠ Un défunt laisse une petite-fille (2e degré, 1er ordre) et son père (1er degré, 2e ordre). Qui hérite ?",
  opts:["Le père, car il est au 1er degré et la proximité de degré prime toujours l'appartenance à un ordre — le parent le plus proche en degré exclut toujours le parent plus éloigné quelle que soit sa catégorie", "La petite-fille, car l'ordre (art. 734) prime toujours la proximité de degré (art. 744 al. 1) — le 1er ordre évince le 2e ordre même si le père est au 1er degré", "Le père hérite des meubles et la petite-fille des immeubles — la dévolution légale distingue la nature des biens pour attribuer chaque catégorie à l'héritier dont le lien avec le bien est le plus étroit", "Ils héritent à parts égales — en présence d'héritiers de degrés et d'ordres différents, le législateur a prévu un partage proportionnel afin d'assurer une équité entre les branches de la famille"],
  correct:1,
  ok:"Règle fondamentale : l'ordre (art. 734) prime toujours la proximité de degré (art. 744 al. 1). La petite-fille (2e degré, 1er ordre) prime le père (1er degré, 2e ordre). Ne jamais inverser. Le 1er ordre évince tous les ordres subséquents.",
  ko:"L'ordre prime la proximité de degré. La petite-fille (1er ordre) prime le père (2e ordre), même si le père est plus proche en degré. Règle fondamentale à ne jamais inverser." },

{ chap:"Chap. 1 — Dévolution légale", theme:"Calcul degrés collatéraux", diff:"m", multi:false,
  q:"À quel degré se trouvent des cousins germains en ligne collatérale ?",
  opts:["Au 4e degré — en comptant depuis l'un des cousins jusqu'à l'auteur commun (2 degrés) puis depuis l'auteur commun jusqu'à l'autre cousin (2 degrés), soit 2+2 = 4", "Au 3e degré — par analogie avec la relation neveu/oncle, les cousins germains se situent à trois degrés de parenté de chaque côté de la famille", "Au 2e degré — comme les frères et sœurs, les cousins germains sont comptés en remontant directement jusqu'à l'auteur commun sans redescendre", "Au 5e degré — le calcul en ligne collatérale inclut tous les intermédiaires y compris l'auteur commun, ce qui ajoute un degré supplémentaire par rapport au calcul habituel"],
  correct:0,
  ok:"En ligne collatérale : on compte depuis l'un des parents jusqu'à l'auteur commun (non compris) + depuis l'auteur commun jusqu'à l'autre parent. Cousins germains : 2 (cousin → parent commun) + 2 (parent commun → l'autre cousin) = 4e degré. Frères/sœurs = 2e degré. Neveu/oncle = 3e degré.",
  ko:"Cousins germains = 4e degré (2+2). Frères/sœurs = 2e degré (1+1). Neveu/oncle = 3e degré (2+1)." },

{ chap:"Chap. 1 — Dévolution légale", theme:"Représentation conditions", diff:"m", multi:false, alert:true,
  q:"⚠ Quelles sont les 3 conditions cumulatives pour que la représentation s'applique en ligne directe descendante ?",
  opts:["Pluralité de souches + représenté prédécédé, indigne ou renonçant + représentant personnellement apte à recueillir la succession du de cujus", "Décès du représenté avant le de cujus + présence d'un conjoint survivant + accord préalable du notaire chargé de la liquidation de la succession", "Renoncement du représenté à la succession + présence d'autres héritiers dans le même ordre + décision judiciaire autorisant expressément la représentation", "Prédécès du représenté + consentement écrit de tous les autres héritiers présents + majorité légale du représentant au jour de l'ouverture de la succession"],
  correct:0,
  ok:"3 conditions cumulatives (art. 752) : (1) pluralité de souches (le défunt doit avoir eu plusieurs enfants — Cass. 2013) / (2) le représenté doit être prédécédé ou indigne (loi 2001) ou renonçant (depuis 1er janv. 2007) / (3) le représentant doit être personnellement apte à recueillir la succession du de cujus (ne pas être lui-même indigne).",
  ko:"3 conditions : pluralité de souches + représenté prédécédé/indigne/renonçant + représentant personnellement apte. Si enfant unique prédécédé sans descendant → pas de représentation possible." },

{ chap:"Chap. 1 — Dévolution légale", theme:"Représentation effets", diff:"m", multi:false, alert:true,
  q:"⚠ La représentation entraîne un partage par tête ou par souche ?",
  opts:["Toujours par tête — tous les héritiers, qu'ils viennent de leur chef ou par représentation, reçoivent une part égale calculée en divisant la masse successorale par le nombre total de bénéficiaires", "Par tête si les représentants sont au même degré que les autres héritiers, par souche si les représentants sont à un degré différent — le critère est l'égalité de degré entre co-héritiers", "Par souche — dans chaque souche, le partage se fait ensuite par tête entre les représentants, le représentant prenant la même part que le représenté aurait prise", "Toujours par souche sans aucun partage ultérieur dans la souche, la totalité de la part du représenté revenant au seul représentant désigné en premier dans l'ordre de primogéniture"],
  correct:2,
  ok:"Représentation → partage par souche (et non par tête). Dans chaque souche, partage par tête entre les représentants. Le représentant prend la même part que le représenté aurait prise → le représentant n'a pas plus de droits que n'en avait le représenté. Le représentant doit aussi le rapport que devait le représenté.",
  ko:"Représentation = partage par souche. Dans chaque souche, partage par tête. Le représentant ne peut pas avoir plus de droits que le représenté. Et le représentant doit le rapport que devait le représenté." },

{ chap:"Chap. 1 — Dévolution légale", theme:"2e ordre mixte", diff:"m", multi:false,
  q:"En présence des deux parents et de frères/sœurs (2e ordre mixte), quelle est la répartition (art. 738 al. 1) ?",
  opts:["Père 1/3, mère 1/3, frères et sœurs 1/3 — la loi prévoit un partage en trois tiers égaux entre les trois catégories d'héritiers du 2e ordre lorsqu'ils se retrouvent concurremment à la succession", "Père 1/2, mère 1/2, frères et sœurs évincés — la présence des deux parents exclut totalement les frères et sœurs qui ne peuvent concourir avec les ascendants au sein du même ordre", "Père 1/4, mère 1/4, frères/sœurs et descendants 1/2 — si un seul parent survit : ce parent reçoit 1/4 et les frères/sœurs reçoivent 3/4", "Père 1/6, mère 1/6, frères et sœurs 2/3 — la loi accorde aux collatéraux privilégiés une part plus importante pour tenir compte de leur proximité affective avec le défunt"],
  correct:2,
  ok:"Art. 738 al. 1 : si les père et mère survivent tous les deux : père = 1/4 / mère = 1/4 / frères-sœurs et descendants = 1/2. Si un seul parent survit (art. 738 al. 2) : ce parent = 1/4 / frères-sœurs = 3/4.",
  ko:"Deux parents + frères/sœurs : père 1/4 / mère 1/4 / frères-sœurs 1/2. Un seul parent + frères/sœurs : ce parent 1/4 / frères-sœurs 3/4." },

{ chap:"Chap. 1 — Dévolution légale", theme:"3e ordre fente", diff:"m", multi:false, alert:true,
  q:"⚠ Que signifie l'adage 'fente sur refente ne vaut' pour les ascendants ordinaires (3e ordre) ?",
  opts:["La division par branches peut être répétée à l'infini dans chaque génération d'ascendants, créant autant de sous-branches qu'il y a d'ascendants de degrés différents dans chaque ligne", "La fente s'applique autant de fois qu'il y a de générations d'ascendants représentés dans la succession, en subdivisant à chaque étape la part attribuée à chaque branche généalogique", "La division par branches ne se fait qu'une seule fois — on ne subdivise pas les branches, et si une branche est vacante, la fente 'se referme' et les ascendants de l'autre branche recueillent tout", "Les branches paternelle et maternelle ne peuvent jamais fusionner quelle que soit la situation, chaque branche conservant ses droits propres même en l'absence d'ascendants dans l'une d'elles"],
  correct:2,
  ok:"'Fente sur refente ne vaut' : la division par branches ne se fait qu'une seule fois. On ne subdivise pas les branches. Art. 748 : à défaut d'ascendant dans une branche, les ascendants de l'autre branche recueillent toute la succession (la fente 'se referme').",
  ko:"Fente = 1 seule fois. Pas de subdivision des branches. Si une branche est vacante : la fente se referme et les ascendants de l'autre branche recueillent tout." },

{ chap:"Chap. 1 — Dévolution légale", theme:"Collatéraux ordinaires", diff:"m", multi:false,
  q:"Jusqu'à quel degré les collatéraux ordinaires peuvent-ils hériter ab intestat (art. 745 C.cv) ?",
  opts:["Jusqu'au 4e degré — au-delà, les collatéraux sont trop éloignés pour être considérés comme de véritables héritiers et la succession est attribuée à l'État sans possibilité de testament", "Jusqu'au 6e degré en succession ab intestat — au-delà, uniquement par testament — si aucun collatéral en degré utile, la succession est vacante et revient à l'État", "Sans limite de degré — tout parent, aussi éloigné soit-il, peut revendiquer sa part ab intestat dès lors qu'il prouve son lien de parenté par actes d'état civil et qu'aucun héritier plus proche n'existe", "Jusqu'au 8e degré, conformément à la règle générale de prescription en matière successorale qui fixe à 8 degrés la limite des liens de parenté juridiquement reconnus"],
  correct:1,
  ok:"Art. 745 : les parents collatéraux ne succèdent pas au-delà du 6e degré. Exception : un collatéral au-delà du 6e degré peut hériter s'il est désigné par testament. Si aucun collatéral en degré utile → succession vacante → revient à l'État.",
  ko:"Collatéraux : limite du 6e degré en succession ab intestat. Au-delà, uniquement par testament. Si aucun collatéral en degré utile → succession vacante → État." },

{ chap:"Chap. 1 — Dévolution légale", theme:"Conjoint successible", diff:"m", multi:false, alert:true,
  q:"⚠ Le partenaire de PACS peut-il hériter ab intestat (sans testament) ?",
  opts:["Oui, dans les mêmes conditions que le conjoint marié depuis la loi de 1999 qui a aligné les droits successoraux du partenaire de PACS sur ceux du conjoint survivant", "Oui, s'il a vécu au moins 2 ans avec le défunt avant le décès, condition minimale de durée permettant d'établir la réalité de la vie commune et de justifier des droits successoraux", "Non, le partenaire de PACS ne peut hériter que par testament — seul le conjoint marié non divorcé est successible ab intestat selon l'art. 731", "Non, sauf s'ils avaient des enfants communs — la présence d'enfants nés de l'union pacsée confère au partenaire survivant des droits successoraux analogues à ceux du conjoint marié"],
  correct:2,
  ok:"Seul le conjoint marié est successible (art. 731-732). Le partenaire de PACS ne peut hériter que par testament. Le séparé de corps peut hériter (la séparation ne met pas fin au mariage). Le mariage posthume n'emporte pas de conséquence successorale.",
  ko:"PACS ≠ mariage en matière successorale. Le partenaire de PACS n'hérite que par testament. Seul le conjoint marié non divorcé est successible." },

{ chap:"Chap. 1 — Dévolution légale", theme:"Conjoint avec descendants", diff:"m", multi:false,
  q:"Le défunt laisse un conjoint et 2 enfants communs. Quels sont les droits du conjoint (art. 757 C.cv) ?",

const CHAPTER_ORDER = [
  "Introduction",
  "Chap. préliminaire — Ouverture",
  "Chap. 1 — Dévolution légale",
  "Chap. 2 — Acquisition",
  "Chap. 3 — Liquidation"
];
const N = 30;
let sessionQ=[], state=[], currentFilter='all';

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pickSession(){
  const byChap={};CHAPTER_ORDER.forEach(ch=>{byChap[ch]=[];});
  POOL.forEach(q=>{if(byChap[q.chap])byChap[q.chap].push(q);});
  let picked=[];
  CHAPTER_ORDER.forEach(ch=>{
    const pool=shuffle(byChap[ch]||[]);
    const quota=Math.round((pool.length/POOL.length)*N);
    picked=picked.concat(pool.slice(0,quota));
  });
  const remaining=shuffle(POOL.filter(q=>!picked.includes(q)));
  while(picked.length<N&&remaining.length>0)picked.push(remaining.shift());
  picked.sort((a,b)=>CHAPTER_ORDER.indexOf(a.chap)-CHAPTER_ORDER.indexOf(b.chap));
  return picked;
}
document.addEventListener('DOMContentLoaded',newSession);
function newSession(){
  sessionQ=pickSession();state=sessionQ.map(()=>({answered:false,selected:[],isCorrect:false}));
  currentFilter='all';document.getElementById('recap').style.display='none';
  document.getElementById('sessbar').innerHTML=`<span>Session en cours · <strong>${sessionQ.length} questions</strong> tirées sur ${POOL.length} disponibles</span><button class="btn-top" onclick="newSession()">⟳ Nouvelle session</button>`;
  buildNav();renderAll();updateScore();window.scrollTo({top:0,behavior:'smooth'});
}
function restartSession(){
  state=sessionQ.map(()=>({answered:false,selected:[],isCorrect:false}));
  document.getElementById('recap').style.display='none';currentFilter='all';buildNav();renderAll();updateScore();window.scrollTo({top:0,behavior:'smooth'});
}
function buildNav(){
  const nav=document.getElementById('chapnav');nav.innerHTML='';
  ['all',...CHAPTER_ORDER.filter(ch=>sessionQ.some(q=>q.chap===ch))].forEach(ch=>{
    const btn=document.createElement('button');btn.className='chap-btn'+(ch===currentFilter?' active':'');
    btn.textContent=ch==='all'?'📋 Toutes':ch;btn.onclick=()=>{currentFilter=ch;buildNav();renderAll();};nav.appendChild(btn);
  });
}
function renderAll(){
  const container=document.getElementById('qlist');container.innerHTML='';document.getElementById('sc-total').textContent=sessionQ.length;
  const filtered=sessionQ.map((q,i)=>({...q,idx:i})).filter(q=>currentFilter==='all'||q.chap===currentFilter);
  const byChap={};CHAPTER_ORDER.forEach(ch=>{byChap[ch]=[];});filtered.forEach(q=>{byChap[q.chap].push(q);});
  let num=0;
  CHAPTER_ORDER.forEach(ch=>{
    const qs=byChap[ch];if(!qs||!qs.length)return;
    if(currentFilter==='all'){const hdr=document.createElement('div');hdr.className='chap-hdr';hdr.innerHTML=`<h2>${ch}</h2><span class="chap-cnt">${qs.length} question${qs.length>1?'s':''}</span>`;container.appendChild(hdr);}
    qs.forEach(q=>{num++;container.appendChild(buildCard(q,num));});
  });updateProgress();
}
function buildCard(q,num){
  const s=state[q.idx];const card=document.createElement('div');card.className='q-card';card.id='c'+q.idx;
  const dc={f:'df',m:'dm',d:'dd'}[q.diff]||'';const dl={f:'● Facile',m:'● Moyen',d:'● Difficile'}[q.diff]||'';
  card.innerHTML=`<div class="q-meta"><span class="t-chap">${q.chap}</span><span class="t-theme">${q.theme}</span><span class="t-diff ${dc}">${dl}</span>${q.alert?'<span class="t-alert">⚠ À retenir</span>':''}<span class="q-num">Q${num}</span></div><div class="q-text">${q.q}</div><div class="q-instr">${q.multi?'📝 Plusieurs bonnes réponses — cochez tout ce qui est juste, puis validez.':'📝 Une seule bonne réponse — choisissez, puis validez.'}</div><div class="opts" id="opts${q.idx}">${q.opts.map((o,oi)=>`<button class="opt-btn" id="o${q.idx}_${oi}" onclick="toggle(${q.idx},${oi},${q.multi})" ${s.answered?'disabled':''}><span class="ind">${String.fromCharCode(65+oi)}</span><span>${o}</span></button>`).join('')}</div><div class="val-wrap"><button class="btn-val" id="v${q.idx}" onclick="validate(${q.idx})" ${s.answered||s.selected.length===0?'disabled':''}>Valider ma réponse</button></div><div class="fb" id="fb${q.idx}"></div>`;
  if(s.answered)applyCard(q.idx,q,s);return card;
}
function toggle(qi,oi,multi){
  const s=state[qi];if(s.answered)return;
  s.selected=multi?(s.selected.includes(oi)?s.selected.filter(x=>x!==oi):[...s.selected,oi]):[oi];
  sessionQ[qi].opts.forEach((_,i)=>{const b=document.getElementById(`o${qi}_${i}`);if(!b)return;const sel=s.selected.includes(i);b.className='opt-btn'+(sel?' opt-sel':'');const ind=b.querySelector('.ind');ind.style.cssText=sel?'background:#1a1612;border-color:#1a1612;color:#f5f0e8':'';});
  const v=document.getElementById('v'+qi);if(v)v.disabled=s.selected.length===0;
}
function validate(qi){
  const s=state[qi];if(s.answered||s.selected.length===0)return;s.answered=true;
  const q=sessionQ[qi];const corrects=Array.isArray(q.correct)?q.correct:[q.correct];
  const selSet=new Set(s.selected),corSet=new Set(corrects);
  s.isCorrect=[...selSet].every(i=>corSet.has(i))&&[...corSet].every(i=>selSet.has(i));
  q.opts.forEach((_,oi)=>{const b=document.getElementById(`o${qi}_${oi}`);if(b)b.disabled=true;});
  const v=document.getElementById('v'+qi);if(v)v.disabled=true;
  applyCard(qi,q,s);updateScore();updateProgress();checkComplete();
}
function isPartial(q,s){if(!q.multi)return false;const c=Array.isArray(q.correct)?q.correct:[q.correct];return s.selected.filter(i=>c.includes(i)).length>0&&s.selected.filter(i=>c.includes(i)).length<c.length;}
function applyCard(qi,q,s){
  const corrects=Array.isArray(q.correct)?q.correct:[q.correct];
  q.opts.forEach((_,oi)=>{
    const b=document.getElementById(`o${qi}_${oi}`);if(!b)return;const ind=b.querySelector('.ind');b.removeAttribute('style');if(ind)ind.removeAttribute('style');
    if(corrects.includes(oi)&&s.selected.includes(oi)){b.style.setProperty('border-color','#1a5c2e');b.style.setProperty('background-color','#eef7f1');b.style.setProperty('color','#1a5c2e');if(ind){ind.style.setProperty('background','#1a5c2e');ind.style.setProperty('border-color','#1a5c2e');ind.style.setProperty('color','#fff');}}
    else if(!corrects.includes(oi)&&s.selected.includes(oi)){b.style.setProperty('border-color','#9e1b1b');b.style.setProperty('background-color','#fdf0ef');b.style.setProperty('color','#9e1b1b');if(ind){ind.style.setProperty('background','#9e1b1b');ind.style.setProperty('border-color','#9e1b1b');ind.style.setProperty('color','#fff');}}
    else if(corrects.includes(oi)&&!s.selected.includes(oi)){b.style.setProperty('border-color','#b8860b');b.style.setProperty('background-color','#fffbf0');b.style.setProperty('color','#7a4800');if(ind){ind.style.setProperty('background','#b8860b');ind.style.setProperty('border-color','#b8860b');ind.style.setProperty('color','#fff');}}
  });
  const fb=document.getElementById(`fb${qi}`);
  if(fb){const partial=isPartial(q,s);let cls,txt;if(s.isCorrect){cls='fb-ok';txt=`<strong>✓ Bonne réponse !</strong> ${q.ok}`;}else if(partial){cls='fb-partial';txt=`<strong>⚠ Réponse incomplète.</strong> ${q.ko}`;}else{cls='fb-ko';txt=`<strong>✗ Mauvaise réponse.</strong> ${q.ko}`;}fb.className='fb visible '+cls;fb.innerHTML=txt;}
}
function updateScore(){const done=state.filter(s=>s.answered).length,ok=state.filter(s=>s.answered&&s.isCorrect).length;document.getElementById('sc-done').textContent=done;document.getElementById('sc-ok').textContent=ok;document.getElementById('sc-ko').textContent=done-ok;}
function updateProgress(){document.getElementById('pbar').style.width=(state.filter(s=>s.answered).length/sessionQ.length*100)+'%';}
function checkComplete(){
  if(state.filter(s=>s.answered).length<sessionQ.length)return;
  const ok=state.filter(s=>s.isCorrect).length,pct=Math.round(ok/sessionQ.length*100);
  let chapHTML='';CHAPTER_ORDER.forEach(ch=>{const cqs=sessionQ.map((q,i)=>({...q,idx:i})).filter(q=>q.chap===ch);if(!cqs.length)return;const cok=cqs.filter(q=>state[q.idx].isCorrect).length;chapHTML+=`<div class="cs-item"><div class="cs-name">${ch}</div><div class="cs-num">${cok} / ${cqs.length}</div></div>`;});
  document.getElementById('recap-chaps').innerHTML=chapHTML;document.getElementById('recap-score').textContent=`${ok} / ${sessionQ.length} (${pct}%)`;
  const msgs=['Reprends la fiche depuis le début. Commence par les définitions clés, les ordres d\'héritiers et les deux moments fondamentaux (calcul au décès / attribution au partage).','Résultat moyen. Revois les règles fondamentales : ordre prime degré, conditions de la représentation, droits du conjoint, indignité, rapport des libéralités.','Bon travail ! Consolide les points délicats : représentation par souche, droit viager logement, délai préfix, présomption de rapport des donations.','Excellent ! Tu maîtrises très bien ce cours. Revois les quelques points manqués avant le cas pratique.'];
  document.getElementById('recap-msg').textContent=msgs[pct>=85?3:pct>=70?2:pct>=50?1:0];document.getElementById('recap').style.display='block';setTimeout(()=>document.getElementById('recap').scrollIntoView({behavior:'smooth',block:'start'}),200);
}
</script>
</body>
