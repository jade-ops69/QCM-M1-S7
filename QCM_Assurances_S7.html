<style>
:root{--ink:#1a1612;--cream:#f5f0e8;--gold:#b8860b;--gold-light:#d4a843;--gold-pale:#f0d98a;--red:#9b1c1c;--green:#14532d;--orange:#92400e;--red-bg:#fef2f2;--green-bg:#f0fdf4;--orange-bg:#fffbeb;--mid:#7a6e62;--border:#d8cfc2;--card-bg:#faf6ef}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:'Source Serif 4',Georgia,serif;background:var(--cream);color:var(--ink);min-height:100vh;padding-bottom:90px}
header{background:var(--ink);color:var(--cream);padding:2.2rem 1.5rem 1.6rem;text-align:center;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:100}
header .subtitle{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-light);margin-bottom:.35rem}
header h1{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,3.5vw,2rem);font-weight:900;line-height:1.1;color:var(--cream)}
header .tagline{margin-top:.4rem;font-size:.78rem;color:#a89880;font-style:italic}
#scorebar{background:#111;color:var(--cream);padding:.6rem 1rem;display:flex;justify-content:center;align-items:center;gap:1.5rem;flex-wrap:wrap;font-size:.8rem}
#scorebar .stat{display:flex;align-items:center;gap:.3rem}
#scorebar .stat span.val{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700}
#scorebar .stat.cor .val{color:#4ade80}#scorebar .stat.inc .val{color:#f87171}#scorebar .stat.ans .val{color:var(--gold-light)}
#progress-bar{height:3px;background:#333}#progress-fill{height:100%;background:var(--gold);transition:width .4s ease;width:0%}
#session-info{background:var(--ink);color:#a89880;padding:.35rem 1rem;text-align:center;font-size:.72rem;letter-spacing:.05em;display:flex;justify-content:center;align-items:center;gap:1rem;flex-wrap:wrap}
#session-info button{background:none;border:1px solid #555;color:var(--gold-light);font-size:.7rem;padding:.2rem .6rem;border-radius:3px;cursor:pointer;font-family:inherit;transition:all .2s}
#session-info button:hover{border-color:var(--gold);color:var(--gold-pale)}
#filters{background:var(--card-bg);border-bottom:1px solid var(--border);padding:.7rem 1rem;display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.filter-btn{background:none;border:1px solid var(--border);color:var(--mid);font-family:inherit;font-size:.7rem;padding:.3rem .65rem;border-radius:30px;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:var(--gold);color:var(--gold)}.filter-btn.active{background:var(--ink);border-color:var(--ink);color:var(--gold-light)}
main{max-width:760px;margin:0 auto;padding:1.2rem 1rem}
.chapter-header{display:flex;align-items:center;gap:.8rem;margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:2px solid var(--gold)}
.chapter-header:first-child{margin-top:.5rem}
.chapter-header h2{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--ink);flex:1}
.chapter-count{font-size:.68rem;background:var(--ink);color:var(--gold-light);padding:.15rem .5rem;border-radius:30px;white-space:nowrap}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;margin-bottom:1.2rem;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-header{display:flex;align-items:center;gap:.4rem;padding:.65rem 1rem .5rem;border-bottom:1px solid var(--border);background:rgba(0,0,0,.02);flex-wrap:wrap}
.q-number{font-family:'Playfair Display',serif;font-size:.7rem;font-weight:700;color:var(--gold);letter-spacing:.08em;text-transform:uppercase}
.badge-diff{font-size:.62rem;padding:.12rem .45rem;border-radius:20px;font-weight:600;text-transform:uppercase}
.badge-diff.facile{background:#dcfce7;color:#166534}.badge-diff.moyen{background:#fef9c3;color:#854d0e}.badge-diff.difficile{background:#fee2e2;color:#991b1b}
.badge-retenir{font-size:.62rem;padding:.12rem .45rem;border-radius:20px;background:#fef2f2;color:#9b1c1c;font-weight:700}
.badge-type{font-size:.6rem;padding:.1rem .4rem;border-radius:20px;background:#ede9fe;color:#5b21b6;margin-left:auto}
.q-text{padding:.9rem 1rem .6rem;font-size:.93rem;line-height:1.55}
.options{padding:0 .8rem .8rem;display:flex;flex-direction:column;gap:.4rem}
.opt-btn{display:flex;align-items:flex-start;gap:.6rem;background:white;border:1.5px solid var(--border);border-radius:6px;padding:.55rem .75rem;cursor:pointer;text-align:left;width:100%;font-family:inherit;font-size:.85rem;line-height:1.45;color:var(--ink);transition:border-color .15s,background .15s}
.opt-btn:hover:not(:disabled){border-color:var(--gold);background:#fdf8f0}.opt-btn:disabled{cursor:default}
.opt-letter{font-family:'Playfair Display',serif;font-size:.8rem;font-weight:700;color:var(--gold);min-width:18px;line-height:1.45}
.opt-text{flex:1;line-height:1.45}
.opt-check{width:16px;height:16px;border:2px solid var(--border);border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:white}
.opt-btn.selected .opt-check{background:var(--gold);border-color:var(--gold)}.opt-btn.selected .opt-check::after{content:'✓'}
.validate-area{padding:0 .8rem .8rem}
.btn-valider{width:100%;background:var(--ink);color:var(--gold-light);border:none;border-radius:6px;padding:.7rem;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;letter-spacing:.05em;transition:opacity .2s}
.btn-valider:disabled{opacity:.4;cursor:default}
.feedback{margin:0 .8rem .8rem;padding:.75rem 1rem;border-radius:6px;font-size:.82rem;line-height:1.5;display:none;border-left:3px solid}
.feedback.visible{display:block}.feedback.correct{background:var(--green-bg);border-color:#16a34a;color:#14532d}.feedback.incorrect{background:var(--red-bg);border-color:#dc2626;color:#7f1d1d}
#bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--ink);border-top:2px solid var(--gold);padding:.7rem 1rem;display:flex;gap:.7rem;justify-content:center;z-index:200}
#bottom-bar button{flex:1;max-width:200px;background:none;border:1.5px solid #555;color:var(--cream);font-family:inherit;font-size:.8rem;padding:.55rem .5rem;border-radius:5px;cursor:pointer;transition:all .2s}
#bottom-bar button:hover{border-color:var(--gold);color:var(--gold-light)}
#bottom-bar button.primary{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:700}
#recap{display:none;max-width:760px;margin:1.5rem auto;padding:0 1rem}
.recap-card{background:var(--card-bg);border:2px solid var(--gold);border-radius:10px;padding:1.8rem;text-align:center}
.recap-card h2{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--ink);margin-bottom:.5rem}
.score-big{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;margin:.5rem 0}
.score-msg{font-style:italic;color:var(--mid);font-size:.9rem;margin-bottom:1.2rem}
.chapter-scores{display:grid;gap:.5rem;text-align:left;margin:1.2rem 0}
.ch-score-row{display:flex;align-items:center;gap:.8rem;padding:.5rem .8rem;background:white;border-radius:5px;border:1px solid var(--border)}
.ch-score-row .ch-name{font-size:.78rem;flex:1}.ch-score-row .ch-pct{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700}
.ch-score-row .ch-bar{flex:0 0 80px;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.ch-score-row .ch-bar-fill{height:100%;border-radius:3px}
.recap-btns{display:flex;gap:.7rem;justify-content:center;margin-top:1rem;flex-wrap:wrap}
.recap-btns button{padding:.65rem 1.2rem;border-radius:5px;cursor:pointer;font-family:inherit;font-size:.85rem;transition:all .2s}
.recap-btns .btn-restart{background:none;border:1.5px solid var(--border);color:var(--ink)}
.recap-btns .btn-new{background:var(--ink);border:none;color:var(--gold-light);font-weight:700}
#empty-state{text-align:center;padding:3rem 1rem;color:var(--mid);font-style:italic;display:none}
</style>

<body>
<header>
  <div class="subtitle">M1 Droit Civil — Semestre 7</div>
  <h1>Droit des Assurances</h1>
  <p class="tagline">M. Abry-Durand · QCM de révision interactif</p>
</header>
<div id="scorebar">
  <div class="stat ans">Répondues&nbsp;<span class="val" id="s-ans">0</span>&nbsp;/<span id="s-total">30</span></div>
  <div class="stat cor">✓&nbsp;<span class="val" id="s-cor">0</span>&nbsp;correctes</div>

</div>

</div>

<div id="recap"></div>

  <button onclick="restartSession()">↺ Recommencer</button>
  <button class="primary" onclick="newSession()">⟳ Nouvelle session</button>
</div>
<script>
const POOL = [{"ch": "Titre 1 — Histoire & Sources", "q": "Quelle est la différence fondamentale entre une tontine et une assurance ?", "type": "qcu", "opts": ["La tontine garantit le remboursement des primes en cas de sinistre, tandis que l'assurance ne verse une indemnité qu'aux souscripteurs encore en vie à l'échéance du contrat", "La tontine est interdite par la loi française depuis le XIXe siècle, tandis que l'assurance est une technique autorisée et réglementée par le Code des assurances depuis 1930", "La tontine est un pari sur la vie où la propriété du bien revient aux survivants, tandis que l'assurance est une mise en réserve calculée selon la probabilité de réalisation du dommage", "La tontine est une forme d'assurance-vie collective à adhésion obligatoire, tandis que l'assurance individuelle repose sur un contrat librement négocié entre l'assureur et le souscripteur"], "ans": [2], "diff": "facile", "expl": "La tontine = pari sur la vie (propriété aux survivants). L'assurance = mise en réserve selon la probabilité de réalisation du dommage. Différence fondamentale."}, {"ch": "Titre 1 — Histoire & Sources", "q": "Qu'est-ce que l'actuariat ?", "type": "qcu", "opts": ["La branche du droit des assurances qui régit les relations contractuelles entre l'assureur et le souscripteur, notamment les obligations d'information et de conseil", "La technique commerciale utilisée par les assureurs pour proposer leurs contrats, incluant la publicité, la distribution et la gestion de la relation client", "Le contrôle administratif exercé par l'autorité de contrôle prudentiel sur les compagnies d'assurance pour vérifier leur solvabilité et leur respect des règles", "La science qui apprécie les risques en identifiant des paramètres, observant la fréquence des sinistres et déterminant le montant à mettre en réserve"], "ans": [3], "diff": "facile", "expl": "L'actuaire identifie des paramètres, observe la fréquence des sinistres, détermine le montant à mettre en réserve. C'est la science de l'appréciation du risque."}, {"ch": "Titre 1 — Histoire & Sources", "q": "Quelle loi constitue la première loi cohérente sur le contrat d'assurance en France ?", "type": "qcu", "opts": ["La loi du 9 avril 1898 sur les accidents du travail, qui a instauré les premières garanties légales obligatoires en matière d'assurance professionnelle", "La loi Godart du 13 juillet 1930, qui a unifié les règles applicables au contrat d'assurance et constitue la source historique fondamentale du Code des assurances", "L'ordonnance du 4 octobre 1945 créant la Sécurité sociale, qui a marqué le début de la complémentarité entre protection sociale et assurances privées", "L'ordonnance royale de 1681 rédigée sous Colbert, qui a posé les bases du droit maritime et a constitué la première réglementation des pratiques d'assurance"], "ans": [1], "diff": "facile", "expl": "La loi Godart du 13 juillet 1930 est la première loi cohérente sur le contrat d'assurance. Elle est la source historique fondamentale du Code des assurances."}, {"ch": "Titre 1 — Histoire & Sources", "q": "Quelle est la découverte scientifique de Bernoulli qui fonde les mathématiques actuarielles ?", "type": "qcu", "opts": ["Le théorème de Bayes sur les probabilités conditionnelles, qui permet de recalculer la probabilité d'un événement à la lumière de nouvelles informations", "Le calcul différentiel appliqué aux fonctions de survie, qui a permis de modéliser mathématiquement l'espérance de vie et les tables de mortalité", "La loi des grands nombres, qui établit que plus les assurés sont nombreux, plus la fréquence du risque observée tend vers une valeur stable et prévisible", "La loi normale de Gauss, qui décrit la distribution statistique des sinistres et permet à l'assureur de calculer ses provisions techniques avec précision"], "ans": [2], "diff": "moyen", "expl": "Bernoulli découvre la loi des grands nombres — base des tables de mortalité. Plus les assurés sont nombreux, plus la fréquence du risque tend vers une valeur stable."}, {"ch": "Titre 1 — Histoire & Sources", "q": "Quels sont les Livres du Code des assurances ?", "type": "qrm", "opts": ["Livre IV : distributeurs", "Livre III : entreprises", "Livre II : assurances obligatoires", "Livre I : contrat (L.100-1 à L.195-1)"], "ans": [1, 2, 3], "diff": "difficile", "expl": "Livre I : contrat / Livre II : assurances obligatoires / Livre III : entreprises / Livre IV : organisations particulières / Livre V : distributeurs. L'option D est fausse : le Livre IV concerne les organisations particulières, pas les distributeurs."}, {"ch": "Titre 1 — Histoire & Sources", "q": "Quand a été instaurée l'obligation d'assurance en matière de circulation ?", "type": "qcu", "opts": ["Le 13 juillet 1930, en même temps que la loi Godart sur le contrat d'assurance, afin d'assurer une protection minimale des victimes d'accidents de la route", "Le 4 octobre 1945, par l'ordonnance créant la Sécurité sociale, qui a étendu la protection obligatoire aux risques liés aux déplacements professionnels", "Le 27 février 1958, marquant l'instauration de l'obligation d'assurance en matière de circulation et le début de la multiplication des risques assurés obligatoirement", "Le 9 avril 1898, lors de la loi sur les accidents du travail, qui a posé le principe de responsabilité sans faute applicable ensuite aux accidents de circulation"], "ans": [2], "diff": "moyen", "expl": "Le 27 février 1958 instaure l'obligation d'assurance en matière de circulation, marquant la multiplication des risques obligatoirement assurés."}, {"ch": "Partie 1 — Nature & Caractéristiques", "q": "Quelle est la définition du contrat d'assurance (Lambert-Faivre et Leveneur) ?", "type": "qcu", "opts": ["Accord par lequel une mutualité répartit entre ses membres la charge des risques auxquels ils sont exposés, en collectant des cotisations proportionnelles à la gravité de chaque risque individuel", "Contrat par lequel un souscripteur transfère ses risques à un tiers professionnel moyennant le paiement d'une cotisation périodique, avec remboursement intégral en cas de réalisation du risque", "Convention par laquelle un assureur, en contrepartie d'une prime ou cotisation, s'engage à garantir en cas de réalisation d'un risque aléatoire prévu au contrat le souscripteur", "Convention par laquelle un assureur perçoit une prime et s'engage à indemniser tout dommage subi par le souscripteur, quelle que soit la cause de ce dommage et son caractère prévisible ou non"], "ans": [2], "diff": "facile", "expl": "Définition exacte : convention par laquelle un assureur, en contrepartie d'une prime ou cotisation, s'engage à garantir en cas de réalisation d'un risque aléatoire prévu au contrat le souscripteur."}, {"ch": "Partie 1 — Nature & Caractéristiques", "q": "Quelles sont les 4 exigences de l'assurabilité technique (partage du risque) ?", "type": "qrm", "opts": ["Impératif d'homogénéité du risque", "Risque individuel aléatoire", "Impératif de masse critique", "Impératif de dispersion des risques"], "ans": [0, 1, 2, 3], "diff": "difficile", "expl": "Les 4 exigences sont cumulatives : masse critique (assez d'assurés) + risque aléatoire (incertain) + homogénéité du risque (même nature/fréquence/intensité) + dispersion des risques (éviter sinistres simultanés)."}, {"ch": "Partie 1 — Nature & Caractéristiques", "q": "Qu'est-ce que le phénomène d'antisélection ?", "type": "qcu", "opts": ["La situation dans laquelle l'assuré parvient à obtenir une tarification inférieure au degré réel de son risque, en raison d'une asymétrie d'information que l'assureur doit compenser", "La tendance de l'assureur à refuser systématiquement de couvrir certaines catégories de risques jugés trop élevés, créant une inégalité d'accès à l'assurance pour certains assurés", "La sélection opérée par l'assureur entre les bons et les mauvais risques lors de la souscription, afin de constituer une mutualité homogène et équilibrée sur le plan actuariel", "L'exclusion contractuelle de garantie prononcée par l'assureur lorsque le sinistre résulte d'une faute intentionnelle de l'assuré, conformément à l'art. L.113-1 du Code des assurances"], "ans": [0], "diff": "moyen", "expl": "Antisélection = l'assuré obtient une tarification inférieure à son risque réel, créant une asymétrie d'information que l'assureur doit compenser par la segmentation."}, {"ch": "Partie 1 — Nature & Caractéristiques", "q": "⚠ Un risque déjà réalisé peut-il être assuré ?", "type": "qcu", "opts": ["Oui, si l'assuré ignorait la réalisation du risque au moment de la souscription — la jurisprudence admet que la bonne foi de l'assuré peut suppléer à l'absence d'aléa au moment de la conclusion", "Non, jamais — un risque déjà réalisé est un risque putatif, il n'y a plus d'aléa et le contrat est donc nul faute d'objet, même si l'assuré ignorait la réalisation au moment de la souscription", "Oui, si les deux parties l'acceptent contractuellement — le principe de liberté contractuelle permet aux parties de couvrir un risque passé dès lors qu'elles en sont informées et consentantes", "Oui, mais uniquement dans les assurances de personnes — les assurances vie et accident admettent la couverture de risques réalisés avant la souscription dès lors que l'assureur y consent expressément"], "ans": [1], "diff": "moyen", "expl": "Un risque déjà réalisé = risque putatif. Il ne peut pas être assuré car il n'y a plus d'aléa. Ne peut pas être assuré non plus : un fait intentionnel ou un risque impossible."}, {"ch": "Partie 1 — Nature & Caractéristiques", "q": "⚠ Risque et événement sont-ils synonymes en droit des assurances ?", "type": "qcu", "opts": ["Non : ce n'est que s'il y a dommage qu'il y a réalisation du risque — un incendie maîtrisé sans dommage constitue un événement mais pas une réalisation du risque au sens du contrat", "Oui, le risque c'est l'événement susceptible de causer un dommage — la terminologie juridique les utilise indifféremment, l'un désignant la cause potentielle et l'autre la réalisation effective", "Oui, mais uniquement pour les assurances de biens — en assurances de personnes, le risque désigne l'état de santé de l'assuré tandis que l'événement est le sinistre corporel qui déclenche la garantie", "Non : le risque désigne la prime payée par l'assuré en contrepartie de la couverture, tandis que l'événement est le sinistre qui déclenche l'obligation d'indemnisation à la charge de l'assureur"], "ans": [0], "diff": "difficile", "expl": "Piège : risque différent de l'événement. Un incendie déclaré mais maîtrisé = pas de dommage, le risque ne s'est pas réalisé malgré l'événement. Ce n'est que s'il y a dommage qu'il y a réalisation du risque."}, {"ch": "Partie 1 — Nature & Caractéristiques", "q": "Qu'est-ce que le phénomène de l'inversion des cycles de provisions ?", "type": "qcu", "opts": ["L'assureur fixe la prime après avoir constaté l'ensemble des sinistres sur l'exercice écoulé, ce qui lui permet d'adapter sa tarification au coût réel de la garantie pour la période suivante", "Les provisions techniques diminuent progressivement à mesure que les sinistres sont indemnisés, créant un phénomène cyclique de reconstitution et de consommation des réserves de l'assureur", "L'assureur détermine la prime avant de savoir ce que la garantie va effectivement lui coûter — il ne connaîtra son prix de revient réel qu'une fois tous les sinistres indemnisés", "L'assureur rembourse les primes excédentaires aux assurés lorsque la sinistralité constatée est inférieure aux prévisions, dans le cadre d'une politique de participation aux bénéfices techniques"], "ans": [2], "diff": "moyen", "expl": "L'inversion des cycles : l'assureur fixe la prime avant de connaître son prix de revient réel. Il ne le connaîtra qu'une fois tous les sinistres indemnisés — politique prudentielle nécessaire."}, {"ch": "Partie 1 — Nature & Caractéristiques", "q": "Quelle est la différence entre coassurance et assurance de ligne ?", "type": "qcu", "opts": ["La coassurance repose sur plusieurs contrats indépendants conclus avec différents assureurs qui ne communiquent pas entre eux / l'assurance de ligne repose sur un contrat unique couvrant plusieurs risques distincts", "La coassurance est un contrat unique divisé en pourcentages entre plusieurs assureurs qui s'engagent chacun pour leur quote-part / l'assurance de ligne est une prise en charge par tranches via des contrats indépendants", "La coassurance est réservée aux risques industriels et commerciaux dépassant les capacités d'un seul assureur / l'assurance de ligne est la technique utilisée par les particuliers pour couvrir leurs biens personnels", "La coassurance et l'assurance de ligne produisent les mêmes effets juridiques pour l'assuré, la seule différence résidant dans le nombre d'assureurs impliqués et non dans la structure contractuelle"], "ans": [1], "diff": "moyen", "expl": "Coassurance = 1 police unique divisée en % entre assureurs (prise en charge globale). Assurance de ligne = autant de contrats indépendants que de risques, assureurs qui ne communiquent pas entre eux."}, {"ch": "Partie 1 — Nature & Caractéristiques", "q": "⚠ En matière de réassurance, quel est le lien entre l'assuré et le réassureur ?", "type": "qcu", "opts": ["L'assuré peut agir directement contre le réassureur en cas de défaillance de l'assureur principal, car la réassurance crée un lien contractuel indirect entre l'assuré et le réassureur", "Il n'existe aucun lien contractuel entre l'assuré et le réassureur — l'assureur reste seul responsable vis-à-vis de l'assuré même après avoir cédé tout ou partie du risque à un réassureur", "Le réassureur intervient comme garant subsidiaire de l'assureur — l'assuré ne peut l'actionner qu'après avoir mis en demeure l'assureur principal et constaté son incapacité à honorer ses engagements", "Le réassureur est le mandataire de l'assureur dans ses relations avec l'assuré — il peut être directement mis en cause pour les actes accomplis dans le cadre de la relation d'assurance principale"], "ans": [1], "diff": "difficile", "expl": "Art. L.111-3 C.ass. : pas de lien contractuel entre assuré/souscripteur et réassureur. L'assureur reste seul responsable même après réassurance. L'assuré ne peut pas agir contre le réassureur."}, {"ch": "Partie 1 — Nature & Caractéristiques", "q": "Qu'est-ce que l'assurabilité juridique ?", "type": "qrm", "opts": ["La condamnation civile est assurable sauf faute intentionnelle (art. L.113-1)", "L'assureur peut toujours refuser d'assurer si le risque dépasse ses capacités techniques", "Certains risques ne peuvent être pris en charge car contraires à l'ordre public", "La loi peut rendre obligatoire la couverture d'un risque techniquement difficile à assurer"], "ans": [0, 2, 3], "diff": "difficile", "expl": "L'assurabilité juridique = primauté de la règle de droit. La loi peut rendre obligatoire un risque techniquement difficile. Certains risques contraires à l'ordre public sont inassurables. Condamnation civile assurable sauf faute intentionnelle."}, {"ch": "Partie 1 — Nature & Caractéristiques", "q": "Quelle est la différence entre réassurance proportionnelle et non proportionnelle ?", "type": "qcu", "opts": ["En réassurance proportionnelle, le réassureur prend un pourcentage des risques et rembourse ce même pourcentage des sinistres / en réassurance non proportionnelle, le réassureur prend la portion de chaque sinistre dépassant un seuil", "En réassurance proportionnelle, le réassureur prend à sa charge un montant fixe par sinistre / en réassurance non proportionnelle, le réassureur prend un pourcentage variable selon la nature du risque", "La réassurance proportionnelle est réservée aux grands risques industriels dépassant les capacités d'un seul assureur / la réassurance non proportionnelle s'applique aux petits risques de masse", "La réassurance proportionnelle et non proportionnelle produisent des effets identiques pour l'assureur cédant, la différence portant uniquement sur le mode de calcul de la prime de réassurance"], "ans": [0], "diff": "moyen", "expl": "Réassurance proportionnelle = l'assureur cède un % des risques, le réassureur rembourse ce même % des sinistres. Réassurance non proportionnelle = le réassureur prend la portion de chaque sinistre dépassant un seuil déterminé."}, {"ch": "Partie 1 — Classifications", "q": "Quelle est la summa divisio du droit des assurances terrestres ?", "type": "qcu", "opts": ["La distinction entre assurance maritime et assurance terrestre, héritée de l'histoire du droit des assurances depuis les premières pratiques de Gênes et Venise aux XIIIe et XIVe siècles", "La distinction entre assurance obligatoire et assurance facultative, selon que la loi impose ou non la souscription d'un contrat pour couvrir certains risques déterminés", "La distinction entre assurance vie et assurance non-vie, telle qu'elle est retenue en droit européen par la directive Solvabilité II pour organiser l'agrément des compagnies d'assurance", "La distinction entre assurance de dommages et assurance de personnes, héritée de la loi du 13 juillet 1930 et constituant la division fondamentale du droit des assurances terrestres"], "ans": [3], "diff": "facile", "expl": "La summa divisio = distinction fondamentale : assurance de dommages (patrimoine) / assurance de personnes (personnes). C'est la distinction héritée de la loi du 13 juillet 1930."}, {"ch": "Partie 1 — Classifications", "q": "Quels sont les 3 principes de l'agrément des compagnies d'assurance ?", "type": "qrm", "opts": ["Spécialité : agrément limité aux opérations autorisées", "Spécialisation : vie ou non-vie, impossible de faire les deux", "Agrément par branche : champ plus restreint pour mutuelles et institutions de prévoyance", "Universalité : couverture de tous les risques possibles"], "ans": [0, 1, 2], "diff": "moyen", "expl": "3 principes : spécialité (opérations autorisées seulement) + spécialisation (vie ou non-vie exclusivement) + agrément par branche (plus restreint pour mutuelles/ip). Pas d'universalité."}, {"ch": "Partie 1 — Classifications", "q": "Quelle est la définition de l'assurance de biens ?", "type": "qcu", "opts": ["L'assurance qui garantit la responsabilité civile de l'assuré envers les tiers pour les dommages causés par ses biens, ses activités ou les personnes dont il doit répondre", "L'assurance qui garantit les dommages causés aux biens appartenant à l'assuré — elle garantit un élément identifié de l'actif du patrimoine, l'assuré étant la victime", "L'assurance qui garantit les dommages corporels subis par l'assuré, notamment en cas d'accident, d'invalidité ou de maladie affectant sa capacité à exercer une activité professionnelle", "L'assurance qui garantit les pertes financières liées à une activité professionnelle ou commerciale, en couvrant notamment les pertes d'exploitation consécutives à un sinistre matériel"], "ans": [1], "diff": "facile", "expl": "Assurance de biens = garantit un élément identifié de l'actif du patrimoine. L'assuré est la victime. À distinguer de l'assurance de responsabilité qui garantit un passif (dette de responsabilité)."}, {"ch": "Partie 1 — Classifications", "q": "⚠ En assurance de responsabilité, qu'est-ce que le sinistre selon l'art. L.124-1-1 C.ass. ?", "type": "qrm", "opts": ["Engageant la responsabilité de l'assuré", "Tout dommage ou ensemble de dommages causés à des tiers", "Ayant donné lieu à une ou plusieurs réclamations", "Résultant d'un fait dommageable"], "ans": [0, 1, 2, 3], "diff": "difficile", "expl": "Art. L.124-1-1 : 3 conditions cumulatives = fait dommageable + dommage causé à un tiers + réclamation(s). Le fait dommageable est la cause génératrice. Toutes les propositions sont exactes."}, {"ch": "Partie 1 — Classifications", "q": "⚠ Quel est le principe forfaitaire en assurances de personnes (art. L.131-1) ?", "type": "qcu", "opts": ["L'assureur verse un forfait identique à tous les assurés appartenant à la même catégorie de risque, sans tenir compte des circonstances particulières du sinistre ni de la situation personnelle de la victime", "L'indemnité versée par l'assureur est calculée en fonction du préjudice réel subi par l'assuré, évalué contradictoirement par les parties selon les règles du droit commun de la responsabilité", "La prime est forfaitaire et fixée à la souscription, mais l'indemnisation reste calculée sur la base du préjudice effectif, avec un plafond correspondant aux sommes garanties au contrat", "Les sommes assurées sont fixées par le contrat indépendamment du préjudice patrimonial ou extrapatrimonial subi — le dommage effectif ne peut ni augmenter ni plafonner la prestation"], "ans": [3], "diff": "moyen", "expl": "Principe forfaitaire : sommes fixées par contrat, indépendantes du préjudice. Conséquences : pas de cumul au sens L.121-4 (on peut cumuler plusieurs assurances-vie), pas de recours subrogatoire (art. L.131-2)."}, {"ch": "Partie 1 — Classifications", "q": "Quel est le principe indemnitaire (art. L.121-1 C.ass.) ?", "type": "qcu", "opts": ["L'assureur est tenu d'indemniser l'assuré à hauteur de la valeur à neuf du bien sinistré, afin de lui permettre de se replacer dans une situation économique identique à celle d'avant le sinistre", "L'assuré reçoit toujours une indemnité égale au montant des primes versées depuis la souscription du contrat, déduction faite des frais de gestion retenus par l'assureur", "L'indemnité due par l'assureur ne peut pas dépasser la valeur de la chose assurée au moment du sinistre — but : replacer la victime dans sa situation antérieure sans appauvrissement ni enrichissement", "L'indemnisation est limitée au seul dommage corporel subi par l'assuré ou les tiers, les préjudices immatériels et les pertes d'exploitation restant exclus sauf clause contractuelle expresse"], "ans": [2], "diff": "facile", "expl": "Art. L.121-1 : principe indemnitaire = l'indemnité ne peut pas dépasser la valeur de la chose au moment du sinistre. But : replacer la victime dans la situation d'avant, sans appauvrissement ni enrichissement."}, {"ch": "Partie 1 — Classifications", "q": "⚠ Qu'est-ce que l'intérêt d'assurance ?", "type": "qcu", "opts": ["La prime payée par l'assuré en contrepartie de la garantie accordée par l'assureur, dont le montant est calculé actuariellement en fonction de la probabilité de réalisation du risque couvert", "Le lien préexistant entre le siège du risque et une personne en raison duquel la réalisation du risque aurait, à l'égard de cette personne, des conséquences financières (Goutel)", "L'avantage économique que l'assureur tire de la conclusion du contrat, consistant dans la perception des primes en échange d'une promesse d'indemnisation conditionnelle et aléatoire", "Le bénéfice financier espéré par le souscripteur en cas de réalisation du sinistre, qui ne doit pas dépasser le montant de la valeur du bien assuré au moment du sinistre"], "ans": [1], "diff": "moyen", "expl": "Intérêt d'assurance (Goutel) = lien préexistant entre le siège du risque et la personne. Sanction de l'absence d'intérêt : nullité du contrat. 4 fonctions : qualification, assurabilité, identification bénéficiaires, déceler cumul."}, {"ch": "Partie 1 — Classifications", "q": "Quels sont les types d'assurances en cas de décès ?", "type": "qrm", "opts": ["Mixte ordinaire : versement uniquement au décès avant l'échéance", "Temporaire décès : si décès avant la date convenue", "En cas de survie : versement si le bénéficiaire survit à l'assuré", "Vie entière : versement garanti quelle que soit la date du décès"], "ans": [1, 2, 3], "diff": "difficile", "expl": "3 types d'assurance en cas de décès : temporaire décès (seule assurance-vie en répartition) + vie entière (versement garanti avec fraction d'épargne capitalisée) + en cas de survie (ex : personne âgée dépendante). La mixte ordinaire combine vie et décès."}, {"ch": "Partie 1 — Classifications", "q": "Quelle est la notion d'accident en assurance contre les accidents corporels ?", "type": "qrm", "opts": ["Atteinte corporelle (directe ou indirecte, interne ou externe)", "Fait non intentionnel", "Fait soudain et imprévisible", "Cause extérieure (exclut les prédispositions pathologiques)"], "ans": [0, 1, 2, 3], "diff": "difficile", "expl": "4 éléments cumulatifs de la notion d'accident : atteinte corporelle + fait non intentionnel (Cass. 22 déc. 1959) + fait soudain et imprévisible (Cass. 2 juil. 1996) + cause extérieure (Cass. 15 avr. 1982)."}, {"ch": "Partie 1 — Classifications", "q": "⚠ Le dommage immatériel se présume-t-il en assurance de biens ?", "type": "qcu", "opts": ["Oui, il est automatiquement couvert en complément du dommage matériel garanti, car il en est la conséquence directe et les parties sont présumées vouloir une indemnisation complète du préjudice", "Non, il ne se présume pas — le préjudice immatériel consécutif à un dommage matériel ne se déduit pas de la garantie principale et nécessite une stipulation contractuelle expresse", "Oui, mais uniquement pour les professionnels dont l'activité dépend du bien sinistré, car la perte d'exploitation est présumée constituer un dommage immatériel couvert accessoirement", "Non, le dommage immatériel n'est jamais couvert en assurance de biens, quelle que soit la rédaction de la police, car il est expressément exclu par l'art. L.122-1 du Code des assurances"], "ans": [1], "diff": "moyen", "expl": "Le dommage immatériel (préjudice consécutif à un dommage matériel garanti) ne se présume pas. Il faut impérativement vérifier les stipulations contractuelles. Ex : perte d'exploitation = dommage immatériel consécutif au dommage matériel direct."}, {"ch": "Partie 1 — Classifications", "q": "⚠ Le principe indemnitaire s'applique-t-il aux assurances de personnes ?", "type": "qcu", "opts": ["Oui, l'indemnité ne peut jamais dépasser le préjudice réel subi par l'assuré, ce qui permet à l'assureur de réduire sa prestation si le dommage effectif est inférieur aux sommes garanties", "Non, c'est le principe forfaitaire qui s'applique — sauf exception pour les frais de santé qui relèvent d'une indemnisation proportionnelle au préjudice effectivement subi", "Oui, mais uniquement pour les dommages corporels graves entraînant une incapacité permanente, les autres risques (décès, maladie courante) relevant du principe forfaitaire", "Non, en assurances de personnes il n'existe aucun plafond d'indemnisation — l'assuré peut percevoir des sommes illimitées dès lors qu'elles ont été contractuellement prévues à la souscription"], "ans": [1], "diff": "moyen", "expl": "Le principe indemnitaire (L.121-1) ne s'applique qu'aux assurances de dommages. Pour les assurances de personnes : principe forfaitaire (L.131-1). Exception : les frais de santé — indemnisation indemnitaire en fonction du préjudice subi."}, {"ch": "Partie 1 — Classifications", "q": "⚠ En assurance de responsabilité, qui est l'assuré ?", "type": "qcu", "opts": ["La victime du dommage causé par l'assuré, qui bénéficie d'un droit d'action directe contre l'assureur en vertu de l'art. L.124-3 du Code des assurances", "L'assureur lui-même, qui supporte définitivement la charge financière du sinistre après avoir indemnisé la victime et exercé son recours subrogatoire contre l'auteur du dommage", "Le tiers bénéficiaire désigné dans la police, qui perçoit l'indemnité directement auprès de l'assureur sans avoir à engager une action en responsabilité contre l'auteur du dommage", "L'auteur du dommage — l'assurance de responsabilité garantit un passif (dette de responsabilité) et non un actif, contrairement à l'assurance de biens où l'assuré est la victime"], "ans": [3], "diff": "facile", "expl": "Différence fondamentale : assurance de biens — l'assuré est la victime. Assurance de responsabilité — l'assuré est l'auteur du dommage. Elle garantit un passif (dette de responsabilité) et non un actif."}, {"ch": "Partie 1 — Acteurs & Institutions", "q": "Quelle est la mission de l'ACPR selon l'art. L.612-1-I CMF ?", "type": "qcu", "opts": ["Fixer les tarifs des primes d'assurance et veiller à ce que les compagnies ne pratiquent pas des prix abusifs contraires à l'intérêt des assurés et à la concurrence loyale sur le marché", "Veiller à la préservation de la stabilité du système financier et à la protection des clients, assurés, adhérents et bénéficiaires des personnes soumises à son contrôle", "Arbitrer les litiges entre assureurs et assurés lorsque les parties ne parviennent pas à un accord amiable, en rendant des décisions contraignantes susceptibles de recours devant les juridictions civiles", "Rédiger les conditions générales des polices d'assurance et approuver les modèles de contrats proposés par les compagnies avant leur mise en commercialisation auprès du grand public"], "ans": [1], "diff": "facile", "expl": "L'ACPR, autorité administrative indépendante, veille à la stabilité du système financier et à la protection des clients. Elle contrôle l'accréditation, les provisions techniques, les placements et les marges de solvabilité."}, {"ch": "Partie 1 — Acteurs & Institutions", "q": "Quels sont les 4 types d'organismes assureurs ?", "type": "qrm", "opts": ["Sociétés anonymes d'assurance", "Mutuelles 45 (Code de la mutualité)", "Institutions de prévoyance (Code de la sécurité sociale, Livre 9)", "Sociétés d'assurance mutuelles"], "ans": [0, 1, 2, 3], "diff": "moyen", "expl": "4 formes : SA d'assurance (profit/actionnaires) + sociétés mutuelles (fonds d'établissement) + mutuelles 45 (non-lucratif, solidarité, frais de santé) + institutions de prévoyance (syndicats, paritaire, non-lucratif)."}, {"ch": "Partie 1 — Acteurs & Institutions", "q": "Quelle est la situation juridique de l'agent général d'assurance ?", "type": "qcu", "opts": ["Mandataire de l'assureur (Civ. 1e, 10 déc. 1996) — à distinguer du courtier qui est mandataire de l'assuré, cette distinction étant fondamentale pour déterminer la responsabilité en cas de faute", "Mandataire de l'assuré — il représente les intérêts du souscripteur dans ses négociations avec les compagnies d'assurance et n'est pas lié par un mandat d'une compagnie particulière", "Courtier indépendant — il met en relation assureurs et assurés sans lien de subordination avec aucune compagnie, en vertu d'un statut libéral régi par le Code de commerce", "Préposé salarié de l'assureur — il bénéficie donc de l'immunité du préposé agissant dans les limites de ses attributions, ce qui exclut toute action directe du client contre lui"], "ans": [0], "diff": "facile", "expl": "L'agent général = mandataire de l'assureur (Civ. 1e, 10 déc. 1996). À l'inverse, le courtier = mandataire de l'assuré. Cette distinction est fondamentale pour la responsabilité."}, {"ch": "Partie 1 — Acteurs & Institutions", "q": "⚠ En cas de violation de l'obligation de conseil par un distributeur, comment s'analyse le préjudice ?", "type": "qcu", "opts": ["Comme une perte totale de la garantie — l'assuré est fondé à demander la nullité du contrat et le remboursement de l'intégralité des primes versées depuis la souscription du contrat défaillant", "Comme une nullité du contrat d'assurance — le manquement au devoir de conseil avant la conclusion du contrat entraîne la nullité pour vice du consentement conformément à l'art. 1130 du Code civil", "Comme une perte de chance (Civ. 1e, 18 sept. 2008) — le préjudice imputable au distributeur s'analyse en perte de chance d'avoir souscrit un contrat mieux adapté ou d'avoir évité la déchéance", "Comme un préjudice moral automatique — la violation du devoir de conseil cause nécessairement un trouble dans les conditions d'existence de l'assuré ouvrant droit à réparation sans preuve spécifique"], "ans": [2], "diff": "moyen", "expl": "Civ. 1e, 18 sept. 2008 : si le distributeur viole l'obligation de conseil, le préjudice imputable s'analyse comme une perte de chance — pas une perte totale, pas une nullité automatique."}, {"ch": "Partie 1 — Acteurs & Institutions", "q": "Quelles sont les marges de solvabilité réglementaire en assurance de dommages ?", "type": "qcu", "opts": ["18% du montant des primes — marge de solvabilité réglementaire en matière d'assurance de dommages, fixée par la directive Solvabilité II transposée par l'ordonnance du 2 avril 2015", "15% du montant des primes — ratio prudentiel retenu par la jurisprudence de la Cour de justice de l'Union européenne pour les assureurs opérant sur plusieurs marchés européens simultanément", "10% du montant des primes — seuil minimal fixé par la directive Solvabilité II pour garantir que chaque compagnie dispose de fonds propres suffisants pour faire face à ses engagements courants", "25% du montant des primes — taux applicable aux seules assurances de responsabilité civile obligatoire, en raison des risques particuliers liés à l'indétermination du montant des sinistres potentiels"], "ans": [0], "diff": "difficile", "expl": "En matière d'assurance de dommages, la marge de solvabilité réglementaire = 18% du montant des primes (directive Solvabilité II, ordonnance 2 avril 2015)."}, {"ch": "Partie 1 — Acteurs & Institutions", "q": "Selon Ass. Plén., 25 fév. 2009, qui le souscripteur peut-il actionner pour la faute de l'agent général ?", "type": "qcu", "opts": ["L'assureur et l'agent général solidairement, la solidarité étant présumée lorsque le dommage résulte de la faute conjointe d'un mandant et de son mandataire dans l'exercice de leurs fonctions", "Uniquement l'assureur en tant que mandant, car l'agent général bénéficie de l'immunité accordée aux préposés agissant dans les limites de leurs attributions, conformément au droit commun du mandat", "L'agent général directement, car il ne bénéficie pas de l'immunité du mandataire/préposé agissant dans les limites de ses attributions — le client peut agir contre lui en responsabilité personnelle", "L'autorité de contrôle prudentiel en tant qu'organe de surveillance, lorsque la faute de l'agent général résulte d'un défaut de contrôle de l'assureur sur ses intermédiaires commerciaux"], "ans": [2], "diff": "difficile", "expl": "Ass. Plén., 25 fév. 2009 : le mandataire/préposé agissant dans ses attributions bénéficie d'une immunité — souscripteur ne peut agir que contre le mandant. Mais l'agent général n'a pas cette protection — le client peut agir directement contre lui."}, {"ch": "Partie 2 — Formation du contrat", "q": "Quels sont les caractères du contrat d'assurance ?", "type": "qrm", "opts": ["À titre onéreux et successif", "Synallagmatique et d'adhésion", "Consensuel et aléatoire", "Réel (remise de chose obligatoire pour sa formation)"], "ans": [0, 1, 2], "diff": "moyen", "expl": "Le contrat d'assurance est : nommé + consensuel + aléatoire + synallagmatique + d'adhésion + à titre onéreux + successif + réglementé. Il n'est pas réel (pas besoin de remise d'une chose)."}, {"ch": "Partie 2 — Formation du contrat", "q": "⚠ Depuis la réforme de 1989, comment fonctionne la déclaration des risques par le souscripteur ?", "type": "qcu", "opts": ["L'assuré déclare spontanément toutes les circonstances qu'il connaît et qui sont susceptibles d'influer sur l'appréciation du risque par l'assureur, selon le principe antérieur à la réforme de 1989", "L'assureur est présumé de bonne foi avoir reçu une déclaration exhaustive — il lui appartient de poser les questions nécessaires et de prouver que l'assuré a intentionnellement dissimulé des informations", "L'assuré répond exactement aux questions posées par l'assureur dans le formulaire de déclaration du risque — l'assureur ne peut plus se prévaloir d'une réponse imprécise à une question vague", "La déclaration des risques intervient après le premier sinistre — c'est à ce moment que l'assureur interroge l'assuré sur les circonstances entourant la réalisation du risque couvert par le contrat"], "ans": [2], "diff": "facile", "expl": "Réforme 1989 = renversement du principe. Avant : déclaration spontanée de tout. Maintenant : l'assuré répond aux questions posées (art. L.113-2). L'assureur ne peut plus se prévaloir d'une réponse imprécise à une question formulée en termes généraux."}, {"ch": "Partie 2 — Formation du contrat", "q": "⚠ Quelle est la sanction d'une fausse déclaration intentionnelle (art. L.113-8) ?", "type": "qcu", "opts": ["La résiliation du contrat avec un préavis de 10 jours et la restitution des primes payées pour la période non couverte, sans que l'assureur puisse réclamer des dommages-intérêts à l'assuré", "La réduction proportionnelle de l'indemnité, calculée selon le rapport entre la prime payée et la prime qui aurait été due si le risque avait été correctement déclaré dès la souscription", "Une simple mise en demeure de régulariser la déclaration dans un délai de 30 jours, permettant à l'assureur d'ajuster la prime selon le risque réel sans remettre en cause la validité du contrat", "La nullité du contrat, les primes payées restant acquises à l'assureur ainsi que les primes échues à titre de dommages-intérêts — sauf pour les assurances-vie"], "ans": [3], "diff": "moyen", "expl": "Art. L.113-8 : fausse déclaration intentionnelle = nullité. Conditions : mauvaise foi + changement objet du risque ou diminution de l'opinion de l'assureur. Les primes restent acquises à l'assureur + primes échues à titre de dommages-intérêts. Sauf assurances-vie."}, {"ch": "Partie 2 — Formation du contrat", "q": "⚠ Quelle est la sanction d'une fausse déclaration non intentionnelle constatée après le sinistre (art. L.113-9) ?", "type": "qcu", "opts": ["L'indemnité réduite en proportion du rapport entre la prime payée et la prime qui aurait été due si le risque avait été correctement déclaré", "La résiliation immédiate du contrat sans remboursement des primes et sans indemnisation du sinistre, l'assureur étant fondé à se prévaloir de la déclaration inexacte même de bonne foi", "La nullité du contrat, qui prive rétroactivement l'assuré de toute indemnisation et oblige l'assureur à restituer les primes perçues, déduction faite des frais de gestion engagés", "La suspension de la garantie pendant 30 jours à compter de la découverte de la const CHAPITRES=[...new Set(POOL.map(q=>q.ch))];
const LETTERS=['A','B','C','D'];
const N=30;
let session=[],states=[],activeFilter=null;

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function buildSession(){
  const tot=POOL.length;let drawn=[];
  CHAPITRES.forEach(ch=>{
    const p=POOL.filter(q=>q.ch===ch);
    drawn.push(...shuffle(p).slice(0,Math.max(1,Math.round(p.length/tot*N))));
  });
  let rem=shuffle(POOL.filter(q=>!drawn.includes(q)));
  while(drawn.length<N&&rem.length>0)drawn.push(rem.shift());
  drawn=drawn.slice(0,N);
  session=drawn.map((q,i)=>({...q,idx:i}));
  states=session.map(()=>({selected:[],answered:false,correct:null}));
}

function buildFilters(){
  const div=document.getElementById('filters');div.innerHTML='';
  const all=document.createElement('button');
  all.className='filter-btn active';all.textContent='Toutes';
  all.onclick=()=>setFilter(null,all);div.appendChild(all);
  [...new Set(session.map(q=>q.ch))].forEach(ch=>{
    const b=document.createElement('button');b.className='filter-btn';
    b.textContent=ch.split('—')[1]?.trim()||ch;
    b.onclick=()=>setFilter(ch,b);div.appendChild(b);
  });
}

function setFilter(ch,btn){
  activeFilter=ch;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderQuestions();
}

function renderQuestions(){
  const container=document.getElementById('qlist');
  document.getElementById('recap').style.display='none';
  document.getElementById('empty-state').style.display='none';
  container.innerHTML='';
  const filtered=activeFilter?session.filter(q=>q.ch===activeFilter):session;
  if(!filtered.length){document.getElementById('empty-state').style.display='block';return}
  const byCh={};
  filtered.forEach(q=>{if(!byCh[q.ch])byCh[q.ch]=[];byCh[q.ch].push(q)});
  Object.entries(byCh).forEach(([ch,qs])=>{
    const hdr=document.createElement('div');hdr.className='chapter-header';
    hdr.innerHTML=`<h2>${ch}</h2><span class="chapter-count">${qs.length} question${qs.length>1?'s':''}</span>`;
    container.appendChild(hdr);
    qs.forEach(q=>container.appendChild(buildCard(q)));
  });
  updateScore();
}

function buildCard(q){
  const qi=q.idx,s=states[qi];
  const card=document.createElement('div');card.className='card';card.id='card-'+qi;
  const isR=q.q.startsWith('⚠');
  card.innerHTML=`
    <div class="card-header">
      <span class="q-number">Q.${qi+1}</span>
      <span class="badge-diff ${q.diff}">${q.diff}</span>
      ${isR?'<span class="badge-retenir">⚠ À retenir</span>':''}
      <span class="badge-type">${q.type==='qcu'?'Une seule réponse':'Plusieurs réponses'}</span>
    </div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="opts-${qi}">
      ${q.opts.map((o,i)=>`<button class="opt-btn" onclick="toggleOpt(${qi},${i})">
        <span class="opt-check"></span>
        <span class="opt-letter">${LETTERS[i]}.</span>
        <span class="opt-text">${o.replace(/^[A-D]\.\s*/,'')}</span>
      </button>`).join('')}
    </div>
    <div class="validate-area">
      <button class="btn-valider" id="val-${qi}" onclick="validate(${qi})" disabled>Valider ma réponse</button>
    </div>
    <div class="feedback" id="fb-${qi}"></div>`;
  if(s.answered)applyCard(qi,q,s);
  return card;
}

function toggleOpt(qi,i){
  const s=states[qi];if(s.answered)return;
  const q=session[qi];
  if(q.type==='qcu'){
    s.selected=[i];
    document.querySelectorAll(`#opts-${qi} .opt-btn`).forEach((b,idx)=>b.classList.toggle('selected',idx===i));
  }else{
    const pos=s.selected.indexOf(i);
    if(pos>=0)s.selected.splice(pos,1);else s.selected.push(i);
    document.querySelectorAll(`#opts-${qi} .opt-btn`).forEach((b,idx)=>b.classList.toggle('selected',s.selected.includes(idx)));
  }
  document.getElementById('val-'+qi).disabled=s.selected.length===0;
}

function validate(qi){
  const s=states[qi],q=session[qi];
  if(s.answered||!s.selected.length)return;
  s.answered=true;
  s.correct=arrEq(s.selected.slice().sort((a,b)=>a-b),q.ans.slice().sort((a,b)=>a-b));
  applyCard(qi,q,s);updateScore();checkComplete();
}

function applyCard(qi,q,s){
  document.querySelectorAll(`#opts-${qi} .opt-btn`).forEach((btn,i)=>{
    btn.disabled=true;
    const isA=q.ans.includes(i),isSel=s.selected.includes(i);
    if(isA&&isSel){btn.style.background='#f0fdf4';btn.style.borderColor='#16a34a';btn.querySelector('.opt-letter').style.color='#15803d'}
    else if(!isA&&isSel){btn.style.background='#fef2f2';btn.style.borderColor='#dc2626';btn.querySelector('.opt-letter').style.color='#b91c1c'}
    else if(isA&&!isSel){btn.style.background='#fffbeb';btn.style.borderColor='#d97706';btn.querySelector('.opt-letter').style.color='#92400e'}
  });
  const val=document.getElementById('val-'+qi);if(val)val.style.display='none';
  const fb=document.getElementById('fb-'+qi);
  if(fb){
    fb.className='feedback visible '+(s.correct?'correct':'incorrect');
    fb.innerHTML=(s.correct?'<strong>✓ Bonne réponse !</strong> ':'<strong>✗ Mauvaise réponse.</strong> ')+q.expl;
  }
}

function arrEq(a,b){return a.length===b.length&&a.every((v,i)=>v===b[i])}

function updateScore(){
  const ans=states.filter(s=>s.answered).length;
  document.getElementById('s-ans').textContent=ans;
  document.getElementById('s-cor').textContent=states.filter(s=>s.correct).length;
  document.getElementById('s-inc').textContent=states.filter(s=>s.answered&&!s.correct).length;
  document.getElementById('s-total').textContent=N;
  document.getElementById('progress-fill').style.width=(ans/N*100)+'%';
}

function checkComplete(){if(states.every(s=>s.answered))showRecap()}

function showRecap(){
  document.getElementById('qlist').style.display='none';
  document.getElementById('filters').style.display='none';
  const cor=states.filter(s=>s.correct).length;
  const pct=Math.round(cor/N*100);
  const msg=pct>=80?'🏛️ Excellente maîtrise du droit des assurances !':
    pct>=60?'📚 Bon niveau, quelques points à consolider.':
    pct>=40?'⚖️ Des lacunes à combler — relis les points ⚠.':
    '📖 Il faut retravailler ce cours en profondeur.';
  const col=pct>=70?'#16a34a':pct>=50?'#d97706':'#dc2626';
  const chS=CHAPITRES.map(ch=>{
    const cq=session.filter(q=>q.ch===ch);
    const ok=cq.filter(q=>states[q.idx].answered&&states[q.idx].correct).length;
    const tot=cq.filter(q=>states[q.idx].answered).length;
    return{ch,ok,tot,pct:tot>0?Math.round(ok/tot*100):0};
  }).filter(r=>r.tot>0);
  document.getElementById('recap').style.display='block';
  document.getElementById('recap').innerHTML=`<div class="recap-card">
    <p style="font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem">Résultat final</p>
    <h2>QCM terminé !</h2>
    <div class="score-big" style="color:${col}">${cor} / ${N}</div>
    <div style="font-size:1.1rem;color:${col};font-weight:700;margin-bottom:.3rem">${pct}%</div>
    <div class="score-msg">${msg}</div>
    <div class="chapter-scores">${chS.map(r=>{
      const c=r.pct>=70?'#16a34a':r.pct>=50?'#d97706':'#dc2626';
      return`<div class="ch-score-row">
        <span class="ch-name">${r.ch.split('—')[1]?.trim()||r.ch}</span>
        <div class="ch-bar"><div class="ch-bar-fill" style="width:${r.pct}%;background:${c}"></div></div>
        <span class="ch-pct" style="color:${c}">${r.pct}%</span>
      </div>`;}).join('')}</div>
    <div class="recap-btns">
      <button class="btn-restart" onclick="restartSession()">↺ Recommencer ces questions</button>
      <button class="btn-new" onclick="newSession()">⟳ Nouvelle session aléatoire</button>
    </div></div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

function newSession(){
  buildSession();buildFilters();activeFilter=null;
  document.getElementById('qlist').style.display='block';
  document.getElementById('filters').style.display='flex';
  renderQuestions();updateScore();window.scrollTo({top:0});
}

function restartSession(){
  states=session.map(()=>({selected:[],answered:false,correct:null}));
  document.getElementById('qlist').style.display='block';
  document.getElementById('filters').style.display='flex';
  activeFilter=null;buildFilters();renderQuestions();updateScore();window.scrollTo({top:0});
}

buildSession();buildFilters();renderQuestions();updateScore();
</script>
</body>
</html>
