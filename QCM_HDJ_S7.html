<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { font-family: 'Source Serif 4', Georgia, serif; background: #f5f0e8; color: #1a1612; min-height: 100vh; }
header { background: #1a1612; color: #f5f0e8; padding: 1.8rem 1.2rem 1.4rem; text-align: center; border-bottom: 4px solid #b8860b; }
header .label { font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase; color: #d4a843; margin-bottom: 0.35rem; }
header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.3rem, 5vw, 2.1rem); font-weight: 900; }
header .sub { margin-top: 0.35rem; font-size: 0.8rem; color: #b0a898; font-style: italic; }
#scorebar { background: #111; color: #f5f0e8; padding: 0.55rem 1rem; display: flex; justify-content: center; align-items: center; gap: 1rem; font-size: 0.78rem; border-bottom: 2px solid #b8860b; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }

.sc-total { color: #d4a843; }
.sc-ok-num { color: #5cb878; }
.sc-ko-num { color: #e07070; }
.sc-div { color: #444; }
.progress-wrap { background: #2a2520; height: 4px; }
.progress-fill { height: 4px; background: #b8860b; transition: width 0.4s ease; }
main { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem 2rem; }
.session-bar { background: #fff; border: 1px solid #d8cfc2; border-left: 4px solid #b8860b; padding: 0.8rem 1.1rem; margin-bottom: 1.3rem; font-size: 0.81rem; color: #7a6e62; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }

.btn-top { padding: 0.38rem 0.9rem; background: #1a1612; color: #d4a843; border: 1.5px solid #b8860b; font-family: 'Source Serif 4', serif; font-size: 0.76rem; cursor: pointer; letter-spacing: 0.04em; -webkit-appearance: none; border-radius: 0; }

.chap-btn { background: transparent; border: 1.5px solid #d8cfc2; color: #7a6e62; padding: 0.38rem 0.8rem; font-family: 'Source Serif 4', serif; font-size: 0.74rem; cursor: pointer; letter-spacing: 0.03em; -webkit-appearance: none; border-radius: 0; }

<script>
const POOL = [

  { chap:"Introduction", theme:"Les 3 sens de la justice", diff:"f", multi:false,
    q:"Quels sont les 3 sens du mot 'justice' tels que définis dans le cours ?",
    opts:["Vertu / idéal de vie collective / ensemble des cours et tribunaux chargés d'appliquer le droit", "Justice civile, pénale et administrative — les trois branches de la juridiction étatique chargées de trancher les litiges selon leur nature", "Justice distributive, commutative et pénale — les trois formes de justice selon la doctrine classique d'Aristote et de Thomas d'Aquin", "Justice légale, équitable et arbitrale — les trois modes de règlement des litiges reconnus par le droit positif français"],
    correct:0,
    ok:"Les 3 sens : (1) vertu — volonté constante de rendre à chacun ce qui lui appartient (Ulpien) ; (2) idéal de vie collective — but à poursuivre (St Augustin : 'sans la justice, que sont les royaumes, sinon vaste brigandage') ; (3) ensemble des cours et tribunaux chargés d'appliquer le droit.",
    ko:"Les 3 sens de la justice : vertu (Ulpien), idéal de vie collective (St Augustin), et institution judiciaire (cours et tribunaux). Les formes distributive/commutative/pénale sont les 3 formes de la justice, pas ses 3 sens." },

  { chap:"Introduction", theme:"3 formes de justice", diff:"m", multi:false,
    q:"Quels sont les symboles associés aux 3 formes de la justice (rétributive, commutative, pénale) ?",
    opts:["La balance (rétributive) / les yeux bandés (commutative) / l'épée (pénale)", "La balance (rétributive) / l'épée (commutative) / les yeux bandés (pénale)", "L'épée (rétributive) / la balance (commutative) / le marteau (pénale)", "Les yeux bandés (rétributive) / la balance (commutative) / la flamme (pénale)"],
    correct:0,
    ok:"Justice rétributive (distributive) → la balance (rétribuer selon les mérites). Justice commutative → les yeux bandés (assurer la régularité des échanges sans favoritisme). Justice pénale → l'épée (sanctionner les comportements déviants).",
    ko:"Justice rétributive = balance / Justice commutative = yeux bandés / Justice pénale = épée. Les yeux bandés symbolisent l'impartialité des échanges, pas la justice en général." },

  { chap:"Introduction", theme:"Césure historique", diff:"f", multi:false,
    q:"Quelle est la grande césure historique en matière de justice selon le cours ?",
    opts:["La rédaction du Code civil en 1804, qui a unifié le droit privé français et mis fin à la pluralité des coutumes régionales", "La chute de Rome en 476 qui a mis fin à l'Empire romain d'Occident et ouvert la période du droit barbare", "La Révolution française — avant : souveraineté du Roi / après : souveraineté du législateur", "La Constitution de 1958, qui a créé le Conseil constitutionnel et instauré un contrôle de constitutionnalité des lois"],
    correct:2,
    ok:"La césure historique est la Révolution. Avant : la justice = expression de la souveraineté royale. Après : souveraineté du législateur, qui cherche à endiguer la justice comme institution pendant ~150 ans. L'État de droit (né en Allemagne fin 19e s.) n'arrive en France qu'en 1958 avec le contrôle de la loi.",
    ko:"La grande césure est la Révolution française. Avant : le Roi rend la justice (souveraineté royale). Après : souveraineté du législateur — la justice perd sa place de premier pouvoir pendant ~150 ans." },

  { chap:"Chap. 1 — Rome républicaine", theme:"Périodes romaines", diff:"f", multi:false,
    q:"Dans quel ordre se succèdent les périodes politiques romaines ?",
    opts:["République (-509) → Royauté → Empire (-27) — les Romains ont d'abord institué la République avant de revenir à un régime monarchique", "Empire → République → Royauté — l'Empire précède la République dans la tradition historiographique romaine", "Royauté → République (-509) → Empire (-27)", "République (-509) → Royauté → Empire (-27) — la Royauté est rétablie brièvement entre la République et l'Empire"],
    correct:2,
    ok:"Royauté (Romulus, 1er roi) → République en -509 (Tarquin le Superbe écarté, 3 institutions : Comices, Magistratures, Sénat) → Empire en -27 (Octave/Auguste après la bataille d'Actium en -31 : Haut Empire/Principat puis Bas Empire/Dominat).",
    ko:"L'ordre est : Royauté → République (-509) → Empire (-27). Tarquin le Superbe est écarté en -509 pour fonder la République. Auguste proclame l'Empire en -27 après la bataille d'Actium (-31)." },

  { chap:"Chap. 1 — Rome républicaine", theme:"Loi des XII Tables", diff:"m", multi:false,
    q:"Qu'est-ce que la loi des XII Tables et quand a-t-elle été rédigée ?",
    opts:["Un recueil de jurisprudence rédigé par les préteurs au IIe siècle av. J.-C., rassemblant les décisions rendues dans les principales affaires civiles et criminelles de Rome", "Une codification réalisée par Justinien au VIe siècle ap. J.-C., rassemblant le droit romain classique en un corpus unique servant de référence pour tout l'Empire", "Un édit du préteur listant toutes les formules de procédure utilisées devant les juridictions civiles sous la République romaine", "Un texte fondateur rédigé en -451/-450 par une commission de 10 hommes (5 plébéiens, 5 patriciens), contenant droit public, droit privé et actions de la loi"],
    correct:3,
    ok:"La loi des XII Tables (-451/-450) est rédigée par une commission de 10 hommes (5 plébéiens, 5 patriciens), affichée sur le forum. Elle contient : droit public, droit privé, actions de la loi (procédures). Référence pendant des siècles, en vigueur jusqu'à la compilation de Justinien (530).",
    ko:"Loi des XII Tables : -451/-450, commission de 10 hommes (5 plébéiens, 5 patriciens), affichée sur le forum. Contient droit public + privé + procédures. Reste en vigueur jusqu'à Justinien (530)." },

  { chap:"Chap. 1 — Rome républicaine", theme:"Actions de la loi — 2 phases", diff:"m", multi:false,
    q:"Quelles sont les 2 phases du procès sous les actions de la loi ?",
    opts:["Phase accusatoire (devant les Comices centuriates) + phase inquisitoire (devant le Sénat romain réuni en chambre secrète)", "Phase in iure (devant le préteur) + phase apud iudicem (devant le juge privé)", "Phase de conciliation amiable (obligatoire devant le magistrat) + phase de jugement (devant les Comices)", "Phase écrite (dépôt de la plainte et des preuves) + phase orale (plaidoiries contradictoires devant le préteur)"],
    correct:1,
    ok:"Phase in iure (devant le préteur) : procédure très formaliste, parties présentes, paroles et gestes rituels, nomination d'un juge privé par la litis attestatio. Phase apud iudicem (devant le juge) : le juge est un citoyen privé choisi parmi les notables, entend les arguments et rend sa décision le jour même.",
    ko:"Les 2 phases : in iure (devant le préteur — formalisme, provocatio, litis attestatio) + apud iudicem (devant le juge privé choisi parmi les notables — décision le jour même)." },

  { chap:"Chap. 1 — Rome républicaine", theme:"Procédure formulaire", diff:"m", multi:false,
    q:"Qu'est-ce que la 'formule' dans la procédure formulaire et quel texte a aboli les actions de la loi ?",
    opts:["Un acte écrit rédigé par l'accusé lui-même, reconnaissant les faits et demandant à bénéficier de la procédure formulaire ; supprimé par un décret de Sylla", "Un discours oral du demandeur exposant ses prétentions devant le préteur ; les actions de la loi sont supprimées par l'édit d'Auguste en -27", "Un contrat passé entre les parties avant le procès, fixant les termes du litige et la peine acceptée en cas de perte ; supprimé par les XII Tables", "Une instruction rédigée par le préteur, transmise au demandeur puis au juge, contenant désignation du juge, résumé des prétentions et condamnation éventuelle — les actions de la loi sont abolies par la loi Aebutia (-149/-126)"],
    correct:3,
    ok:"La formule = instruction rédigée par le préteur, transmise au demandeur puis au juge. Elle contient : désignation du juge, résumé des prétentions, condamnation éventuelle. Le juge est lié par ses termes. La loi Aebutia (-149/-126) a aboli les anciennes actions de la loi.",
    ko:"La formule est rédigée par le préteur et lie le juge dans ses termes. C'est la loi Aebutia (-149/-126) qui abolit les anciennes actions de la loi et lance la procédure formulaire." },

  { chap:"Chap. 1 — Rome républicaine", theme:"Droit prétorien", diff:"m", multi:false,
    q:"Qu'est-ce que le droit prétorien et comment est-il publié ?",
    opts:["Le droit élaboré par le Sénat romain, publié dans le Digeste de Justinien sous forme de constitutions impériales réunies en un corpus systématique", "Le droit civil rédigé par les Pontifes de Rome, gardiens des formules sacrées et de l'interprétation du droit dans la période républicaine", "Le droit criminel défini par les Comices centuriates pour les affaires jugées par les assemblées populaires romaines", "Le droit élaboré par le préteur en marge de la loi, consacré dans l'édit du préteur (texte publié au début de son mandat, en constante évolution)"],
    correct:3,
    ok:"Droit prétorien = droit élaboré par le préteur en marge de la loi. Consacré dans l'édit du préteur (texte à portée générale publié au début de son mandat). Chaque nouveau préteur reprend les règles de ses prédécesseurs et peut y ajouter de nouvelles. Texte en constante évolution.",
    ko:"Droit prétorien = droit du préteur, en marge de la loi, consacré dans l'édit du préteur. Publication en début de mandat, évolution continue. À distinguer du droit du Sénat ou des Pontifes." },

  { chap:"Chap. 1 — Rome républicaine", theme:"Justice criminelle républicaine", diff:"m", multi:false,
    q:"Que sont les Quaestiones perpetuae et quand ont-elles été créées ?",
    opts:["Des juridictions d'appel créées par César pour permettre aux sénateurs condamnés de contester les décisions rendues par les assemblées populaires", "Des chambres d'instruction permanentes présidées par le préteur, avec jury de 300 citoyens nobles — première loi en -149 pour les détournements de fonds", "Des tribunaux civils itinérants créés sous la République tardive pour juger les affaires des provinces en l'absence de magistrats permanents", "Des procédures d'enquête préliminaire créées par Auguste en -15 pour instruire les affaires avant leur renvoi devant le tribunal criminel compétent"],
    correct:1,
    ok:"Quaestiones perpetuae = chambre d'instruction permanente. Présidées par le préteur (compétence criminelle). Jury de 300 citoyens nobles. 1ère loi = -149 (détournements de fonds des magistrats). -103 : crimes de trahison. Sylla : meurtres, faux testaments. Fin République : 11 quaestiones.",
    ko:"Quaestiones perpetuae : chambres permanentes, préteur, jury de 300 citoyens. Créées à partir de -149. Évolution : -103 (trahison), Sylla (meurtres), jusqu'à 11 à la fin de la République." },

  { chap:"Chap. 1 — Rome républicaine", theme:"Procédure accusatoire", diff:"m", multi:false,
    q:"Pourquoi l'accusation était-elle considérée comme un 'devoir civique' sous la République romaine ?",
    opts:["Car seuls les citoyens nobles et les magistrats en exercice pouvaient accuser, ce qui en faisait un privilège social réservé à l'élite romaine", "Car l'accusation était rémunérée par l'État selon un tarif fixe, ce qui incitait les citoyens à dénoncer les infractions commises dans leur voisinage", "Car le préteur désignait obligatoirement un citoyen comme accusateur parmi les volontaires, rendant cette fonction contraignante et inévitable", "Car l'accusateur ne pouvait pas abandonner l'accusation sous peine d'être lui-même condamné, et il prêtait un serment de calomnie l'engageant totalement"],
    correct:3,
    ok:"L'accusateur (tout citoyen peut l'être) ne peut pas abandonner l'accusation sous peine d'être lui-même condamné. Il prête le serment de calomnie (jure de ne pas agir par vengeance). S'il viole ce serment → subit la même peine que l'accusé. La plaidoirie est limitée à 3H. Le jury vote à la majorité simple (151 voix).",
    ko:"Devoir civique car l'accusateur ne peut pas abandonner (sinon condamné lui-même). Il prête un serment de calomnie. S'il le viole → même peine que l'accusé. C'est un engagement total et irréversible." },

  { chap:"Chap. 2 — Rome impériale", theme:"Procédure extraordinaire", diff:"m", multi:false,
    q:"En quoi consiste la procédure extraordinaire sous l'Empire romain ?",
    opts:["Le retour aux anciennes actions de la loi pour les affaires les plus importantes, afin de garantir le respect du formalisme hérité de la République romaine", "Une procédure où le préteur n'intervient plus — le juge représente l'autorité impériale, dispose d'un pouvoir coercitif, mène des enquêtes, décide la sentence et veille à son exécution", "Une procédure réservée aux crimes politiques jugés par le Sénat en session plénière, sous la présidence de l'empereur ou de son représentant désigné", "Une procédure orale simplifiée pour les petites affaires civiles, permettant au préteur de trancher rapidement sans recourir au formalisme habituel"],
    correct:1,
    ok:"Procédure extraordinaire : le préteur n'intervient plus. Le juge représente l'autorité impériale, dispose d'un pouvoir coercitif, étudie librement l'affaire, mène des enquêtes, accorde des délais, décide de la sentence, veille à son exécution. Justice pleinement étatique, non publique (secrétarium), procédure bureaucratique écrite.",
    ko:"Procédure extraordinaire : fin du préteur, juge agent de l'État avec pouvoir coercitif. Tout est écrit. Justice étatique et secrète (secrétarium)." },

  { chap:"Chap. 2 — Rome impériale", theme:"Conseil impérial", diff:"m", multi:false,
    q:"Quel est le rôle du Conseil impérial (2e siècle ap. J.-C.) dans la justice romaine ?",
    opts:["Composé des plus grands jurisconsultes, il permet à l'empereur de juger par décret qui fait jurisprudence et impose l'unité de jugement dans toutes les juridictions impériales", "Il remplace le Sénat pour juger les crimes politiques et les affaires de lèse-majesté impliquant des sénateurs ou d'anciens magistrats", "Il supervise uniquement la justice administrative des provinces et contrôle les décisions rendues par les gouverneurs provinciaux", "Il est chargé de rédiger les édits du préteur et de codifier les règles de procédure applicables dans l'ensemble de l'Empire romain"],
    correct:0,
    ok:"Le Conseil impérial est composé des plus grands jurisconsultes. L'empereur peut le saisir. Il rend un décret qui fait jurisprudence et impose l'unité de jugement. Plus de juges privés : seuls des hauts fonctionnaires nommés et révocables exercent la justice. Juge le plus élevé = préfet de Rome.",
    ko:"Conseil impérial : grands jurisconsultes, décrets faisant jurisprudence, unité de jugement. Fin des juges privés. Le préfet de Rome est le juge le plus élevé. Spécialisation et hiérarchisation de la justice." },

  { chap:"Chap. 2 — Rome impériale", theme:"Torture et aveu", diff:"m", multi:false, alert:true,
    q:"À partir de quand la torture devient-elle une procédure ordinaire dans la justice criminelle romaine, et dans quel but ?",
    opts:["Sous la République, dès -200 av. J.-C., pour punir les esclaves ayant commis des infractions contre leurs maîtres ou contre l'ordre public romain", "Sous Auguste en -15, introduite pour les délits de droit commun afin d'accélérer les procédures et de désengorger les tribunaux criminels romains", "À partir du 3e siècle ap. J.-C., procédure ordinaire pour obtenir l'aveu (reine des preuves), systématique en matière de crime politique", "Depuis les XII Tables, prévue uniquement pour les crimes capitaux impliquant la peine de mort, avec garanties strictes encadrant son utilisation"],
    correct:2,
    ok:"À partir du 3e siècle → procédure ordinaire. Objectif : obtenir l'aveu = reine des preuves. Systématique en matière de crime politique. Progressivement étendue aux crimes de magie et d'adultère. Permet aussi de connaître les complices.",
    ko:"Torture = procédure ordinaire à partir du 3e siècle ap. J.-C. But : l'aveu (reine des preuves). Systématique pour les crimes politiques, étendue ensuite à d'autres crimes." },

  { chap:"Chap. 2 — Rome impériale", theme:"Crime de lèse-majesté", diff:"d", multi:false,
    q:"Quelles sont les caractéristiques du crime de lèse-majesté (maiestas) sous l'Empire romain ?",
    opts:["Crime contre l'autorité impériale, puni de mort + confiscation des biens + perte des droits civiques des descendants — jugé par le Sénat contrôlé par l'empereur", "Crime contre la propriété privée des sénateurs, jugé par les Comices centuriates avec un jury populaire de 300 citoyens", "Crime religieux jugé par les Pontifes, puni du bannissement avec confiscation des biens, touchant uniquement les citoyens romains", "Crime jugé par le préteur, puni d'exil temporaire, ne touchant que l'accusé et non ses descendants"],
    correct:0,

const CHAPTER_ORDER = [
  "Introduction",
  "Chap. 1 — Rome républicaine",
  "Chap. 2 — Rome impériale",
  "Chap. 3 — Monarchie médiévale",
  "Chap. 4 — Ancien Régime",
  "Chap. 5 — Réformes Louis XIV",
  "Chap. 6 — Révolution française",
  "Chap. 7 — Terreur judiciaire"
];
const N = 30;
let sessionQ = [], state = [], currentFilter = 'all';

function shuffle(a) {
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}
function pickSession() {
  const byChap={};
  CHAPTER_ORDER.forEach(ch=>{byChap[ch]=[];});
  POOL.forEach(q=>{if(byChap[q.chap])byChap[q.chap].push(q);});
  let picked=[];
  CHAPTER_ORDER.forEach(ch=>{
    const pool=shuffle(byChap[ch]||[]);
    const quota=Math.round((pool.length/POOL.length)*N);
    picked=picked.concat(pool.slice(0,quota));
  });
  const remaining=shuffle(POOL.filter(q=>!picked.includes(q)));
  while(picked.length<N&&remaining.length>0)picked.push(remaining.shift());
  picked.sort((a,b)=>CHAPTER_ORDER.indexOf(a.chap)-CHAPTER_ORDER.indexOf(b.chap));
  return picked;
}
document.addEventListener('DOMContentLoaded', newSession);
function newSession(){
  sessionQ=pickSession();
  state=sessionQ.map(()=>({answered:false,selected:[],isCorrect:false}));
  currentFilter='all';
  document.getElementById('recap').style.display='none';
  document.getElementById('sessbar').innerHTML=
    `<span>Session en cours · <strong>${sessionQ.length} questions</strong> tirées sur ${POOL.length} disponibles</span>
     <button class="btn-top" onclick="newSession()">⟳ Nouvelle session</button>`;
  buildNav();renderAll();updateScore();
  window.scrollTo({top:0,behavior:'smooth'});
}
function restartSession(){
  state=sessionQ.map(()=>({answered:false,selected:[],isCorrect:false}));
  document.getElementById('recap').style.display='none';
  currentFilter='all';buildNav();renderAll();updateScore();
  window.scrollTo({top:0,behavior:'smooth'});
}
function buildNav(){
  const nav=document.getElementById('chapnav');nav.innerHTML='';
  ['all',...CHAPTER_ORDER.filter(ch=>sessionQ.some(q=>q.chap===ch))].forEach(ch=>{
    const btn=document.createElement('button');
    btn.className='chap-btn'+(ch===currentFilter?' active':'');
    btn.textContent=ch==='all'?'📋 Toutes':ch;
    btn.onclick=()=>{currentFilter=ch;buildNav();renderAll();};
    nav.appendChild(btn);
  });
}
function renderAll(){
  const container=document.getElementById('qlist');container.innerHTML='';
  document.getElementById('sc-total').textContent=sessionQ.length;
  const filtered=sessionQ.map((q,i)=>({...q,idx:i})).filter(q=>currentFilter==='all'||q.chap===currentFilter);
  const byChap={};CHAPTER_ORDER.forEach(ch=>{byChap[ch]=[];});
  filtered.forEach(q=>{byChap[q.chap].push(q);});
  let num=0;
  CHAPTER_ORDER.forEach(ch=>{
    const qs=byChap[ch];if(!qs||!qs.length)return;
    if(currentFilter==='all'){
      const hdr=document.createElement('div');hdr.className='chap-hdr';
      hdr.innerHTML=`<h2>${ch}</h2><span class="chap-cnt">${qs.length} question${qs.length>1?'s':''}</span>`;
      container.appendChild(hdr);
    }
    qs.forEach(q=>{num++;container.appendChild(buildCard(q,num));});
  });
  updateProgress();
}
function buildCard(q,num){
  const s=state[q.idx];
  const card=document.createElement('div');card.className='q-card';card.id='c'+q.idx;
  const dc={f:'df',m:'dm',d:'dd'}[q.diff]||'';
  const dl={f:'● Facile',m:'● Moyen',d:'● Difficile'}[q.diff]||'';
  card.innerHTML=`
    <div class="q-meta">
      <span class="t-chap">${q.chap}</span>
      <span class="t-theme">${q.theme}</span>
      <span class="t-diff ${dc}">${dl}</span>
      ${q.alert?'<span class="t-alert">⚠ À retenir</span>':''}
      <span class="q-num">Q${num}</span>
    </div>
    <div class="q-text">${q.q}</div>
    <div class="q-instr">${q.multi?'📝 Plusieurs bonnes réponses — cochez tout ce qui est juste, puis validez.':'📝 Une seule bonne réponse — choisissez, puis validez.'}</div>
    <div class="opts" id="opts${q.idx}">
      ${q.opts.map((o,oi)=>`
        <button class="opt-btn" id="o${q.idx}_${oi}" onclick="toggle(${q.idx},${oi},${q.multi})" ${s.answered?'disabled':''}>
          <span class="ind">${String.fromCharCode(65+oi)}</span><span>${o}</span>
        </button>`).join('')}
    </div>
    <div class="val-wrap">
      <button class="btn-val" id="v${q.idx}" onclick="validate(${q.idx})" ${s.answered||s.selected.length===0?'disabled':''}>Valider ma réponse</button>
    </div>
    <div class="fb" id="fb${q.idx}"></div>`;
  if(s.answered)applyCard(q.idx,q,s);
  return card;
}
function toggle(qi,oi,multi){
  const s=state[qi];if(s.answered)return;
  s.selected=multi?(s.selected.includes(oi)?s.selected.filter(x=>x!==oi):[...s.selected,oi]):[oi];
  sessionQ[qi].opts.forEach((_,i)=>{
    const b=document.getElementById(`o${qi}_${i}`);if(!b)return;
    const sel=s.selected.includes(i);
    b.className='opt-btn'+(sel?' opt-sel':'');
    const ind=b.querySelector('.ind');
    ind.style.cssText=sel?'background:#1a1612;border-color:#1a1612;color:#f5f0e8':'';
  });
  const v=document.getElementById('v'+qi);if(v)v.disabled=s.selected.length===0;
}
function validate(qi){
  const s=state[qi];if(s.answered||s.selected.length===0)return;
  s.answered=true;
  const q=sessionQ[qi];
  const corrects=Array.isArray(q.correct)?q.correct:[q.correct];
  const selSet=new Set(s.selected),corSet=new Set(corrects);
  s.isCorrect=[...selSet].every(i=>corSet.has(i))&&[...corSet].every(i=>selSet.has(i));
  q.opts.forEach((_,oi)=>{const b=document.getElementById(`o${qi}_${oi}`);if(b)b.disabled=true;});
  const v=document.getElementById('v'+qi);if(v)v.disabled=true;
  applyCard(qi,q,s);updateScore();updateProgress();checkComplete();
}
function isPartial(q,s){
  if(!q.multi)return false;
  const c=Array.isArray(q.correct)?q.correct:[q.correct];
  return s.selected.filter(i=>c.includes(i)).length>0&&s.selected.filter(i=>c.includes(i)).length<c.length;
}
function applyCard(qi,q,s){
  const corrects=Array.isArray(q.correct)?q.correct:[q.correct];
  q.opts.forEach((_,oi)=>{
    const b=document.getElementById(`o${qi}_${oi}`);if(!b)return;
    const ind=b.querySelector('.ind');
    b.removeAttribute('style');if(ind)ind.removeAttribute('style');
    if(corrects.includes(oi)&&s.selected.includes(oi)){
      b.style.setProperty('border-color','#1a5c2e');b.style.setProperty('background-color','#eef7f1');b.style.setProperty('color','#1a5c2e');
      if(ind){ind.style.setProperty('background','#1a5c2e');ind.style.setProperty('border-color','#1a5c2e');ind.style.setProperty('color','#fff');}
    }else if(!corrects.includes(oi)&&s.selected.includes(oi)){
      b.style.setProperty('border-color','#9e1b1b');b.style.setProperty('background-color','#fdf0ef');b.style.setProperty('color','#9e1b1b');
      if(ind){ind.style.setProperty('background','#9e1b1b');ind.style.setProperty('border-color','#9e1b1b');ind.style.setProperty('color','#fff');}
    }else if(corrects.includes(oi)&&!s.selected.includes(oi)){
      b.style.setProperty('border-color','#b8860b');b.style.setProperty('background-color','#fffbf0');b.style.setProperty('color','#7a4800');
      if(ind){ind.style.setProperty('background','#b8860b');ind.style.setProperty('border-color','#b8860b');ind.style.setProperty('color','#fff');}
    }
  });
  const fb=document.getElementById(`fb${qi}`);
  if(fb){
    const partial=isPartial(q,s);
    let cls,txt;
    if(s.isCorrect){cls='fb-ok';txt=`<strong>✓ Bonne réponse !</strong> ${q.ok}`;}
    else if(partial){cls='fb-partial';txt=`<strong>⚠ Réponse incomplète.</strong> ${q.ko}`;}
    else{cls='fb-ko';txt=`<strong>✗ Mauvaise réponse.</strong> ${q.ko}`;}
    fb.className='fb visible '+cls;fb.innerHTML=txt;
  }
}
function updateScore(){
  const done=state.filter(s=>s.answered).length,ok=state.filter(s=>s.answered&&s.isCorrect).length;
  document.getElementById('sc-done').textContent=done;
  document.getElementById('sc-ok').textContent=ok;
  document.getElementById('sc-ko').textContent=done-ok;
}
function updateProgress(){
  document.getElementById('pbar').style.width=(state.filter(s=>s.answered).length/sessionQ.length*100)+'%';
}
function checkComplete(){
  if(state.filter(s=>s.answered).length<sessionQ.length)return;
  const ok=state.filter(s=>s.isCorrect).length,pct=Math.round(ok/sessionQ.length*100);
  let chapHTML='';
  CHAPTER_ORDER.forEach(ch=>{
    const cqs=sessionQ.map((q,i)=>({...q,idx:i})).filter(q=>q.chap===ch);if(!cqs.length)return;
    const cok=cqs.filter(q=>state[q.idx].isCorrect).length;
    chapHTML+=`<div class="cs-item"><div class="cs-name">${ch}</div><div class="cs-num">${cok} / ${cqs.length}</div></div>`;
  });
  document.getElementById('recap-chaps').innerHTML=chapHTML;
  document.getElementById('recap-score').textContent=`${ok} / ${sessionQ.length} (${pct}%)`;
  const msgs=['Reprends la fiche depuis le début. Commence par les grandes périodes (Rome, Moyen Âge, AR, Révolution) et les dates clés.','Résultat moyen. Revois les procédures (actions de la loi, formulaire, inquisitoire) et les réformes des ordonnances de 1667 et 1670.','Bon travail ! Consolide les points délicats : théorie de la représentation, vénalité des offices, loi du 22 prairial.','Excellent ! Tu maîtrises très bien ce cours. Revois les quelques points manqués avant l\'exam.'];
  document.getElementById('recap-msg').textContent=msgs[pct>=85?3:pct>=70?2:pct>=50?1:0];
  document.getElementById('recap').style.display='block';
  setTimeout(()=>document.getElementById('recap').scrollIntoView({behavior:'smooth',block:'start'}),200);
}
